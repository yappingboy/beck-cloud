apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
spec:
  interval: 1h
  chart:
    spec:
      chart: homepage
      version: 1.2.3
      sourceRef:
        kind: HelmRepository
        name: homepage
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/gethomepage/homepage
      tag: latest

    serviceAccount:
      create: true
      name: homepage

    enableRbac: true

    ingress:
      main:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.middlewares: identity-sso-chain@kubernetescrd
        hosts:
          - host: home.becklab.cloud
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - home.becklab.cloud
            secretName: homepage-tls

    config:
      settings.yaml: |
        title: Becklab
        theme: dark
        color: slate
        headerStyle: clean
        layout:
          Media:
            style: row
            columns: 4
          Requests:
            style: row
            columns: 2
          Subtitles & Indexers:
            style: row
            columns: 2
          Monitoring:
            style: row
            columns: 3
          Identity:
            style: row
            columns: 2

      widgets.yaml: |
        - resources:
            cpu: true
            memory: true
            label: cluster
        - datetime:
            text_size: xl
            format:
              timeStyle: short
              dateStyle: short

      services.yaml: |
        - Media:
            - Jellyfin:
                href: https://jellyfin.becklab.cloud
                description: Media server
                icon: jellyfin.png
            - Sonarr:
                href: https://sonarr.becklab.cloud
                description: TV show management
                icon: sonarr.png
                widget:
                  type: sonarr
                  url: http://sonarr.media.svc.cluster.local:8989
                  key: ""
            - Radarr:
                href: https://radarr.becklab.cloud
                description: Movie management
                icon: radarr.png
                widget:
                  type: radarr
                  url: http://radarr.media.svc.cluster.local:7878
                  key: ""
            - Prowlarr:
                href: https://prowlarr.becklab.cloud
                description: Indexer manager
                icon: prowlarr.png
        - Requests:
            - Jellyseerr:
                href: https://jellyseerr.becklab.cloud
                description: Media requests
                icon: jellyseerr.png
        - Subtitles & Indexers:
            - Bazarr:
                href: https://bazarr.becklab.cloud
                description: Subtitle management
                icon: bazarr.png
        - Monitoring:
            - Grafana:
                href: https://grafana.becklab.cloud
                description: Dashboards
                icon: grafana.png
            - Prometheus:
                href: https://prometheus.becklab.cloud
                description: Metrics
                icon: prometheus.png
            - Alertmanager:
                href: https://alertmanager.becklab.cloud
                description: Alerts
                icon: alertmanager.png
        - Identity:
            - Keycloak:
                href: https://keycloak.becklab.cloud
                description: SSO / Identity
                icon: keycloak.png
            - Traefik:
                href: https://traefik.becklab.cloud
                description: Ingress dashboard
                icon: traefik.png

      bookmarks.yaml: |
        []

      kubernetes.yaml: |
        mode: cluster

      docker.yaml: |
        {}
