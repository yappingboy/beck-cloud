apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  path: ./flux/apps
  prune: true
  dependsOn:
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: beck-cloud
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: beck-cloud-config
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: jellyfin
      namespace: media
    - apiVersion: apps/v1
      kind: Deployment
      name: sonarr
      namespace: media
    - apiVersion: apps/v1
      kind: Deployment
      name: radarr
      namespace: media
    - apiVersion: apps/v1
      kind: Deployment
      name: qbit-gluetun
      namespace: torrent
    - apiVersion: apps/v1
      kind: Deployment
      name: wazuh-dashboard
      namespace: security
    - apiVersion: apps/v1
      kind: Deployment
      name: rancher
      namespace: cattle-system
