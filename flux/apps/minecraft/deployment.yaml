apiVersion: apps/v1
kind: Deployment
metadata:
  name: mc-server
  namespace: minecraft
  labels:
    app: mc-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mc-server
  template:
    metadata:
      labels:
        app: mc-server
    spec:
      # Run on the bigger worker node (11 cores, more RAM)
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - ip-192-168-100-11
      containers:
        ## --- Minecraft Server ---
        - name: mc
          image: itzg/minecraft-server:latest
          ports:
            - containerPort: 25565
              name: minecraft
              protocol: TCP
            - containerPort: 8123
              name: rcon
              protocol: TCP
          env:
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: VANILLA
            - name: VERSION
              value: "1.21.8"
            - name: SERVER_NAME
              value: "Becklab Minecraft"
            - name: ONLINE_MODE
              value: "TRUE"
            - name: DIFFICULTY
              value: NORMAL
            - name: MAX_PLAYERS
              value: "4"
            - name: VIEW_DISTANCE
              value: "10"
            - name: SIMULATION_DISTANCE
              value: "6"
            # RCON for web admin
            - name: ENABLE_RCON
              value: "true"
            - name: RCON_PORT
              value: "8123"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mc-rcon
                  key: password
            # JVM tuning: ~6GB for 4-player vanilla
            - name: MEMORY
              value: "6G"
          volumeMounts:
            - name: world
              mountPath: /data
          resources:
            requests:
              cpu: "500m"
              memory: "4Gi"
            limits:
              cpu: "2000m"
              memory: "8Gi"
          livenessProbe:
            exec:
              command:
                - /usr/local/bin/mc-monitor
                - status
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - /usr/local/bin/mc-monitor
                - status
            initialDelaySeconds: 30
            periodSeconds: 15

        ## --- Web RCON Dashboard ---
        - name: rcon-web
          image: itzg/mc-monitor:latest
          ports:
            - containerPort: 8080
              name: web
              protocol: TCP
          env:
            - name: RCON_HOST
              value: localhost
            - name: RCON_PORT
              value: "8123"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mc-rcon
                  key: password
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

      volumes:
        - name: world
          persistentVolumeClaim:
            claimName: mc-world
