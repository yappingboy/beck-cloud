# Kaniko build job — builds user-invite image and pushes to GHCR.
# Deployed by Flux alongside the rest of user-invite resources.
# Runs once, then sits in "Completed" state.

---
apiVersion: v1
kind: Namespace
metadata:
  name: toolbox

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kaniko-builder
  namespace: toolbox

---
apiVersion: batch/v1
kind: Job
metadata:
  name: build-user-invite
  namespace: toolbox
spec:
  template:
    spec:
      serviceAccountName: kaniko-builder
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:v1.24.0
          args:
            - --dockerfile=Dockerfile
            - --context=dir:///workspace/
            - --destination=ghcr.io/yappingboy/becklab-user-invite:latest
            - --destination=ghcr.io/yappingboy/becklab-user-invite:v1
            - --cache=true
            - --cache-repo=ghcr.io/yappingboy/kaniko-cache
            - --skip-tls-verify=true
          volumeMounts:
            - name: docker-config
              mountPath: /kaniko/.docker/
              readOnly: true
            - name: workspace
              mountPath: /workspace
      initContainers:
        - name: clone-source
          image: bitnami/git:latest
          command:
            - sh
            - -c
            - |
              git clone --depth=1 --sparse https://github.com/yappingboy/beck-cloud.git
              cd beck-cloud
              git sparse-checkout set apps/user-invite
              cp -r apps/user-invite/* /workspace/
              ls -la /workspace/
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      restartPolicy: Never
      volumes:
        - name: docker-config
          secret:
            secretName: ghcr-config
        - name: workspace
          emptyDir: {}
