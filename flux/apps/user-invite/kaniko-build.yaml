# Kaniko build job — builds user-invite image and pushes to GHCR.
# Deployed by Flux alongside the rest of user-invite resources.
# Delete old job before updating: kubectl delete job build-user-invite -n toolbox --force
#
# NOTE: This Job uses a timestamp tag for cache-busting on every change.
# Update the IMAGE_TAG variable below or use kustomize replacements to rotate it.

---
apiVersion: v1
kind: Namespace
metadata:
  name: toolbox

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kaniko-builder
  namespace: toolbox

---
apiVersion: batch/v1
kind: Job
metadata:
  name: build-user-invite
  namespace: toolbox
spec:
  template:
    spec:
      serviceAccountName: kaniko-builder
      initContainers:
        - name: clone-source
          image: bitnami/git:2.49.0
          command:
            - sh
            - -c
            - |
              git clone --depth=1 https://github.com/yappingboy/beck-cloud.git
              cp -r beck-cloud/apps/user-invite/* /workspace/
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:v1.24.0
          args:
            - --dockerfile=Dockerfile
            - --context=dir:///workspace/
            - --destination=ghcr.io/yappingboy/becklab-user-invite:latest
            - --destination=ghcr.io/yappingboy/becklab-user-invite:v4.1783837566
            - --cache=false
            - --skip-tls-verify
          volumeMounts:
            - name: docker-config
              mountPath: /kaniko/.docker/
              readOnly: true
            - name: workspace
              mountPath: /workspace
      restartPolicy: Never
      volumes:
        - name: docker-config
          secret:
            secretName: ghcr-config
        - name: workspace
          emptyDir: {}
