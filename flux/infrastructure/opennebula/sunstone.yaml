apiVersion: v1
kind: Service
metadata:
  name: opennebula-sunstone
  namespace: opennebula
spec:
  type: ExternalName
  externalName: 172.16.0.7
  ports:
    - port: 5030
      targetPort: 5030
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opennebula-sunstone
  namespace: opennebula
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: identity-sso-admin-chain@kubernetescrd
spec:
  tls:
    - hosts:
        - one.becklab.cloud
      secretName: one-tls
  rules:
    - host: one.becklab.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opennebula-sunstone
                port:
                  number: 5030
