# Service pointing to Sunstone on hypervisor
# Sunstone runs on 172.16.0.7:2616 (outside K8s) — Endpoints object provides the backing
apiVersion: v1
kind: Service
metadata:
  name: opennebula-sunstone
  namespace: opennebula
  annotations:
    service.cilium.io/no-health-check: "true"
spec:
  type: ClusterIP
  ports:
    - port: 2616
      targetPort: 2616
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: opennebula-sunstone
  namespace: opennebula
subsets:
  - addresses:
      - ip: 172.16.0.7
    ports:
      - port: 2616
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: opennebula
  namespace: opennebula
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`one.becklab.cloud`) && PathPrefix(`/fireedge/`)
      kind: Rule
      middlewares:
        - name: sso-admin-chain
          namespace: identity
      services:
        - name: opennebula-sunstone
          port: 2616
    - match: Host(`one.becklab.cloud`)
      kind: Rule
      middlewares:
        - name: sso-admin-chain
          namespace: identity
      services:
        - name: opennebula-sunstone
          port: 2616
  tls:
    secretName: one-tls
