apiVersion: v1
kind: Service
metadata:
  name: opennebula-sunstone
  namespace: opennebula
spec:
  type: ExternalName
  externalName: 172.16.0.7
  ports:
    - port: 2616
      targetPort: 2616
      protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: opennebula-path-strip
  namespace: opennebula
spec:
  replacePathRegex:
    regex: ^/(.*)
    replacement: /fireedge/sunstone/$1
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: opennebula
  namespace: opennebula
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`one.becklab.cloud`) && PathPrefix(`/`)
      kind: Rule
      middlewares:
        - name: opennebula-path-strip
        - name: identity-sso-admin-chain
          namespace: identity
      services:
        - name: opennebula-sunstone
          port: 2616
  tls:
    secretName: one-tls