apiVersion: v1
kind: Service
metadata:
  name: opennebula-sunstone
  namespace: opennebula
spec:
  type: ClusterIP
  externalTrafficPolicy: Local
  externalIPs:
    - 172.16.0.7
  ports:
    - port: 5030
      targetPort: 5030
      protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: opennebula
  namespace: opennebula
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`one.becklab.cloud`) && PathPrefix(`/fireedge/`)
      kind: Rule
      middlewares:
        - name: sso-admin-chain
          namespace: identity
      services:
        - name: opennebula-sunstone
          port: 5030
    - match: Host(`one.becklab.cloud`)
      kind: Rule
      middlewares:
        - name: sso-admin-chain
          namespace: identity
      services:
        - name: opennebula-sunstone
          port: 5030
  tls:
    secretName: one-tls