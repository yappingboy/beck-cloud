apiVersion: v1
kind: Service
metadata:
  name: opennebula-sunstone
  namespace: opennebula
spec:
  type: ExternalName
  externalName: 172.16.0.7
  ports:
    - port: 2616
      targetPort: 2616
      protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: opennebula-redirect
  namespace: opennebula
spec:
  redirectRegex:
    regex: ^https://one\.becklab\.cloud/$
    replacement: https://one.becklab.cloud/fireedge/sunstone
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opennebula-sunstone
  namespace: opennebula
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: identity-sso-admin-chain@kubernetescrd
spec:
  tls:
    - hosts:
        - one.becklab.cloud
      secretName: one-tls
  rules:
    - host: one.becklab.cloud
      http:
        paths:
          - path: /fireedge/sunstone
            pathType: Prefix
            backend:
              service:
                name: opennebula-sunstone
                port:
                  number: 2616
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opennebula-sunstone
                port:
                  number: 2616
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: opennebula-root
  namespace: opennebula
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`one.becklab.cloud`) && PathPrefix(`/`)
      kind: Rule
      middlewares:
        - name: opennebula-redirect
        - name: identity-sso-admin-chain
          namespace: identity
      services:
        - name: opennebula-sunstone
          port: 2616
    - match: Host(`one.becklab.cloud`) && PathPrefix(`/fireedge/`)
      kind: Rule
      middlewares:
        - name: identity-sso-admin-chain
          namespace: identity
      services:
        - name: opennebula-sunstone
          port: 2616
  tls:
    secretName: one-tls
