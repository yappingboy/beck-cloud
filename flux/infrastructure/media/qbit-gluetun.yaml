apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbit-gluetun
  namespace: torrent
  labels:
    app: qbit-gluetun
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbit-gluetun
  template:
    metadata:
      labels:
        app: qbit-gluetun
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-gluetun
          image: busybox:latest
          command: ['sh', '-c', 'until curl -sf http://localhost:8080/v1/vpnstatus; do echo "Waiting for VPN..."; sleep 5; done']
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.40.0
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          env:
            - name: VPN_SERVICE_PROVIDER
              value: pia
            - name: VPN_TYPE
              value: wireguard
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: gluetun-vpn-secret
                  key: wireguard-private-key
            - name: WIREGUARD_ADDRESSES
              value: 10.5.0.2/32
            - name: SERVER_COUNTRIES
              value: US
            - name: TZ
              value: America/New_York
            - name: DOT
              value: "on"
          ports:
            - containerPort: 8080
              name: qbit
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /downloads
            - name: gluetun-config
              mountPath: /etc/gluetun
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
        - name: qbit
          image: lscr.io/linuxserver/qbittorrent:latest
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 200m
              memory: 512Mi
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
            - name: WEBUI_PORT
              value: "8080"
          ports:
            - containerPort: 8080
              name: qbit-webui
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /downloads
            - name: qbit-config
              mountPath: /config
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: media-downloads
        - name: gluetun-config
          emptyDir: {}
        - name: qbit-config
          persistentVolumeClaim:
            claimName: qbit-config
