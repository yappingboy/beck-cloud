apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbit-gluetun
  namespace: torrent
  labels:
    app: qbit-gluetun
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbit-gluetun
  template:
    metadata:
      labels:
        app: qbit-gluetun
    spec:
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.40.0
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          env:
            - name: VPN_SERVICE_PROVIDER
              value: pia
            - name: VPN_TYPE
              value: openvpn
            - name: OPENVPN_USER
              valueFrom:
                secretKeyRef:
                  name: gluetun-vpn-secret
                  key: pia-username
            - name: OPENVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gluetun-vpn-secret
                  key: pia-password
            - name: SERVER_COUNTRIES
              value: US
            - name: TZ
              value: America/New_York
            - name: DOT
              value: "on"
          ports:
            - containerPort: 8000
              name: gluetun-ctrl
              protocol: TCP
          volumeMounts:
            - name: gluetun-config
              mountPath: /etc/gluetun
          securityContext:
            privileged: true
            runAsUser: 0
            runAsNonRoot: false
            capabilities:
              add:
                - NET_ADMIN
        - name: qbit
          image: lscr.io/linuxserver/qbittorrent:latest
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 200m
              memory: 512Mi
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
            - name: WEBUI_PORT
              value: "8080"
          ports:
            - containerPort: 8080
              name: qbit-webui
              protocol: TCP
          volumeMounts:
            - name: downloads
              mountPath: /downloads
            - name: qbit-config
              mountPath: /config
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
      volumes:
        - name: downloads
          persistentVolumeClaim:
            claimName: torrent-downloads
        - name: gluetun-config
          emptyDir: {}
        - name: qbit-config
          persistentVolumeClaim:
            claimName: qbit-config
---
apiVersion: v1
kind: Service
metadata:
  name: qbit-gluetun
  namespace: torrent
spec:
  selector:
    app: qbit-gluetun
  ports:
    - name: qbit-webui
      port: 8080
      targetPort: 8080
      protocol: TCP
