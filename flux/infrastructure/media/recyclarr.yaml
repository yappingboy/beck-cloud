apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr
  namespace: media
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: recyclarr
              image: ghcr.io/recyclarr/recyclarr:latest
              volumeMounts:
                - name: config
                  mountPath: /config
                - name: recyclarr-config
                  mountPath: /recyclarr/config/recyclarr.yml
                  subPath: recyclarr.yml
              env:
                - name: RECYCLARR_CONFIG_FILE
                  value: /recyclarr/config/recyclarr.yml
          restartPolicy: Never
          volumes:
            - name: config
              persistentVolumeClaim:
                claimName: radarr-config
            - name: recyclarr-config
              configMap:
                name: recyclarr-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
  namespace: media
data:
  recyclarr.yml: |
    sonarr:
      sonarr:
        base_url: http://sonarr.media:8989
        api_key: ${SONARR_API_KEY}
        delete_old_custom_formats: true
        replace_existing_custom_formats: true
        include:
          template: sonarr-quality-definition-web-1080p
        custom_formats:
          - trash_ids:
              - b903040092ad71c296401d6e9c37068c
            assign_to_quality:
              quality: unknown
            has_to_include: false
    radarr:
      radarr:
        base_url: http://radarr.media:7878
        api_key: ${RADARR_API_KEY}
        delete_old_custom_formats: true
        replace_existing_custom_formats: true
        include:
          template: radarr-quality-definition-web-1080p
        custom_formats:
          - trash_ids:
              - a783bcb78f758b1e92f70384775dbbc0
            assign_to_quality:
              quality: unknown
            has_to_include: false
          - trash_ids:
              - 0e0aad085f8570b98cb487ef7922a90f
            assign_to_quality:
              quality: unknown
            has_to_include: false
