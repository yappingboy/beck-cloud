---
# Static NFS PersistentVolume pointing to the external backup drive exported
# from the hypervisor by 09-backup-media-nfs.yml.
#
# Before applying, verify the NFS export is live on the hypervisor:
#   exportfs -v   (should show /mnt/backup-media)
#
# The PV uses Retain so the data survives PVC deletion.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: backup-media-nfs
spec:
  capacity:
    storage: 50Ti          # set to actual drive size; NFS PVs don't enforce this
  accessModes:
    - ReadWriteMany        # NFS supports RWX — all media pods can mount simultaneously
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - hard
    - nfsvers=4.1
  nfs:
    server: 172.16.0.7     # hypervisor LAN IP
    path: /mnt/backup-media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-media
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""     # empty = static binding, skip dynamic provisioner
  volumeName: backup-media-nfs
  resources:
    requests:
      storage: 50Ti
