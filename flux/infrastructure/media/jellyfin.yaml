apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
  labels:
    app: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      containers:
        - name: jellyfin
          image: lscr.io/linuxserver/jellyfin:latest
          resources:
            limits:
              cpu: "8"
              memory: 8Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: 1
              memory: 2Gi
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: 8096
              name: http
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media-library
              mountPath: /data/movies
            - name: media-library-tv
              mountPath: /data/tv
            - name: media-downloads
              mountPath: /downloads
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: media-library
          persistentVolumeClaim:
            claimName: media-library
        - name: media-library-tv
          persistentVolumeClaim:
            claimName: media-library
        - name: media-downloads
          persistentVolumeClaim:
            claimName: media-downloads
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: media
spec:
  selector:
    app: jellyfin
  ports:
    - name: http
      port: 8096
      targetPort: 8096
      protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jellyfin
  namespace: media
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - jellyfin.beckcloud.local
      secretName: jellyfin-tls
  rules:
    - host: jellyfin.beckcloud.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jellyfin
                port:
                  number: 8096
