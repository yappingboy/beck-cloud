---
# Static PersistentVolumes backed by the LVM disk (/mnt/media on k3s-worker-1).
# Provisioned by 10-media-datastore.yml — the disk is attached to the VM by
# OpenNebula and formatted/mounted at /mnt/media inside the VM.
#
# Uses the 'local' volume type (not hostPath) so K8s enforces node affinity
# and won't schedule pods elsewhere if the disk is missing.
#
# Directory layout on /dev/vdb inside k3s-worker-1:
#   /mnt/media/movies     →  media-movies PVC   (radarr writes; jellyfin reads)
#   /mnt/media/shows      →  media-shows PVC    (sonarr writes; jellyfin reads)
#   /mnt/media/downloads  →  media-downloads PVC (shared with torrent ns)
#
# The 'capacity' field on local PVs is informational only — both library PVs
# back to the same 45Ti disk; consumed space is shared.

apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-movies-lvm
spec:
  capacity:
    storage: 45Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  local:
    path: /mnt/media/movies
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - ip-192-168-100-11
