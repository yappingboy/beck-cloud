# Media/Torrent PVCs backed by local-path StorageClass (K3s built-in).
# Provisioner: rancher.io/local-path — enabled by default when local-storage
# is not in the K3s --disable list.
#
# All PVCs use ReadWriteOnce. On a single-worker K3s cluster all media
# pods co-locate on k3s-worker-1, so multiple pods can mount the same
# RWO volume simultaneously (K8s allows this when pods share a node).
# If you add a second worker and need true RWX, consider adding Longhorn:
#   helm install longhorn longhorn/longhorn -n longhorn-system

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-library
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 60Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-downloads
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Ti
