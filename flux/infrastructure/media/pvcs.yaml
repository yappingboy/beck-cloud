# Media/Torrent PVCs.
#
# media-movies, media-shows and media-downloads bind statically to LVM-backed
# PVs defined in pvs-lvm.yaml (local volume on k3s-worker-1 at /mnt/media,
# provisioned by 10-media-datastore.yml via OpenNebula).
#
# Config volumes (jellyfin-config, sonarr-config, etc.) remain on local-path
# (small, on the VM root disk) — no change needed there.


---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-app-access
  namespace: media
spec:
  from:
  - group:  ""
    kind: PersistentVolumeClaim
    namespace: torrent
  to:
  - group: ""
    kind: PersistentVolumeClaim
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-movies
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""       # static binding — matches media-movies-lvm PV
  volumeName: media-movies-lvm
  resources:
    requests:
      storage: 45Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-shows
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""       # static binding — matches media-shows-lvm PV
  volumeName: media-shows-lvm
  resources:
    requests:
      storage: 45Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-anime
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""       # static binding — matches media-shows-lvm PV
  volumeName: media-anime-lvm
  resources:
    requests:
      storage: 45Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-downloads
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""       # static binding — matches media-downloads-lvm PV
  volumeName: media-downloads-lvm
  resources:
    requests:
      storage: 5Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: torrent-downloads
  namespace: torrent
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""       # static binding — matches media-downloads-lvm PV
  volumeName: torrent-downloads-lvm
  resources:
    requests:
      storage: 5Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
