# Media/Torrent PVCs.
#
# media-library and media-downloads bind statically to LVM-backed PVs defined
# in pvs-lvm.yaml (local volume on k3s-worker-1 at /mnt/media, provisioned by
# 10-media-datastore.yml via OpenNebula).
#
# Config volumes (jellyfin-config, sonarr-config, etc.) remain on local-path
# (small, on the VM root disk) — no change needed there.

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-library
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""       # static binding — matches media-library-lvm PV
  volumeName: media-library-lvm
  resources:
    requests:
      storage: 45Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-downloads
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""       # static binding — matches media-downloads-lvm PV
  volumeName: media-downloads-lvm
  resources:
    requests:
      storage: 5Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: torrent-downloads
  namespace: torrent
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
