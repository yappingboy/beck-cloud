# Media/Torrent PVCs backed by NFS StorageClasses provisioned from the ZFS host.
#
# StorageClass routing (defined in configs/storage-classes.yaml + nfs-provisioner.yaml):
#   nfs-media  → /tank/media   (large sequential reads — library, downloads)
#   nfs-bulk   → /tank/torrent (large sequential writes — torrent staging)
#   nfs-k3s    → /tank/k3s    (default: small random I/O — configs, databases)

---
# Shared media library (RWX — Jellyfin, Sonarr, Radarr all read from this)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-library
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-media
  resources:
    requests:
      storage: 60Ti
---
# Media downloads staging area (RWX — written by qBittorrent, read by Sonarr/Radarr)
# Lives in namespace 'media' so Sonarr/Radarr can mount it directly.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-downloads
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-media
  resources:
    requests:
      storage: 10Ti
---
# Torrent downloads (same NFS export, separate PVC in torrent namespace for qBittorrent)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: torrent-downloads
  namespace: torrent
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-bulk
  resources:
    requests:
      storage: 10Ti
---
# Config PVCs (RWO, nfs-k3s default class)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-k3s
  resources:
    requests:
      storage: 20Gi
