# Media/Torrent PVCs backed by Ceph RBD (ceph-rbd StorageClass).
# StorageClass created by 05-k3s.yml using MicroCeph as the backend.
#
# All PVCs use ReadWriteOnce. On a single-worker K3s cluster all media
# pods co-locate on k3s-worker-1, so multiple pods can mount the same
# RWO volume simultaneously (K8s allows this when pods share a node).
# If you add a second worker and need true RWX, enable CephFS via:
#   sudo microceph.ceph fs new cephfs cephfs_meta cephfs_data
# and add a ceph-csi-cephfs StorageClass.

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-library
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-rbd
  resources:
    requests:
      storage: 60Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-downloads
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-rbd
  resources:
    requests:
      storage: 10Ti
