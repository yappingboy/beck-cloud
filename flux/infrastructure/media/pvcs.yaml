# Media/Torrent PVCs:
# - media-library, media-downloads use hostPath bound to ZFS datasets on tank.
# - Config PVCs use local-zfs (local-path-provisioner).

---
# PV for media-library (ZFS-backed, RWX via shared hostPath)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-media-library
spec:
  capacity:
    storage: 60Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-zfs
  hostPath:
    path: /mnt/tank/media/library
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-library
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: local-zfs
  resources:
    requests:
      storage: 60Ti
  volumeName: pv-media-library
---
# PV for media-downloads (ZFS-backed, RWX)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-media-downloads
spec:
  capacity:
    storage: 10Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-zfs
  hostPath:
    path: /mnt/tank/media/downloads
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-downloads
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: local-zfs
  resources:
    requests:
      storage: 10Ti
  volumeName: pv-media-downloads
---
# Config PVCs (RWO, local-zfs)
