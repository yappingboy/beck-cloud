apiVersion: apps/v1
kind: Deployment
metadata:
  name: vsftpd
  namespace: landing
  labels:
    app: vsftpd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vsftpd
  template:
    metadata:
      labels:
        app: vsftpd
    spec:
      nodeSelector:
        kubernetes.io/hostname: ip-192-168-100-11
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-ftp-user
          image: stilliard/pure-ftpd:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "$FTP_USER_PASS" | pure-pw useradd "$FTP_USER_NAME" -u 1000 -g 1000 -d /data -f /etc/pure-ftpd/pureftpd.pwd -m
          env:
            - name: FTP_USER_NAME
              valueFrom:
                secretKeyRef:
                  name: vsftpd-secrets
                  key: ftp_username
            - name: FTP_USER_PASS
              valueFrom:
                secretKeyRef:
                  name: vsftpd-secrets
                  key: ftp_password
          volumeMounts:
            - name: puredb
              mountPath: /etc/pure-ftpd
      containers:
        - name: vsftpd
          image: stilliard/pure-ftpd:latest
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: 21
              name: ftp
              protocol: TCP
            - containerPort: 20
              name: ftp-data
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
            - name: puredb
              mountPath: /etc/pure-ftpd
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - nc -z localhost 21
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - NET_BIND_SERVICE
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ftp-data
        - name: puredb
          emptyDir: {}
