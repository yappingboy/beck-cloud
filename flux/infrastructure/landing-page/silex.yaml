---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: silex-root
  namespace: landing
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 4Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: silex-hosting
  namespace: landing
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 4Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: silex
  namespace: landing
  labels:
    app: silex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: silex
  template:
    metadata:
      labels:
        app: silex
    spec:
      containers:
        - name: silex
          image: silexlabs/silex:latest
          resources:
            limits:
              memory: 512Mi
          env:
#            - name: PORT
#              value: "8080"
#            - name: SILEX_FS_ROOT
#              value: "/silex/storage/"
#            - name: SILEX_FS_HOSTING_ROOT
#              value: "/silex/hosting/"
#            - name: SILEX_URL
#              value: "https://silex.becklab.cloud"
#            - name: SILEX_HOSTING_SILEX
#              value: "/silex/hosting/"
#            - name: STORAGE_CONNECTORS
#              value: "fs,ftp"
#            - name: HOSTING_CONNECTORS
#              value: "fs,ftp"
          ports:
            - containerPort: 6805
          volumeMounts:
            - name: root
              mountPath: /silex/silex/storage
            - name: hosting
              mountPath: /silex/silex/hosting
      volumes:
        - name: root
          persistentVolumeClaim:
            claimName: silex-root
        - name: hosting
          persistentVolumeClaim:
            claimName: silex-hosting

---
apiVersion: v1
kind: Service
metadata:
  name: silex
  namespace: landing
spec:
  selector:
    app: silex
  ports:
    - name: tcp
      port: 6805
      targetPort: 6805
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: silex
  namespace: landing
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`silex.becklab.cloud`)
      middlewares:
        - name: sso-admin-chain
          namespace: identity
      services:
        - name: silex
          port: 8888
  tls:
    secretName: silex-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: silex
  namespace: landing
spec:
  secretName: silex-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - silex.becklab.cloud
