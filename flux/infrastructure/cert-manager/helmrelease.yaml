apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1m
  chart:
    spec:
      chart: cert-manager
      version: v1.16.5
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # startupapicheck runs `cmctl check api` as a post-install Helm hook to
    # verify the webhook responds. In Cilium kube-proxy-replacement environments
    # it tends to crash-loop, which prevents the HelmRelease from going Ready
    # and blocks every downstream Kustomization. cert-manager itself is healthy
    # without it.
    startupapicheck:
      enabled: false
