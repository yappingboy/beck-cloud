apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wekan-mongodb
  namespace: ticketing
spec:
  serviceName: wekan-mongodb
  replicas: 1
  selector:
    matchLabels:
      app: wekan-mongodb
  template:
    metadata:
      labels:
        app: wekan-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          command:
            [
              "sh",
              "-c",
              "mkdir -p /data/db && mongod --replSet rs0 --bind_ip_all --fork --logpath /var/log/mongod.log && for i in $(seq 1 30); do mongosh --eval 'rs.status().ok' >/dev/null 2>&1 && break; sleep 2; done && (mongosh --eval 'rs.status().ok' >/dev/null 2>&1 || mongosh --eval 'rs.initiate({_id:\"rs0\",members:[{_id:0,host:\"wekan-mongodb-0.wekan-mongodb.ticketing.svc.cluster.local:27017\"}]})') && tail -f /var/log/mongod.log",
            ]
          resources:
            limits:
              memory: 2Gi
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: wekan-mongodb
  namespace: ticketing
spec:
  selector:
    app: wekan-mongodb
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wekan
  namespace: ticketing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wekan
  template:
    metadata:
      labels:
        app: wekan
    spec:
      containers:
        - name: wekan
          image: wekanteam/wekan:latest
          resources:
            limits:
              memory: 4Gi
            requests:
              memory: 2Gi
          env:
            - name: MONGO_URL
              value: mongodb://wekan-mongodb:27017/wekan
            - name: ROOT_URL
              value: https://tasks.becklab.cloud
            - name: MAIL_URL
              value: smtp://localhost:25
            - name: NODE_OPTIONS
              value: --max-old-space-size=3072
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: wekan
  namespace: ticketing
spec:
  selector:
    app: wekan
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wekan
  namespace: ticketing
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: identity-sso-admin-chain@kubernetescrd
spec:
  tls:
    - hosts:
        - tasks.becklab.cloud
      secretName: wekan-tls
  rules:
    - host: tasks.becklab.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wekan
                port:
                  number: 8080
