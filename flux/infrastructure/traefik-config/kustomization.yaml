apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Each manifest sets its own namespace explicitly (traefik/* in traefik,
# identity/sso-middlewares.yaml in identity). Don't set a global namespace
# here or it will incorrectly relocate the identity middlewares to traefik.
resources:
  - ../traefik/middlewares.yaml
  - ../traefik/dashboard-ingress.yaml
  - ../traefik/dashboard-certificate.yaml
  - ../identity/sso-middlewares.yaml
