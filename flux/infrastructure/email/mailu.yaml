apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mailu-data
  namespace: email
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailu
  namespace: email
  labels:
    app: mailu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailu
  template:
    metadata:
      labels:
        app: mailu
    spec:
      containers:
        - name: mailu
          image: lscr.io/linuxserver/mailserver:latest
          resources:
            limits:
              memory: 2Gi
            requests:
              memory: 512Mi
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
            - name: OSTYPE
              value: "alpine"
            - name: OS
              value: "alpine"
            - name: ENABLE_CLAMAV
              value: "false"
            - name: ENABLE_FAIL2BAN
              value: "true"
            - name: ENABLE_SPOOF_PROTECTION
              value: "true"
            - name: ENABLE_SPAMASSASSIN
              value: "true"
            - name: ENABLE_RSPAMD
              value: "true"
            - name: PERMIT_DOCKER
              value: "networks"
            - name: POSTMAILGROUP
              value: "true"
            - name: HTTPS
              value: "yes"
            - name: UNAUTHORIZED_POLICY
              value: "reject"
            - name: RELAY_HOST
              value: ""
            - name: RELAY_PORT
              value: ""
            - name: RELAY_USER
              value: ""
            - name: RELAY_PASSWORD
              value: ""
            - name: NETWORK_MODE
              value: "bridge"
            - name: OVERRIDE_HOSTNETWORK
              value: "no"
            - name: SMTP_PORT
              value: "25"
            - name: SMTPS_PORT
              value: "465"
            - name: SMTP_SUBMISSION_PORT
              value: "587"
            - name: IMAP_PORT
              value: "143"
            - name: IMAPS_PORT
              value: "993"
            - name: DNS_MODE
              value: "manual"
            - name: DNS_SERVERS
              value: "127.0.0.11"
            - name: REPORT_RECIPIENT
              value: "admin@becklab.cloud"
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
            - containerPort: 443
              name: https
              protocol: TCP
            - containerPort: 25
              name: smtp
              protocol: TCP
            - containerPort: 465
              name: smtps
              protocol: TCP
            - containerPort: 587
              name: submission
              protocol: TCP
            - containerPort: 143
              name: imap
              protocol: TCP
            - containerPort: 993
              name: imaps
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /config
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mailu-data
---
# Web UI service (HTTP, proxied through Traefik)
apiVersion: v1
kind: Service
metadata:
  name: mailu
  namespace: email
  labels:
    app: mailu
spec:
  selector:
    app: mailu
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
---
# NodePort services for mail protocols (external access)
apiVersion: v1
kind: Service
metadata:
  name: mailu-smtp
  namespace: email
  labels:
    app: mailu-smtp
spec:
  selector:
    app: mailu
  ports:
    - name: smtp
      port: 25
      targetPort: 25
      nodePort: 30025
    - name: smtps
      port: 465
      targetPort: 465
      nodePort: 30465
    - name: submission
      port: 587
      targetPort: 587
      nodePort: 30587
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: mailu-imap
  namespace: email
  labels:
    app: mailu-imap
spec:
  selector:
    app: mailu
  ports:
    - name: imap
      port: 143
      targetPort: 143
      nodePort: 30143
    - name: imaps
      port: 993
      targetPort: 993
      nodePort: 30993
  type: NodePort
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mailu
  namespace: email
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`mail.becklab.cloud`)
      middlewares:
        - name: sso-admin-chain
          namespace: identity
      services:
        - name: mailu
          port: 80
  tls:
    secretName: mail-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mail
  namespace: email
spec:
  secretName: mail-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - mail.becklab.cloud
