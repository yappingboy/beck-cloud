apiVersion: apps/v1
kind: Deployment
metadata:
  name: cron-jobs
  namespace: micro
  labels:
    app: cron-jobs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cron-jobs
  template:
    metadata:
      labels:
        app: cron-jobs
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: cron-jobs
          image: ghcr.io/yappingboy/micro/cron-jobs:v1.0.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: micro-storage
---
apiVersion: v1
kind: Service
metadata:
  name: cron-jobs
  namespace: micro
spec:
  selector:
    app: cron-jobs
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
