apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-editor-api
  namespace: micro
  labels:
    app: image-editor-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image-editor-api
  template:
    metadata:
      labels:
        app: image-editor-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: image-editor-api
          image: ghcr.io/yappingboy/micro/image-editor-api:v1.0.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: images
              mountPath: /data/images
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: images
          persistentVolumeClaim:
            claimName: micro-storage
---
apiVersion: v1
kind: Service
metadata:
  name: image-editor-api
  namespace: micro
spec:
  selector:
    app: image-editor-api
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
