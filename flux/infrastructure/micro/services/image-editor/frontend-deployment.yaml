apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-editor-frontend
  namespace: micro
  labels:
    app: image-editor-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image-editor-frontend
  template:
    metadata:
      labels:
        app: image-editor-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: nginx
          image: registry.becklab.cloud/micro/image-editor-frontend:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: image-editor-frontend
  namespace: micro
spec:
  selector:
    app: image-editor-frontend
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
