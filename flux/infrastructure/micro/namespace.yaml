apiVersion: v1
kind: Namespace
metadata:
  name: micro
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: micro-quota
  namespace: micro
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: micro-storage
  namespace: micro
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
