apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 1m
  path: ./flux/infrastructure
  prune: true
  sourceRef:
    kind: GitRepository
    name: beck-cloud
  healthChecks:
    - kind: Kustomization
      name: infrastructure
      namespace: flux-system
