apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  path: ./flux/apps
  prune: true
  dependsOn:
    - name: infrastructure-apps
  sourceRef:
    kind: GitRepository
    name: beck-cloud
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: beck-cloud-config
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: cilium
      namespace: kube-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: nvidia-device-plugin
      namespace: nvidia
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: traefik
      namespace: traefik
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: cert-manager
      namespace: cert-manager
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: rancher
      namespace: cattle-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: velero
      namespace: velero
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: keycloak
      namespace: identity
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: lldap
      namespace: identity
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: wazuh
      namespace: security
