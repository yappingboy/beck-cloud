apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  path: ./flux/apps
  prune: true
  dependsOn:
    - name: infrastructure
    - name: traefik-config
    - name: cert-manager-config
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: beck-cloud-config
