apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
  namespace: identity
spec:
  interval: 1m
  install:
    timeout: 60s
  upgrade:
    timeout: 60s
  chart:
    spec:
      chart: oauth2-proxy
      version: 7.6.0
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
  values:
    # Secrets are read from Kubernetes secrets via config.existingSecret.
    # The secret must contain keys: client-id, client-secret, cookie-secret
    config:
      existingSecret: oauth2-proxy-secrets
      configFile: |
        provider = "keycloak-oidc"
        provider_display_name = "Keycloak"
        oidc_issuer_url = "https://keycloak.becklab.cloud/realms/homelab"
        oidc_groups_claim = "groups"
        scope = "openid email profile"
        email_domains = ["*"]
        allowed_groups = ["/admins"]
        redirect_url = "https://oauth2.becklab.cloud/oauth2/callback"
        cookie_name = "_oauth2_admin"
        cookie_secure = true
        cookie_httponly = true
        cookie_samesite = "lax"
        cookie_domains = [".becklab.cloud"]
        whitelist_domains = [".becklab.cloud"]
        skip_provider_button = true
        reverse_proxy = true
        upstreams:
          - "static://202"
          - "http://crafty.gaming.svc.cluster.local:8443"
        session_store_type: "redis"
    extraEnv:
      - name: OAUTH2_PROXY_REDIS_CONNECTION_URL
        valueFrom:
          secretKeyRef:
            name: redis-secrets
            key: redis-url
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
      hosts:
        - oauth2.becklab.cloud
      paths:
        - /oauth2/
      pathType: Prefix
      tls:
        - hosts:
            - oauth2.becklab.cloud
          secretName: oauth2-proxy-tls
