apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
  namespace: identity
spec:
  interval: 1m
  chart:
    spec:
      chart: oauth2-proxy
      version: 7.6.0
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
  values:
    # Secrets are read from Kubernetes secrets via config.existingSecret.
    # The secret must contain keys: client-id, client-secret, cookie-secret
    config:
      existingSecret: oauth2-proxy-secrets
      configFile: |
        provider = "keycloak-oidc"
        provider_display_name = "Keycloak"
        oidc_issuer_url = "https://keycloak.becklab.cloud/realms/homelab"
        email_domains = ["*"]
        redirect_url = "https://oauth2.becklab.cloud/oauth2/callback"
        cookie_secure = true
        cookie_httponly = true
        cookie_samesite = "lax"
        cookie_domains = [".becklab.cloud"]
        whitelist_domains = [".becklab.cloud"]
        skip_provider_button = true
        reverse_proxy = true
        upstream = "static://202"
    ingress:
      enabled: true
      className: traefik
      hosts:
        - oauth2.becklab.cloud
      paths:
        - /oauth2/
      pathType: Prefix
