apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
  namespace: identity
spec:
  interval: 1m
  chart:
    spec:
      chart: oauth2-proxy
      version: 7.6.0
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
  values:
    # Secrets are read from Kubernetes secrets via configuration.existingSecret.
    # Create before deploying:
    #   kubectl -n identity create secret generic oauth2-proxy-secrets \
    #     --from-literal=client-secret=<keycloak-client-secret> \
    #     --from-literal=cookie-secret=$(openssl rand -base64 32)
    configuration:
      clientID: "oauth2-proxy"
      existingSecret: oauth2-proxy-secrets
      content: |
        provider = "keycloak-oidc"
        provider_display_name = "Keycloak"
        email_domains = ["*"]
        redirect_url = "https://oauth2.becklab.cloud/oauth2/callback"
        cookie_secure = true
        cookie_httponly = true
        cookie_samesite = "Lax"
        login_url = "https://keycloak.becklab.cloud/realms/homelab/protocol/openid-connect/auth"
        redeem_url = "https://keycloak.becklab.cloud/realms/homelab/protocol/openid-connect/token"
        validate_url = "https://keycloak.becklab.cloud/realms/homelab/protocol/openid-connect/userinfo"
        upstream = "http://localhost:80"
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: oauth2.becklab.cloud
          paths:
            - path: /oauth2/
              pathType: Prefix
