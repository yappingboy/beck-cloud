apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
  namespace: identity
spec:
  interval: 1m
  chart:
    spec:
      chart: oauth2-proxy
      version: 7.6.0
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
  values:
    config:
      provider: keycloak-oidc
      provider_display_name: "Keycloak"
      email_domains:
        - "*"
      client_id: "oauth2-proxy"
      client_secret:
        valueFrom:
          secretKeyRef:
            name: oauth2-proxy-client-secret
            key: client-secret
      redirect_url: "https://oauth2.becklab.cloud/oauth2/callback"
      cookie_secure: true
      cookie_httponly: true
      cookie_samesite: "Lax"
      cookie_secret:
        valueFrom:
          secretKeyRef:
            name: oauth2-proxy-cookie-secret
            key: cookie-secret
      ldap_url: "ldap://lldap.identity.svc.cluster.local:3890"
      ldap_search_base: "dc=becklab,dc=cloud"
      ldap_user_search_filter: "(&(|(uid=%s)(mail=%s))(memberOf=cn=admins,ou=groups,dc=becklab,dc=cloud))"
      login_url: "https://keycloak.becklab.cloud/realms/homelab/protocol/openid-connect/auth"
      redeem_url: "https://keycloak.becklab.cloud/realms/homelab/protocol/openid-connect/token"
      validate_url: "https://keycloak.becklab.cloud/realms/homelab/protocol/openid-connect/userinfo"
      upstream: "http://localhost:80"
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: oauth2.becklab.cloud
          paths:
            - path: /oauth2/
              pathType: Prefix
