apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: identity
spec:
  interval: 1m
  chart:
    spec:
      chart: keycloak
      version: 22.4.3
      sourceRef:
        kind: HelmRepository
        name: keycloak
        namespace: flux-system
  values:
    fullnameOverride: keycloak
    auth:
      adminUsername: admin
      adminPassword:
        valueFrom:
          secretKeyRef:
            name: keycloak-admin-password
            key: admin-password
    postgresql:
      enabled: true
      auth:
        database: keycloak
        username: keycloak
        password:
          valueFrom:
            secretKeyRef:
              name: keycloak-postgres-password
              key: password
    extraEnvVars:
      - name: KEYCLOAK_EXTRA_ARGS
        value: "-Djgroups.dns.query=keys-0.keys.internal -Djgroups.dns.query.timeout=2 -Djgroups.dns.query.retries=5"
    ingress:
      enabled: true
      className: traefik
      hosts:
        - keycloak.beckcloud.local
