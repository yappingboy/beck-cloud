apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: identity
spec:
  interval: 1m
  chart:
    spec:
      chart: keycloak
      version: 25.2.0
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    fullnameOverride: keycloak
    auth:
      adminUsername: admin
      existingSecret: keycloak-admin-password
      secretKeys:
        adminPasswordKey: admin-password
    postgresql:
      enabled: true
      auth:
        database: keycloak
        username: keycloak
        existingSecret: keycloak-postgres-password
        secretKeys:
          userPasswordKey: password
    extraEnvVars:
      - name: KC_CACHE
        value: "local"
    ingress:
      enabled: true
      className: traefik
      hosts:
        - keycloak.becklab.cloud
