---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-redirect-admin
  namespace: identity
spec:
  errors:
    status:
      - "401"
    service:
      name: sso-redirect
      port: 80
    query: "/?proxy=oauth2-admin"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: keycloak-forwardauth-admin
  namespace: identity
spec:
  forwardAuth:
    address: http://oauth2-proxy.identity.svc.cluster.local/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Access-Token
      - Authorization
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sso-admin-chain
  namespace: identity
spec:
  chain:
    middlewares:
      - name: oauth2-redirect-admin
        namespace: identity
      - name: keycloak-forwardauth-admin
        namespace: identity
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-redirect-media
  namespace: identity
spec:
  errors:
    status:
      - "401"
    service:
      name: sso-redirect
      port: 80
    query: "/?proxy=oauth2-media"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: keycloak-forwardauth-media
  namespace: identity
spec:
  forwardAuth:
    address: http://oauth2-proxy-media.identity.svc.cluster.local/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Access-Token
      - Authorization
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sso-media-chain
  namespace: identity
spec:
  chain:
    middlewares:
      - name: oauth2-redirect-media
        namespace: identity
      - name: keycloak-forwardauth-media
        namespace: identity
