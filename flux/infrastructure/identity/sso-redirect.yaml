---
# sso-redirect: nginx pod serving two redirect pages — one per oauth2-proxy.
# Traefik errors middleware fetches the page server-side and returns it to the
# browser. window.location.search is the BROWSER URL (not the fetch URL), so
# we cannot use query params to pick the proxy. Instead each chain gets its
# own path with the proxy URL hardcoded.
#
# Admin services (sso-admin-chain):  errors.query = "/"        → /
# Media  services (sso-media-chain): errors.query = "/media"   → /media
apiVersion: v1
kind: ConfigMap
metadata:
  name: sso-redirect-html
  namespace: identity
data:
  admin-index.html: |
    <!DOCTYPE html>
    <html>
    <head><meta charset="utf-8"><title>Signing in...</title></head>
    <body><p>Signing in, please wait...</p>
    <script>
    (function() {
      var rd = encodeURIComponent(window.location.href);
      window.location.replace('https://oauth2.becklab.cloud/oauth2/start?rd=' + rd);
    })();
    </script>
    </body>
    </html>
  media-index.html: |
    <!DOCTYPE html>
    <html>
    <head><meta charset="utf-8"><title>Signing in...</title></head>
    <body><p>Signing in, please wait...</p>
    <script>
    (function() {
      var rd = encodeURIComponent(window.location.href);
      window.location.replace('https://oauth2-media.becklab.cloud/oauth2/start?rd=' + rd);
    })();
    </script>
    </body>
    </html>
  default.conf: |
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html/admin;
            index index.html;
        }
        location /media {
            alias /usr/share/nginx/html/media/;
            index index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sso-redirect
  namespace: identity
  labels:
    app: sso-redirect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sso-redirect
  template:
    metadata:
      labels:
        app: sso-redirect
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/admin/index.html
              subPath: admin-index.html
            - name: html
              mountPath: /usr/share/nginx/html/media/index.html
              subPath: media-index.html
            - name: html
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: html
          configMap:
            name: sso-redirect-html
---
apiVersion: v1
kind: Service
metadata:
  name: sso-redirect
  namespace: identity
spec:
  selector:
    app: sso-redirect
  ports:
    - port: 80
      targetPort: 80
