apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lldap
  namespace: identity
spec:
  interval: 1m
  chart:
    spec:
      chart: lldap
      version: 0.4.0
      sourceRef:
        kind: HelmRepository
        name: lldap
        namespace: flux-system
  values:
    fullnameOverride: lldap
    env:
      LLDAP_LDAP_BASE_DN: dc=becklab,dc=cloud
    existingSecret: lldap-admin-password
    adminPasswordKey: admin-password
    database:
      existingSecret: lldap-database
      usernameKey: username
      passwordKey: password
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: lldap.becklab.cloud
          paths:
            - path: /
              pathType: Prefix
