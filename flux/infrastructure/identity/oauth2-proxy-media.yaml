apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy-media
  namespace: identity
spec:
  interval: 1m
  install:
    timeout: 60s
  upgrade:
    timeout: 60s
  chart:
    spec:
      chart: oauth2-proxy
      version: 7.6.0
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
  values:
    config:
      existingSecret: oauth2-proxy-secrets
      configFile: |
        provider = "keycloak-oidc"
        provider_display_name = "Keycloak"
        oidc_issuer_url = "https://keycloak.becklab.cloud/realms/homelab"
        oidc_groups_claim = "groups"
        user_id_claim = "preferred_username"
        scope = "openid email profile"
        email_domains = ["*"]
        allowed_groups = ["/admins", "/media"]
        redirect_url = "https://oauth2-media.becklab.cloud/oauth2/callback"
        cookie_name = "_oauth2_media"
        cookie_secure = true
        cookie_httponly = true
        cookie_samesite = "lax"
        cookie_domains = [".becklab.cloud"]
        whitelist_domains = [".becklab.cloud"]
        skip_provider_button = true
        reverse_proxy = true
        upstreams = ["static://202"]
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
      hosts:
        - oauth2-media.becklab.cloud
      paths:
        - /oauth2/
      pathType: Prefix
      tls:
        - hosts:
            - oauth2-media.becklab.cloud
          secretName: oauth2-proxy-media-tls
