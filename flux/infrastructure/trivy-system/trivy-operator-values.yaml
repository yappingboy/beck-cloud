---
# Trivy Operator — continuous vulnerability scanning for BeckCloud
# Scans container images + Kubernetes resource configs on schedule
# Reports written as CustomResources in each namespace

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
  namespace: trivy-system
spec:
  interval: 1m
  chart:
    spec:
      chart: trivy-operator
      version: "0.32.0"
      sourceRef:
        kind: HelmRepository
        name: aqua-charts
        namespace: flux-system
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    # ── Trivy scanner engine ────────────────────────────────────
    trivy:
      image:
        repository: ghcr.io/aquasecurity/trivy
        tag: "0.68.1"
      ignoreUnfixed: true
      offlineScan: false

    # ── Operator controller ─────────────────────────────────────
    operator:
      excludeNamespaces:
        - kube-system
        - trivy-system
        - cert-manager
        - monitoring
        - cattle-system
      scanInterval: 12h
      metricsPort: 8080

      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi

    # ── Trivy cache (speeds up repeated scans) ─────────────────
    trivyCache:
      enabled: true
      volumeSize: 10Gi
      nodeSelector:
        kubernetes.io/hostname: ip-172-16-0-20
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    # ── RBAC (scan all namespaces except excluded) ──────────────
    rbac:
      clusterWide: true
