apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 5m
  chart:
    spec:
      chart: velero
      version: 8.0.0
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    fullnameOverride: velero
    deployment:
      replicas: 1
    configuration:
      backupStorageLocation:
        - name: default
          provider: csi
          bucket: velero-backups
          config:
            csiSnapshotClassName: csi-snapshot-class
            resourceGroup: beck-cloud
            storageAccount: velerostorage
          credential:
            name: velero-credentials
            key: cloud
          default: true
      volumeSnapshotLocation:
        - name: default
          provider: csi
          config:
            csiSnapshotClassName: csi-snapshot-class
          credential:
            name: velero-credentials
            key: cloud
          default: true
      features: EnableCSI
    scheduler:
      disabled: true
    initContainers:
      - name: velero-plugin-for-csi
        image: velero/velero-plugin-for-csi:v0.9.0
        volumeMounts:
          - name: plugins
            mountPath: /target
    cronJobTemplates:
      - name: identity-6h
        schedule: "0 */6 * * *"
        template:
          ttlHoursAfterSuccess: 720
          includedNamespaces:
            - identity
          excludedNamespaces:
            - kube-system
            - flux-system
          storageLocation: default
          snapshotVolumes: true
          volumeSnapshotLocations:
            - default
          ttl: "720h0m0s"
      - name: security-daily
        schedule: "0 2 * * *"
        template:
          ttlHoursAfterSuccess: 2160
          includedNamespaces:
            - security
          excludedNamespaces:
            - kube-system
            - flux-system
          storageLocation: default
          snapshotVolumes: true
          volumeSnapshotLocations:
            - default
          ttl: "2160h0m0s"
      - name: llm-daily
        schedule: "0 3 * * *"
        template:
          ttlHoursAfterSuccess: 168
          includedNamespaces:
            - llm
          excludedNamespaces:
            - kube-system
            - flux-system
          excludedResources:
            - persistentvolumeclaims
          storageLocation: default
          snapshotVolumes: true
          volumeSnapshotLocations:
            - default
          ttl: "168h0m0s"
      - name: media-daily
        schedule: "0 1 * * *"
        template:
          ttlHoursAfterSuccess: 336
          includedNamespaces:
            - media
            - torrent
          excludedNamespaces:
            - kube-system
            - flux-system
          excludedResources:
            - persistentvolumeclaims
          storageLocation: default
          volumeSnapshotLocations:
            - default
          ttl: "336h0m0s"
      - name: rancher-daily
        schedule: "0 4 * * *"
        template:
          ttlHoursAfterSuccess: 720
          includedNamespaces:
            - cattle-*
          excludedNamespaces:
            - kube-system
            - flux-system
          storageLocation: default
          snapshotVolumes: true
          volumeSnapshotLocations:
            - default
          ttl: "720h0m0s"
      - name: full-cluster-weekly
        schedule: "0 2 * * 0"
        template:
          ttlHoursAfterSuccess: 2160
          includedNamespaces:
            - "*"
          excludedNamespaces:
            - kube-system
          excludedResources:
            - persistentvolumeclaims
          storageLocation: default
          snapshotVolumes: true
          volumeSnapshotLocations:
            - default
          ttl: "2160h0m0s"
