apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 1m
  chart:
    spec:
      chart: velero
      version: 8.0.0
      sourceRef:
        kind: HelmRepository
        name: velero
        namespace: flux-system
  values:
    fullnameOverride: velero
    configuration:
      backupStorageLocation:
        name: default
        provider: csi
        bucket: velero-backups
      volumeSnapshotLocation:
        name: default
        provider: csi
        config:
          csiSnapshotClassName: csi-snapshot-class
      features: "EnableCSI"
    schedules:
      - name: full-cluster-daily
        template:
          schedule: "0 2 * * *"
          ttl: "2160h0m0s"
          includedNamespaces:
            - "*"
          excludedNamespaces:
            - kube-system
          storageLocation: default
