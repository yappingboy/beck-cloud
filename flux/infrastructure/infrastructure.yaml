apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-sources
  namespace: flux-system
spec:
  interval: 1m
  path: ./flux/infrastructure/sources
  prune: true
  dependsOn:
    - name: flux-system
  sourceRef:
    kind: GitRepository
    name: beck-cloud
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-controllers
  namespace: flux-system
spec:
  interval: 1m
  path: ./flux/infrastructure/controllers
  prune: true
  dependsOn:
    - name: infrastructure-sources
  sourceRef:
    kind: GitRepository
    name: beck-cloud
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-configs
  namespace: flux-system
spec:
  interval: 1m
  path: ./flux/infrastructure/configs
  prune: true
  dependsOn:
    - name: infrastructure-controllers
  sourceRef:
    kind: GitRepository
    name: beck-cloud
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-apps
  namespace: flux-system
spec:
  interval: 1m
  path: ./flux/infrastructure
  prune: true
  dependsOn:
    - name: infrastructure-configs
  sourceRef:
    kind: GitRepository
    name: beck-cloud
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: beck-cloud-config
  healthChecks: |
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    name: cilium
    namespace: kube-system
    ---
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    name: rook-ceph
    namespace: rook-ceph
    ---
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    name: nvidia-device-plugin
    namespace: nvidia
    ---
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    name: traefik
    namespace: traefik
    ---
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    name: cert-manager
    namespace: cert-manager
    ---
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    name: rancher
    namespace: cattle-system
    ---
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    name: velero
    namespace: velero
    ---
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    name: keycloak
    namespace: identity
    ---
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    name: lldap
    namespace: identity
    ---
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    name: wazuh
    namespace: security
