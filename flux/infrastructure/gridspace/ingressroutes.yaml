# Kiri:Moto — 3D Slicer for printers, CNC mills, and laser cutters
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gridspace-kiri-prefix
  namespace: gridspace
spec:
  prefixRewrite:
    replacement: /kiri/
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kiri-moto
  namespace: gridspace
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`kiri.becklab.cloud`)
      kind: Rule
      services:
        - name: gridspace
          port: 8080
      middlewares:
        - name: gridspace-kiri-prefix
  tls:
    secretName: kiri-tls
---
