# GridSpace IngressRoutes
# Each app redirects root → subpath (browser URL becomes /mesh/, /kiri/, /form/)
# so relative asset paths in HTML resolve correctly.
# Non-root requests pass through unchanged to the app server.

---
# Kiri:Moto — 3D Slicer for printers, CNC mills, and laser cutters
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gridspace-kiri-root-redirect
  namespace: gridspace
spec:
  redirectRegex:
    regex: "^https://kiri\\.becklab\\.cloud/$"
    replacement: https://kiri.becklab.cloud/kiri/
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kiri-moto
  namespace: gridspace
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`kiri.becklab.cloud`)
      kind: Rule
      services:
        - name: gridspace
          port: 8080
      middlewares:
        - name: gridspace-kiri-root-redirect
  tls:
    secretName: kiri-tls

