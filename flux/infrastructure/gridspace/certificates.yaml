apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kiri-tls
  namespace: gridspace
spec:
  secretName: kiri-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - kiri.becklab.cloud
---
