apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bitwarden-secrets-manager
  namespace: bitwarden
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: identity-sso-admin-chain@kubernetescrd
spec:
  tls:
    - hosts:
        - bw.becklab.cloud
      secretName: bw-tls
  rules:
    - host: bw.becklab.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bitwarden-secrets-manager
                port:
                  number: 80
