# RCON Web Admin Dashboard - connects to Minecraft server via RCON
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rcon-web
  namespace: gaming
  labels:
    app: rcon-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rcon-web
  template:
    metadata:
      labels:
        app: rcon-web
    spec:
      containers:
        - name: rcon-web
          image: itzg/rcon:latest
          command:
            - /bin/sh
            - -c
            - |
              sed -i 's|ws:// + window\.location\.hostname + \x27:|wss://|' /opt/rcon-web-admin-0.14.1/public/scripts/socket.js
              exec node /opt/rcon-web-admin-0.14.1/src/main.js
          ports:
            - containerPort: 4326
              name: http
              protocol: TCP
            - containerPort: 4327
              name: websocket
              protocol: TCP
          env:
            - name: RWA_ENV
              value: "TRUE"
            - name: RWA_USERNAME
              value: "admin"
            - name: RWA_PASSWORD
              value: "Rc0nW3b@dmin!"
            - name: RWA_RCON_HOST
              value: "10.42.1.60"
            - name: RWA_RCON_PORT
              value: "25575"
            - name: RWA_RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gaming-secrets
                  key: rcon_password
            - name: RWA_GAME
              value: "minecraft"
            - name: RWA_SERVER_NAME
              value: "Becklab Minecraft"
          resources:
            limits:
              memory: 256Mi
              cpu: "250m"
            requests:
              memory: 128Mi
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 4326
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: rcon-web
  namespace: gaming
  labels:
    app: rcon-web
spec:
  selector:
    app: rcon-web
  ports:
    - name: http
      port: 4326
      targetPort: 4326
    - name: websocket
      port: 4327
      targetPort: 4327
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rcon-web
  namespace: gaming
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: identity-sso-admin-chain@kubernetescrd
spec:
  tls:
    - hosts:
        - rcon.becklab.cloud
      secretName: rcon-tls
  rules:
    - host: rcon.becklab.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rcon-web
                port:
                  number: 4326
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rcon-web
                port:
                  number: 4327
