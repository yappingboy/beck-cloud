# RCON Web UI - connects to Minecraft server via RCON for management
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rcon-web
  namespace: gaming
  labels:
    app: rcon-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rcon-web
  template:
    metadata:
      labels:
        app: rcon-web
    spec:
      containers:
        - name: rcon-web
          image: itzg/rcon-web:latest
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          env:
            - name: RCON_ADDRESSES
              value: "minecraft.gaming.svc.cluster.local:25575"
            - name: RCON_PASSWORDS
              valueFrom:
                secretKeyRef:
                  name: gaming-secrets
                  key: rcon_password
            - name: RCON_NAMES
              value: "Becklab Minecraft"
          resources:
            limits:
              memory: 256Mi
              cpu: "250m"
            requests:
              memory: 128Mi
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: rcon-web
  namespace: gaming
  labels:
    app: rcon-web
spec:
  selector:
    app: rcon-web
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
