apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: gaming
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          resources:
            limits:
              memory: 1Gi
            requests:
              memory: 256Mi
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "pufferpanel"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pufferpanel-secrets
                  key: db_password
            - name: POSTGRES_DB
              value: "pufferpanel"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: gaming
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
