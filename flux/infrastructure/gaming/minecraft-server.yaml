
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft
  namespace: gaming
  labels:
    app: minecraft
spec:
  selector:
    app: minecraft
  ports:
    - name: http
      port: 25565
      targetPort: 25565
  type: ClusterIP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pufferpanel
  namespace: gaming
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`games.becklab.cloud`)
      services:
        - name: minecraft
          port: 25565
  tls:
    secretName: gaming-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gaming
  namespace: gaming
spec:
  secretName: gaming-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - games.becklab.cloud
