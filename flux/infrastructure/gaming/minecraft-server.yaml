apiVersion: gameserver.kubegs.io/v1alpha1
kind: GameServer
metadata:
  name: minecraft
  namespace: gaming
spec:
  # Container image
  image: kubegs/minecraft-server:latest
  
  container:
    env:
      - name: EULA
        value: "TRUE"
      - name: TYPE
        value: "VANILLA"
      - name: MAX_PLAYERS
        value: "20"
    
    resources:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"
  
  ports:
    - name: game
      port: 25565
      protocol: TCP
  
  service:
    type: LoadBalancer
    dedicatedIP: false
  
  storage:
    size: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft
  namespace: gaming
  labels:
    app: minecraft
spec:
  selector:
    app: minecraft
  ports:
    - name: http
      port: 25565
      targetPort: 25565
  type: ClusterIP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pufferpanel
  namespace: gaming
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`games.becklab.cloud`)
      services:
        - name: minecraft
          port: 25565
  tls:
    secretName: gaming-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gaming
  namespace: gaming
spec:
  secretName: gaming-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - games.becklab.cloud
