# Minecraft Server - Vanilla with RCON enabled for PufferPanel management
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft
  namespace: gaming
  labels:
    app: minecraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      containers:
        - name: minecraft
          image: itzg/minecraft-server:latest
          imagePullPolicy: Always
          resources:
            limits:
              memory: 4Gi
              cpu: "2000m"
            requests:
              memory: 2Gi
              cpu: "1000m"
          ports:
            - containerPort: 25565
              name: mc
              protocol: TCP
            - containerPort: 25575
              name: rcon
              protocol: TCP
          env:
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: "VANILLA"
            - name: MEMORY
              value: "3G"
            - name: ONLINE_MODE
              value: "true"
            - name: DIFFICULTY
              value: "hard"
            - name: MAX_PLAYERS
              value: "16"
            - name: VIEW_DISTANCE
              value: "10"
            - name: SIMULATION_DISTANCE
              value: "8"
            - name: ALLOW_FLIGHT
              value: "true"
            - name: SERVER_NAME
              value: "Becklab Minecraft"
            - name: MOTD
              value: "&bBecklab Minecraft\\n&aVanilla | 4-player"
            - name: RCON_ENABLED
              value: "true"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gaming-secrets
                  key: rcon_password
            - name: RCON_PORT
              value: "25575"
            - name: ENABLE_ROLLING_LOGS
              value: "true"
            - name: ENABLE_AUTOPAUSE
              value: "true"
            - name: AUTOPAUSE_TIMEOUT_INIT
              value: "1800"
            - name: AUTOPAUSE_TIMEOUT_NO_PLAYERS
              value: "900"
          volumeMounts:
            - name: mc-data
              mountPath: /data
      volumes:
        - name: mc-data
          persistentVolumeClaim:
            claimName: mc-data
---
# PVC for Minecraft world data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mc-data
  namespace: gaming
  labels:
    app: minecraft
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
# Service: ClusterIP for internal access (RCON + game port for PufferPanel)
apiVersion: v1
kind: Service
metadata:
  name: minecraft
  namespace: gaming
  labels:
    app: minecraft
spec:
  selector:
    app: minecraft
  ports:
    - name: mc
      port: 25565
      targetPort: 25565
    - name: rcon
      port: 25575
      targetPort: 25575
  type: ClusterIP
---
# Service: NodePort for external game traffic
apiVersion: v1
kind: Service
metadata:
  name: minecraft-nodeport
  namespace: gaming
  labels:
    app: minecraft
spec:
  selector:
    app: minecraft
  ports:
    - name: mc
      port: 25565
      targetPort: 25565
      nodePort: 30065
  type: NodePort
