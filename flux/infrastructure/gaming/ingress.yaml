---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pufferpanel
  namespace: gaming
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`games.becklab.cloud`)
      middlewares:
        - name: sso-admin-chain
          namespace: identity
      services:
        - name: pufferpanel
          port: 4444
  tls:
    secretName: gaming-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gaming
  namespace: gaming
spec:
  secretName: gaming-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - games.becklab.cloud
