apiVersion: apps/v1
kind: Deployment
metadata:
  name: trudesk
  namespace: support
  labels:
    app: trudesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trudesk
  template:
    metadata:
      labels:
        app: trudesk
    spec:
      containers:
        - name: trudesk
          image: polonel/trudesk:latest
          resources:
            limits:
              memory: 1Gi
            requests:
              memory: 256Mi
          env:
            - name: NODE_ENV
              value: production
            - name: TRUDESK_DOCKER
              value: "true"
            - name: TD_MONGODB_SERVER
              value: mongodb
            - name: TD_MONGODB_DATABASE
              value: trudesk
            - name: TD_MONGODB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: trudesk-secrets
                  key: mongo_password
            - name: TD_MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trudesk-secrets
                  key: mongo_password
            - name: USE_XFORWARDIP
              value: "true"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: trudesk-secrets
                  key: session_secret
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: trudesk-secrets
                  key: jwt_secret
          ports:
            - containerPort: 8118
              name: http
              protocol: TCP
        - name: mongodb
          image: mongo:5.0
          resources:
            limits:
              memory: 2Gi
            requests:
              memory: 512Mi
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: trudesk-secrets
                  key: mongo_password
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trudesk-secrets
                  key: mongo_password
          volumeMounts:
            - name: data
              mountPath: /data/db
                
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: trudesk
  namespace: support
  labels:
    app: trudesk
spec:
  selector:
    app: trudesk
  ports:
    - name: http
      port: 8118
      targetPort: 8118
      protocol: TCP
  type: ClusterIP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: trudesk
  namespace: support
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`support.becklab.cloud`)
      middlewares:
        - name: sso-admin-chain
          namespace: identity
      services:
        - name: trudesk
          port: 8118
  tls:
    secretName: support-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: support
  namespace: support
spec:
  secretName: support-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - support.becklab.cloud
