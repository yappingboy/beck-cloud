# IngressRoute for Home Assistant (SSO protected) and ESPHome dashboard
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-assistant
  namespace: webapps
spec:
  entryPoints:
    - websecure
  routes:
    # Main HA UI — admin SSO (no Authorization header forwarded; HA has its own auth)
    - kind: Rule
      match: Host(`ha.becklab.cloud`)
      middlewares:
        - name: sso-admin-chain-no-auth-header
          namespace: identity
      services:
        - name: home-assistant
          port: 8123

    # ESPHome Dashboard — admin SSO (subpath)
    - kind: Rule
      match: Host(`ha.becklab.cloud`) && PathPrefix(`/esphome`)
      middlewares:
        - name: sso-admin-chain-no-auth-header
          namespace: identity
        - name: esphome-strip-prefix
      services:
        - name: esphome
          port: 6052

    # WebSocket API for HA — no auth (HA handles its own auth)
    # This is needed for the companion app / Lovelace websocket
    - kind: Rule
      match: Host(`ha.becklab.cloud`) && Path(`/api/websocket`)
      services:
        - name: home-assistant
          port: 8123

    # MQTT WebSocket (for frontend integrations)
    - kind: Rule
      match: Host(`ha.becklab.cloud`) && PathPrefix(`/mqtt`)
      middlewares:
        - name: mqtt-strip-prefix
      services:
        - name: mosquitto
          port: 9001
  tls:
    secretName: ha-tls
---
# Strip prefix middleware for ESPHome and MQTT subpaths
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: esphome-strip-prefix
  namespace: webapps
spec:
  stripPrefix:
    forceSlash: false
    prefixes:
      - /esphome
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: mqtt-strip-prefix
  namespace: webapps
spec:
  stripPrefix:
    forceSlash: false
    prefixes:
      - /mqtt
---
# TLS Certificate via cert-manager
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-assistant
  namespace: webapps
spec:
  secretName: ha-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - ha.becklab.cloud
