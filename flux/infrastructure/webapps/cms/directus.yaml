apiVersion: v1
kind: Namespace
metadata:
  name: cms
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: directus-data
  namespace: webapps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: directus
  namespace: webapps
  labels:
    app: directus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: directus
  template:
    metadata:
      labels:
        app: directus
    spec:
      containers:
        - name: directus
          image: directus/directus:11
          resources:
            limits:
              memory: 512Mi
          ports:
            - containerPort: 8055
          env:
            - name: KEY
              value: "becklab-cms-secret-key"
            - name: SECRET
              value: "becklab-cms-secret"
            - name: ADMIN_EMAIL
              value: "admin@becklab.cloud"
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: directus-admin-password
                  key: admin-password
            - name: DB_CLIENT
              value: "sqlite3"
            - name: DB_FILENAME
              value: "/directus/database/data.db"
            - name: DB_AUTO_MIGRATE
              value: "true"
            - name: PUBLIC_URL
              value: "https://cms.becklab.cloud"
            - name: SERVER_DOMAIN
              value: "cms.becklab.cloud"
            - name: CORS_ENABLED
              value: "true"
            - name: CORS_ORIGIN
              value: "https://silex.becklab.cloud"
            - name: CORS_METHODS
              value: "GET,POST,PATCH,DELETE,OPTIONS"
            - name: CORS_ALLOWED_HEADERS
              value: "Content-Type,Authorization,Accept"
            - name: CORS_CREDENTIALS
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /directus/database
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: directus-data
---
apiVersion: v1
kind: Service
metadata:
  name: directus
  namespace: webapps
spec:
  selector:
    app: directus
  ports:
    - name: http
      port: 8055
      targetPort: 8055
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: directus-cors
  namespace: webapps
spec:
  headers:
    customResponseHeaders:
      Access-Control-Allow-Origin: "https://silex.becklab.cloud"
      Access-Control-Allow-Methods: "GET,POST,PATCH,DELETE,OPTIONS"
      Access-Control-Allow-Headers: "Content-Type,Authorization,Accept"
      Access-Control-Allow-Credentials: "true"
      Access-Control-Max-Age: "86400"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: directus
  namespace: webapps
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`cms.becklab.cloud`) && Method(`OPTIONS`)
      middlewares:
        - name: directus-cors
      services:
        - name: directus
          port: 8055
    - kind: Rule
      match: Host(`cms.becklab.cloud`)
      middlewares:
        - name: directus-cors
        - name: sso-admin-chain
          namespace: identity
      services:
        - name: directus
          port: 8055
  tls:
    secretName: cms-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cms
  namespace: webapps
spec:
  secretName: cms-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - cms.becklab.cloud
