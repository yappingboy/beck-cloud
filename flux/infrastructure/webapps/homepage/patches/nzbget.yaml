apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nzbget
  namespace: media
  annotations:
    gethomepage.dev/enabled: 'true'
    gethomepage.dev/description: NZB downloader
    gethomepage.dev/group: Media
    gethomepage.dev/icon: mdi-download-circle
    gethomepage.dev/name: NZBGet
    gethomepage.dev/widget.type: nzbget
    gethomepage.dev/widget.url: https://nzbget.becklab.cloud
    gethomepage.dev/weight: '7'
