apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-assistant
  namespace: webapps
  annotations:
    gethomepage.dev/enabled: 'true'
    gethomepage.dev/description: Smart home
    gethomepage.dev/group: Apps
    gethomepage.dev/icon: si-homeassistant
    gethomepage.dev/name: Home Assistant
    gethomepage.dev/widget.type: homeassistant
    gethomepage.dev/widget.url: https://ha.becklab.cloud
    gethomepage.dev/weight: '3'
    gethomepage.dev/href: https://ha.becklab.cloud
