---
apiVersion: batch/v1
kind: Job
metadata:
  name: build-landing-page
  namespace: toolbox
spec:
  template:
    spec:
      serviceAccountName: kaniko-builder
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:v1.24.0
          args:
            - --dockerfile=Dockerfile
            - --context=dir:///workspace/apps/landing-page
            - --destination=ghcr.io/yappingboy/becklab-landing:latest
            - --cache=true
            - --cache-repo=ghcr.io/yappingboy/kaniko-cache
            - --skip-tls-verify
          volumeMounts:
            - name: docker-config
              mountPath: /kaniko/.docker/config.json
              subPath: config.json
              readOnly: true
            - name: source
              mountPath: /workspace
              readOnly: true
      initContainers:
        - name: clone-source
          image: alpine/git:latest
          command:
            - sh
            - -c
            - |
              git clone --depth=1 https://github.com/yappingboy/beck-cloud.git /workspace
          volumeMounts:
            - name: source
              mountPath: /workspace
      restartPolicy: Never
      volumes:
        - name: docker-config
          secret:
            secretName: ghcr-credentials
            items:
              - key: .dockerconfigjson
                path: config.json
        - name: source
          emptyDir: {}
