apiVersion: v1
kind: ConfigMap
metadata:
  name: landing-app
  namespace: webapps
data:
  server.js: |
    const http = require('http');
    const fs = require('fs');
    const path = require('path');

    const HOSTING_DIR = process.env.HOSTING_DIR || '/hosting';
    const DIRECTUS_URL = process.env.DIRECTUS_URL || 'http://directus.webapps:8055';
    const DIRECTUS_EMAIL = process.env.DIRECTUS_EMAIL || '';
    const DIRECTUS_PASSWORD = process.env.DIRECTUS_PASSWORD || '';

    const u = new URL(DIRECTUS_URL);
    const DIRECTUS_HOST = u.hostname;
    const DIRECTUS_PORT = parseInt(u.port) || (u.protocol === 'https:' ? 443 : 80);

    // MIME types
    const MIME = {
      '.html': 'text/html', '.css': 'text/css', '.js': 'application/javascript',
      '.svg': 'image/svg+xml', '.ico': 'image/x-icon', '.png': 'image/png',
      '.jpg': 'image/jpeg', '.gif': 'image/gif', '.webp': 'image/webp',
      '.txt': 'text/plain', '.json': 'application/json',
      '.woff2': 'font/woff2', '.woff': 'font/woff', '.ttf': 'font/ttf',
    };

    function serveFile(res, filepath) {
      fs.readFile(filepath, (err, data) => {
        if (err) { res.writeHead(404); res.end('Not found'); return; }
        const ext = path.extname(filepath).toLowerCase();
        const mime = MIME[ext] || 'application/octet-stream';
        res.writeHead(200, { 'Content-Type': mime + '; charset=utf-8' });
        res.end(data);
      });
    }

    function findFile(reqPath) {
      // Direct path lookup
      let candidate = path.join(HOSTING_DIR, path.normalize(reqPath).replace(/^\.\.?(\/|$)/, ''));
      if (fs.existsSync(candidate) && fs.statSync(candidate).isFile()) return candidate;

      // Try .html fallback for directory-like paths
      let htmlCandidate = candidate + '.html';
      if (fs.existsSync(htmlCandidate)) return htmlCandidate;

      return null;
    }

    http.createServer((req, res) => {
      // Strip query string
      var reqPath = req.url.split('?')[0];
      if (!reqPath || reqPath === '/') reqPath = '/index.html';

      var file = findFile(reqPath);
      if (file) {
        serveFile(res, file);
      } else {
        res.writeHead(404, { 'Content-Type': 'text/plain' });
        res.end('404 — Not found');
      }
    }).listen(80, function() { console.log('Landing page on :80'); });
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing-page
  namespace: webapps
  labels:
    app: landing-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landing-page
  template:
    metadata:
      labels:
        app: landing-page
    spec:
      containers:
        - name: node
          image: node:22-alpine
          resources:
            limits:
              memory: 128Mi
          command: ["node", "/app/server.js"]
          env:
            - name: HOSTING_DIR
              value: "/hosting"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: app
              mountPath: /app
            - name: hosting
              mountPath: /hosting
              readOnly: true
      volumes:
        - name: app
          configMap:
            name: landing-app
        - name: hosting
          persistentVolumeClaim:
            claimName: silex-hosting
---
apiVersion: v1
kind: Service
metadata:
  name: landing-page
  namespace: webapps
spec:
  selector:
    app: landing-page
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: landing-page
  namespace: webapps
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - becklab.cloud
      secretName: landing-tls
  rules:
    - host: becklab.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: landing-page
                port:
                  number: 80
