apiVersion: v1
kind: ConfigMap
metadata:
  name: landing-app
  namespace: webapps
data:
  server.js: |
    const http = require('http');
    const fs = require('fs');
    const path = require('path');

    const HOSTING_DIR = process.env.HOSTING_DIR || '/hosting';
    const DIRECTUS_URL = process.env.DIRECTUS_URL || 'http://directus.webapps:8055';
    const DIRECTUS_EMAIL = process.env.DIRECTUS_EMAIL || '';
    const DIRECTUS_PASSWORD = process.env.DIRECTUS_PASSWORD || '';
    const CACHE_TTL = 10000;

    // Parse DIRECTUS_URL into hostname + port
    const u = new URL(DIRECTUS_URL);
    const DIRECTUS_HOST = u.hostname;
    const DIRECTUS_PORT = parseInt(u.port) || (u.protocol === 'https:' ? 443 : 80);

    let cachedHtml = null;
    let cacheTime = 0;
    let apiToken = null;
    let tokenExpiry = 0;

    function readHostingIndex() {
      try {
        const filepath = path.join(HOSTING_DIR, 'index.html');
        if (fs.existsSync(filepath)) return fs.readFileSync(filepath, 'utf8');
      } catch (e) { /* ignore */ }
      return null;
    }

    function httpReq(method, urlPath, body, bearerToken) {
      return new Promise((resolve) => {
        const data = body ? JSON.stringify(body) : '';
        const opts = { hostname: DIRECTUS_HOST, port: DIRECTUS_PORT, path: urlPath, method, timeout: 5000 };
        if (bearerToken) opts.headers = { Authorization: 'Bearer ' + bearerToken };
        if (data) opts.headers = Object.assign(opts.headers || {}, { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) });
        const req = http.request(opts, (res) => {
          let d = ''; res.on('data', c => d += c);
          res.on('end', () => resolve({ status: res.statusCode, body: d }));
        });
        req.on('error', () => resolve({ status: 0, body: '' }));
        req.on('timeout', () => { req.destroy(); resolve({ status: 0, body: '' }); });
        if (data) req.write(data);
        req.end();
      });
    }

    function ensureToken() {
      if (apiToken && Date.now() < tokenExpiry - 180000) return Promise.resolve(apiToken);
      return httpReq('POST', '/auth/login', { email: DIRECTUS_EMAIL, password: DIRECTUS_PASSWORD }).then((res) => {
        try {
          const json = JSON.parse(res.body);
          if (json.data && json.data.access_token) {
            apiToken = json.data.access_token;
            tokenExpiry = Date.now() + (json.data.expires || 900000);
            return apiToken;
          }
        } catch(e) {}
        const legacyToken = process.env.DIRECTUS_TOKEN || '';
        if (legacyToken) { apiToken = legacyToken; tokenExpiry = Date.now() + 600000; }
        return apiToken || null;
      });
    }

    function fetchDirectus() {
      return ensureToken().then((token) => {
        if (!token) return Promise.resolve(null);
        return httpReq('GET', '/items/pages', null, token).then((res) => {
          try {
            const json = JSON.parse(res.body);
            let page = null;
            if (json.data && Array.isArray(json.data) && json.data.length > 0) page = json.data[0];
            else if (json.data && typeof json.data === 'object' && !Array.isArray(json.data)) page = json.data;
            return page ? renderDirectus(page) : null;
          } catch(e) { return null; }
        });
      });
    }

    const S = 'body{font-family:system-ui;margin:0;background:#0f172a;color:#e2e8f0}.hero{text-align:center;padding:6rem 2rem}h1{font-size:3rem;margin-bottom:1rem}.content{max-width:800px;margin:0 auto;padding:2rem}a{color:#38bdf8;text-decoration:none}a:hover{text-decoration:underline}p{color:#94a3b8;line-height:1.6}';

    function renderDirectus(page) {
      var t = page.title || 'Becklab';
      var b = page.body || '<p>Home automation, media, and infrastructure.</p>';
      return '<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>' + t + '</title><style>' + S + '</style></head><body><div class="hero"><h1>' + t + '</h1></div><div class="content">' + b + '</div></body></html>';
    }

    function defaultPage() {
      return '<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Becklab</title><style>' + S + '</style></head><body><div class="hero"><h1>Becklab</h1><p>Home automation, media, and infrastructure.</p></div></body></html>';
    }

    function refreshCache() {
      // Priority: Directus > hosting index > default
      fetchDirectus().then(function(html) {
        if (html) { cachedHtml = html; cacheTime = Date.now(); }
        else {
          const hostingHtml = readHostingIndex();
          if (hostingHtml) { cachedHtml = hostingHtml; cacheTime = Date.now(); }
          else if (!cachedHtml) { cachedHtml = defaultPage(); cacheTime = Date.now(); }
        }
      });
    }

    http.createServer((req, res) => {
      if (!cachedHtml || Date.now() - cacheTime > CACHE_TTL) refreshCache();
      res.writeHead(200, { 'Content-Type': 'text/html' });
      res.end(cachedHtml || defaultPage());
    }).listen(80, function() { console.log('Landing page on :80'); refreshCache(); });
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing-page
  namespace: webapps
  labels:
    app: landing-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landing-page
  template:
    metadata:
      labels:
        app: landing-page
    spec:
      containers:
        - name: node
          image: node:22-alpine
          resources:
            limits:
              memory: 256Mi
          command: ["node", "/app/server.js"]
          env:
            - name: DIRECTUS_URL
              value: "http://directus.webapps:8055"
            - name: DIRECTUS_EMAIL
              value: "admin@becklab.cloud"
            - name: DIRECTUS_PASSWORD
              value: "changeme"
            - name: HOSTING_DIR
              value: "/hosting"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: app
              mountPath: /app
            - name: hosting
              mountPath: /hosting
              readOnly: true
      volumes:
        - name: app
          configMap:
            name: landing-app
        - name: hosting
          persistentVolumeClaim:
            claimName: silex-hosting
---
apiVersion: v1
kind: Service
metadata:
  name: landing-page
  namespace: webapps
spec:
  selector:
    app: landing-page
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: landing-page
  namespace: webapps
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - becklab.cloud
      secretName: landing-tls
  rules:
    - host: becklab.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: landing-page
                port:
                  number: 80
