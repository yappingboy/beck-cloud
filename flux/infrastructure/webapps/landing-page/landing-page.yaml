apiVersion: v1
kind: ConfigMap
metadata:
  name: landing-app
  namespace: webapps
data:
  server.js: |
    const http = require('http');
    const fs = require('fs');
    const path = require('path');

    const HOSTING_DIR = process.env.HOSTING_DIR || '/hosting';
    const DIRECTUS_URL = process.env.DIRECTUS_URL || 'http://directus.cms:8055';
    const DIRECTUS_TOKEN = process.env.DIRECTUS_TOKEN || '';
    const CACHE_TTL = 5000;

    let cachedHtml = null;
    let cacheTime = 0;

    function readHostingIndex() {
      try {
        const filepath = path.join(HOSTING_DIR, 'index.html');
        if (fs.existsSync(filepath)) {
          return fs.readFileSync(filepath, 'utf8');
        }
      } catch (e) { /* ignore */ }
      return null;
    }

    function fetchDirectus() {
      return new Promise((resolve) => {
        const url = DIRECTUS_URL + '/items/pages/home';
        const opts = { timeout: 5000 };
        if (DIRECTUS_TOKEN) opts.headers = { Authorization: 'Bearer ' + DIRECTUS_TOKEN };
        const req = http.get(url, opts, (res) => {
          let data = '';
          res.on('data', (chunk) => data += chunk);
          res.on('end', () => {
            try {
              const json = JSON.parse(data);
              if (json.data && json.data[0]) { resolve(renderDirectus(json.data[0])); }
              else { resolve(null); }
            } catch (e) { resolve(null); }
          });
        });
        req.on('error', () => resolve(null));
        req.on('timeout', () => { req.destroy(); resolve(null); });
      });
    }

    const S = 'body{font-family:system-ui;margin:0;background:#0f172a;color:#e2e8f0}.hero{text-align:center;padding:6rem 2rem}h1{font-size:3rem;margin-bottom:1rem}.content{max-width:800px;margin:0 auto;padding:2rem}a{color:#38bdf8;text-decoration:none}a:hover{text-decoration:underline}p{color:#94a3b8;line-height:1.6}';

    function renderDirectus(page) {
      var t = page.title || 'Becklab';
      var b = page.body || '<p>Home automation, media, and infrastructure.</p>';
      return '<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>' + t + '</title><style>' + S + '</style></head><body><div class="hero"><h1>' + t + '</h1></div><div class="content">' + b + '</div></body></html>';
    }

    function defaultPage() {
      return '<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Becklab</title><style>' + S + '</style></head><body><div class="hero"><h1>Becklab</h1><p>Home automation, media, and infrastructure.</p></div></body></html>';
    }

    function refreshCache() {
      // Priority: hosting index > Directus > default
      const hostingHtml = readHostingIndex();
      if (hostingHtml) {
        cachedHtml = hostingHtml;
        cacheTime = Date.now();
        return;
      }
      fetchDirectus().then(function(html) {
        if (html) { cachedHtml = html; cacheTime = Date.now(); }
        else if (!cachedHtml) { cachedHtml = defaultPage(); cacheTime = Date.now(); }
      });
    }

    http.createServer((req, res) => {
      if (!cachedHtml || Date.now() - cacheTime > CACHE_TTL) {
        refreshCache();
      }
      res.writeHead(200, { 'Content-Type': 'text/html' });
      res.end(cachedHtml || defaultPage());
    }).listen(80, function() { console.log('Landing page on :80'); refreshCache(); });
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing-page
  namespace: webapps
  labels:
    app: landing-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landing-page
  template:
    metadata:
      labels:
        app: landing-page
    spec:
      containers:
        - name: node
          image: node:22-alpine
          resources:
            limits:
              memory: 256Mi
          command: ["node", "/app/server.js"]
          env:
            - name: DIRECTUS_URL
              value: "http://directus.cms:8055"
            - name: DIRECTUS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cms-token
                  key: token
                  optional: true
            - name: HOSTING_DIR
              value: "/hosting"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: app
              mountPath: /app
            - name: hosting
              mountPath: /hosting
              readOnly: true
      volumes:
        - name: app
          configMap:
            name: landing-app
        - name: hosting
          persistentVolumeClaim:
            claimName: silex-hosting
---
apiVersion: v1
kind: Service
metadata:
  name: landing-page
  namespace: webapps
spec:
  selector:
    app: landing-page
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: landing-page
  namespace: webapps
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - becklab.cloud
      secretName: landing-tls
  rules:
    - host: becklab.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: landing-page
                port:
                  number: 80
