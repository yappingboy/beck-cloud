# 3D Printing IngressRoutes
# Each service exposed via Traefik with its own subdomain and TLS cert

---
# Manyfold — 3D asset library / model repository
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: manyfold
  namespace: 3dprinting
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`manyfold.becklab.cloud`)
      kind: Rule
      services:
        - name: manyfold
          port: 3214
  tls:
    secretName: manyfold-tls

