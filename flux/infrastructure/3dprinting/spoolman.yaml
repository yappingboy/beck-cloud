# Spoolman — filament spool manager
# ghcr.io/donkie/spoolman:latest, container port 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spoolman
  namespace: 3dprinting
  labels:
    app: spoolman
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spoolman
  template:
    metadata:
      labels:
        app: spoolman
    spec:
      containers:
        - name: spoolman
          image: ghcr.io/donkie/spoolman:latest
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 64Mi
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: TZ
              value: America/New_York
          volumeMounts:
            - name: data
              mountPath: /home/app/.local/share/spoolman
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: spoolman-data
---
apiVersion: v1
kind: Service
metadata:
  name: spoolman
  namespace: 3dprinting
spec:
  selector:
    app: spoolman
  ports:
    - port: 7912
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spoolman
  namespace: 3dprinting
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/middlewares: identity-sso-admin-chain@kubernetescrd
spec:
  tls:
    - hosts:
        - spoolman.becklab.cloud
      secretName: spoolman-tls
  rules:
    - host: spoolman.becklab.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spoolman
                port:
                  number: 7912
