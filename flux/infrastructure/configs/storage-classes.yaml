# StorageClasses: local-path-provisioner backed by ZFS tank
# All volumes are RWO Retain by default (configs, DBs).
# Shared media/torrent uses hostPath-based PVs in media/pvcs.yaml.

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-zfs
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: rke-driver-localpath
parameters:
  hostDir: /mnt/tank/k3s/volumes
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowExpansion: true
