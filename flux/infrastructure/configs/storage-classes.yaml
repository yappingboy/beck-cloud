# StorageClasses are managed by 05-k3s.yml, not Flux.
# The ceph-rbd StorageClass requires the MicroCeph cluster FSID at creation
# time, which is a runtime value not available in Git.
#
# Created by the playbook:
#   ceph-rbd  (default) — Ceph RBD block storage via ceph-csi-rbd
#                         pool: k3s-rbd, reclaimPolicy: Retain
#
# This ConfigMap exists so the configs/ kustomization has a valid resource.
apiVersion: v1
kind: ConfigMap
metadata:
  name: storage-config
  namespace: kube-system
data:
  backend: ceph-rbd
  provisioner: rbd.csi.ceph.com
  managed-by: ansible-05-k3s.yml
