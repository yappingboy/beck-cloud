# Storage backend note
# StorageClass: local-path (K3s built-in default)
# Provisioner: rancher.io/local-path
# Managed by: K3s (enabled by default when local-storage is not in --disable list)
#
# For distributed storage, consider adding Longhorn:
#   helm install longhorn longhorn/longhorn -n longhorn-system
apiVersion: v1
kind: ConfigMap
metadata:
  name: storage-config
  namespace: kube-system
data:
  backend: local-path
  provisioner: rancher.io/local-path
  managed-by: k3s-built-in
