apiVersion: ceph.rook.io/v1
kind: CephFilesystem
metadata:
  name: rook-ceph-fs
  namespace: rook-ceph
spec:
  metadataPool:
    failureDomain: host
    replicated:
      size: 1
  dataPools:
    - failureDomain: host
      name: data0
      replicated:
        size: 1
  metadataServer:
    activeCount: 1
    activeStandby: true
