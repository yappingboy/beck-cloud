apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  # Resolve *.becklab.cloud to the in-cluster Traefik service so pods don't
  # hairpin out to the public IP for SSO discovery (oauth2-proxy → keycloak).
  # The kubernetes plugin in this zone resolves the rewritten target name.
  becklab.server: |
    becklab.cloud:53 {
      rewrite stop {
        name regex (.*)\.becklab\.cloud traefik.traefik.svc.cluster.local answer auto
      }
      kubernetes cluster.local in-addr.arpa ip6.arpa {
        pods insecure
        fallthrough in-addr.arpa ip6.arpa
      }
      forward . /etc/resolv.conf
    }
