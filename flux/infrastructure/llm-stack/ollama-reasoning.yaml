apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama-reasoning
  namespace: llm
spec:
  interval: 1m
  chart:
    spec:
      chart: ollama
      version: 0.3.2
      sourceRef:
        kind: HelmRepository
        name: ollama
        namespace: flux-system
  values:
    fullnameOverride: ollama-reasoning
    replicaCount: 1
    resources:
      limits:
        cpu: 8
        memory: 8Gi
    model: qwen3:8b
    gpu:
      enabled: true
      timeSlicing:
        enabled: true
        replicas: 1
    parallel: 2
