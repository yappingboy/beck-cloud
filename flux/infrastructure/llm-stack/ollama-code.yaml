apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama-code
  namespace: llm
spec:
  interval: 1m
  chart:
    spec:
      chart: ollama
      version: 0.3.2
      sourceRef:
        kind: HelmRepository
        name: ollama-code
        namespace: flux-system
  values:
    fullnameOverride: ollama-code
    replicaCount: 1
    resources:
      limits:
        cpu: 6
        memory: 6Gi
    model: deepseek-coder:6.7b
    gpu:
      enabled: true
      timeSlicing:
        enabled: true
        replicas: 1
    parallel: 2
