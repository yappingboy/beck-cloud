apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: monitoring
spec:
  secretName: grafana-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - grafana.becklab.cloud
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    # Static assets - no auth required
    - match: Host(`grafana.becklab.cloud`) && PathPrefix(`/public/`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
    # API/measurement endpoints - no auth required
    - match: Host(`grafana.becklab.cloud`) && PathPrefix(`/api/graphql`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
    # Everything else - SSO auth required
    - match: Host(`grafana.becklab.cloud`)
      kind: Rule
      middlewares:
        - name: sso-admin-chain
          namespace: identity
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
  tls:
    secretName: grafana-tls
