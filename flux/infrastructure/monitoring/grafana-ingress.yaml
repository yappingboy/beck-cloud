apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: monitoring
spec:
  secretName: grafana-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - grafana.becklab.cloud
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    # All requests go through SSO. oauth2-proxy forward_auth validates cookie,
    # adds X-Auth-Request-Email header, Grafana reads it via auth.proxy.
    # No separate static-asset routes — Grafana's auth.proxy requires the header
    # on every request, and bypassing it causes 302 redirect loops.
    - match: Host(`grafana.becklab.cloud`)
      kind: Rule
      middlewares:
        - name: sso-admin-chain
          namespace: identity
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
  tls:
    secretName: grafana-tls
