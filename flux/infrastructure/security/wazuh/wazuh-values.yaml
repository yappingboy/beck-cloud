---
# Wazuh HelmRelease for BeckCloud security suite (Phase 1)
# Chart: morgoved/wazuh-helm v2.0.0 (Wazuh app 4.14.3)
# All components pinned to control-plane node for RAM headroom

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wazuh
  namespace: security
spec:
  interval: 1m
  chart:
    spec:
      chart: wazuh
      version: "2.0.0"
      sourceRef:
        kind: HelmRepository
        name: wazuh-helm
        namespace: flux-system
  timeout: 15m
  install:
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 5
  values:

    fullnameOverride: wazuh

    # ── Indexer (OpenSearch-based) ──────────────────────────────
    indexer:
      enabled: true
      replicas: 1
      images:
        repository: wazuh/wazuh-indexer
        tag: "4.14.3"
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          cpu: "1"
          memory: 3Gi
      storage:
        size: 50Gi
        # Uses local-path provisioner (default SC)
      nodeSelector:
        kubernetes.io/hostname: ip-172-16-0-20
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    # ── Manager ──────────────────────────────────────────────────
    manager:
      enabled: true
      replicas: 1
      images:
        repository: wazuh/wazuh-manager
        tag: "4.14.3"
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 250m
          memory: 1Gi
        limits:
          cpu: "1"
          memory: 2Gi
      storage:
        size: 10Gi
      nodeSelector:
        kubernetes.io/hostname: ip-172-16-0-20
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    # ── Dashboard ────────────────────────────────────────────────
    dashboard:
      enabled: true
      replicas: 1
      images:
        repository: wazuh/wazuh-dashboard
        tag: "4.14.3"
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      ingress:
        enabled: true
        className: traefik
        host: wazuh.becklab.cloud
        tls:
          - hosts:
              - wazuh.becklab.cloud
            secretName: wazuh-becklab-cloud-tls
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          traefik.ingress.kubernetes.io/router.middlewares: identity-sso-admin-chain@kubernetescrd
      nodeSelector:
        kubernetes.io/hostname: ip-172-16-0-20
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    # ── Certificates ─────────────────────────────────────────────
    # Disabled: self-signed certs + Cilium eBPF caused bootstrap deadlocks.
    # Internal comms are isolated by Wazuh NetworkPolicies in security ns.
    # External TLS handled by Traefik ingress + cert-manager.
    certificates:
      enabled: false
