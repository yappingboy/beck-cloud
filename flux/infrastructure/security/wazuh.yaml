apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wazuh
  namespace: security
spec:
  interval: 1m
  chart:
    spec:
      chart: wazuh
      version: 4.9.0
      sourceRef:
        kind: HelmRepository
        name: wazuh
        namespace: flux-system
  values:
    fullnameOverride: wazuh
    index:
      replicas: 1
      resources:
        limits:
          cpu: 1
          memory: 4Gi
      storage:
        size: 200Gi
    manager:
      replicas: 1
      resources:
        limits:
          cpu: 1
          memory: 4Gi
    dashboard:
      replicas: 1
      ingress:
        enabled: true
        className: traefik
        hosts:
          - wazuh.beckcloud.local
