apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: security
spec:
  interval: 1m
  chart:
    spec:
      chart: falco
      version: 8.0.3
      sourceRef:
        kind: HelmRepository
        name: falco
        namespace: flux-system
  values:
    fullnameOverride: falco
    falco:
      driver:
        kind: modern_ebpf
      priority: warning
      jsonOutput: true
      # syslogOutput disabled — wazuh-manager not deployed in this cluster.
      # Re-enable once Wazuh is provisioned (separate node recommended).
