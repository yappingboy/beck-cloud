apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: security
spec:
  interval: 1m
  chart:
    spec:
      chart: falco
      version: 4.24.0
      sourceRef:
        kind: HelmRepository
        name: falco
        namespace: flux-system
  values:
    fullnameOverride: falco
    falco:
      driver:
        kind: ebpf
      priority: warning
      jsonOutput: true
      syslogOutput:
        enabled: true
        endpoint: wazuh-manager.security.svc.cluster.local:514
