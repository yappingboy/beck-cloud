apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama-fast
  namespace: llm
spec:
  interval: 1m
  chart:
    spec:
      chart: ollama
      version: 0.3.2
      sourceRef:
        kind: HelmRepository
        name: ollama
        namespace: flux-system
  values:
    fullnameOverride: ollama-fast
    replicaCount: 1
    resources:
      limits:
        cpu: 4
        memory: 4Gi
    model: llama3.2:3b
    gpu:
      enabled: true
      timeSlicing:
        enabled: true
        replicas: 1
    parallel: 4
