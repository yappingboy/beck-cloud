apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flowise
  namespace: llm
spec:
  interval: 1m
  chart:
    spec:
      chart: flowise
      version: 1.0.0
      sourceRef:
        kind: HelmRepository
        name: flowise
        namespace: flux-system
  values:
    fullnameOverride: flowise
    replicaCount: 1
    storage:
      size: 10Gi
    openai:
      base_url: "http://litellm.llm.svc.cluster.local:8000/v1"
      api_key: "sk-homelab-litellm-internal"
    ingress:
      enabled: true
      className: traefik
      hosts:
        - flowise.beckcloud.local
