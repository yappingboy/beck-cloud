---
# SSO chain (keycloak-forwardauth + keycloak-errors + sso-chain) is disabled
# until the homelab Keycloak realm and oauth2-proxy client-secret are
# configured. The previous keycloak-errors spec was invalid (the errors
# middleware requires a `service:` field) which caused sso-chain to fail
# resolution, breaking every Ingress that referenced it.
#
# To re-enable once Keycloak is set up:
#   1. Restore keycloak-forwardauth + keycloak-errors (add `service:` to errors)
#   2. Restore sso-chain
#   3. Uncomment the middleware annotations on the *arr Ingresses and the
#      Traefik dashboard IngressRoute
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: traefik
spec:
  headers:
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    forceSTSHeader: true
    frameDeny: true
    contentTypeNosniff: true
    browserXssFilter: true
    customRequestHeaders:
      X-Forwarded-Proto: "https"
---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: traefik
spec:
  redirectScheme:
    scheme: https
    permanent: true
