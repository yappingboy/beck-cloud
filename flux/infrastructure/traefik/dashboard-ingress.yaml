apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard-https
  namespace: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  entryPoints:
    - websecure
  tls:
    secretName: traefik-dashboard-tls
  routes:
    - match: Host(`traefik.becklab.cloud`)
      kind: Rule
      middlewares:
        - name: sso-chain
          namespace: identity
      services:
        - name: api@internal
          kind: TraefikService
