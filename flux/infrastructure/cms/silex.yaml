---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: silex
  namespace: cms
  labels:
    app: silex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: silex
  template:
    metadata:
      labels:
        app: silex
    spec:
      containers:
        - name: silex
          image: silexlabs/silex-platform
          resources:
            limits:
              memory: 512Mi
          env:
            - name: SILEX_PORT
              value: 8888
          ports:
            - containerPort: 6805
---
apiVersion: v1
kind: Service
metadata:
  name: silex
  namespace: cms
spec:
  selector:
    app: silex
  ports:
    - name: http
      port: 6805
      targetPort: 6805
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: silex
  namespace: cms
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`silex.becklab.cloud`)
      middlewares:
        - name: sso-admin-chain
          namespace: identity
      services:
        - name: silex
          port: 6805
  tls:
    secretName: cms-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: silex
  namespace: cms
spec:
  secretName: silex-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - silex.becklab.cloud
