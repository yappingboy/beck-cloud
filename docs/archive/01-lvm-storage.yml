---
# 01-lvm-storage.yml — Create lv_tank and mount as the OpenNebula Tank datastore
#
# Replaces the old three-LV layout. In the new design:
#   /dev/md0 → vg_tank → lv_tank → /var/lib/one/datastores/101 (DS 101 = Tank)
# Tank holds the BecklabMedia DATABLOCK image, which is attached as a second
# disk (/dev/vdb) to k3s-worker-1 in 04-one-vms.yml.
#
# Prerequisites:
#   - mdadm /dev/md0 assembled
#   - VG created: vgcreate vg_tank /dev/md0
#   - OpenNebula CE installed (/var/lib/one/datastores exists, oneadmin user exists)
#
# Run: ansible-playbook -i inventory/hosts.yml playbooks/01-lvm-storage.yml

- name: Create lv_tank and mount it as the OpenNebula Tank datastore
  hosts: hypervisor
  become: true
  gather_facts: true

  tasks:
    - name: Verify Volume Group exists
      ansible.builtin.command: vgdisplay {{ lvm_vg_name }}
      register: vg_check
      changed_when: false
      failed_when: vg_check.rc != 0

    - name: Check if LV already exists
      ansible.builtin.command: lvdisplay /dev/{{ lvm_vg_name }}/{{ item.name }}
      register: lv_check
      failed_when: false
      changed_when: false
      loop: "{{ lvm_lvs }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Create logical volume (handles both fixed size and %FREE)
      ansible.builtin.command: >-
        lvcreate -y
        {{ ('-l ' + item.item.size) if '%' in item.item.size else ('-L ' + item.item.size) }}
        -n {{ item.item.name }} {{ lvm_vg_name }}
      when: item.rc != 0
      loop: "{{ lv_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      changed_when: item.rc != 0

    - name: Check filesystem
      ansible.builtin.command: blkid /dev/{{ lvm_vg_name }}/{{ item.name }}
      register: blkid_check
      failed_when: false
      changed_when: false
      loop: "{{ lvm_lvs }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Format LV with XFS
      ansible.builtin.filesystem:
        fstype: "{{ item.item.fstype }}"
        dev: "/dev/{{ lvm_vg_name }}/{{ item.item.name }}"
        force: false
      when: item.rc != 0
      loop: "{{ blkid_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Ensure mount point exists
      ansible.builtin.file:
        path: "{{ item.mountpoint }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: '0755'
      loop: "{{ lvm_lvs }}"
      loop_control:
        label: "{{ item.mountpoint }}"

    - name: Mount LV and persist to fstab
      ansible.posix.mount:
        path: "{{ item.mountpoint }}"
        src: "/dev/{{ lvm_vg_name }}/{{ item.name }}"
        fstype: "{{ item.fstype }}"
        opts: defaults,nofail
        state: mounted
      loop: "{{ lvm_lvs }}"
      loop_control:
        label: "{{ item.mountpoint }}"

    # xfs format wipes original directory ownership; reapply after mount.
    - name: Fix ownership on mounted volume
      ansible.builtin.file:
        path: "{{ item.mountpoint }}"
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        state: directory
      loop: "{{ lvm_lvs }}"
      loop_control:
        label: "{{ item.mountpoint }}"

  post_tasks:
    - name: Show mounted volumes
      ansible.builtin.command: df -h {{ lvm_lvs | map(attribute='mountpoint') | join(' ') }}
      register: df_out
      changed_when: false

    - name: Print mount summary
      ansible.builtin.debug:
        var: df_out.stdout_lines
