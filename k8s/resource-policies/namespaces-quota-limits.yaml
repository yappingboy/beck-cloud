# ============================================================================
# BeckCloud Namespace ResourceQuotas + LimitRanges
# Sourced from live pod usage (kubectl top) on 2026-07-14
# Applied via Flux Kustomization in infrastructure/ namespace overlays
# ============================================================================
# 
# Strategy: Set quotas at ~2x current observed usage to allow headroom for
# traffic spikes, without allowing any single namespace to starve the cluster.
# LimitRanges provide sensible defaults so pods without explicit resource specs
# get bounded behavior automatically.
#
# Cluster capacity (approximate, 2 nodes):
#   CPU: ~16 cores total (i5-14400)
#   Memory: ~32Gi usable per node (~64Gi total minus system overhead)
# ============================================================================

apiVersion: v1
kind: List
items:

# ============================================================================
# HIGH-RESOURCE NAMESPACE: media (Jellyfin, Sonarr, Radarr, etc.)
# Live usage: Jellyfin alone peaks at 1012m CPU / 5.7Gi memory
# Sonarr uses ~2.4Gi memory during indexing
# ============================================================================

- apiVersion: v1
  kind: ResourceQuota
  metadata:
    name: media-quota
    namespace: media
  spec:
    hard:
      pods: "16"
      requests.cpu: "6"
      requests.memory: 12Gi
      limits.cpu: "12"
      limits.memory: 24Gi

- apiVersion: v1
  kind: LimitRange
  metadata:
    name: media-limits
    namespace: media
  spec:
    limits:
      - type: Container
        default:
          cpu: "500m"
          memory: 1Gi
        defaultRequest:
          cpu: "100m"
          memory: 256Mi

# ============================================================================
# HIGH-RESOURCE NAMESPACE: security (Wazuh indexers/managers)
# Live usage: wazuh-indexer ~1.4Gi mem, managers ~790-889Mi each
# Suricata daemonsets add ~23Mi/node
