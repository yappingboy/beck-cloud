---
# 04-one-vms.yml — Provision K3s VMs via OpenNebula 7.2
#
# Prerequisites:
#   - 02-opennebula.yml completed (ONE API running, k3s-net vnet exists)
#
# Steps:
#   • Verify OpenNebula API reachable
#   • Upload ops_user SSH public key to oneadmin user attribute
#   • Upload Ubuntu 24.04 cloud image to OpenNebula datastore
#   • Create VM templates for k3s-server and k3s-worker-1
#   • Instantiate VMs and wait for RUNNING state
#   • Attach BecklabMedia disk to k3s-worker-1 post-boot (avoids ONe multi-DS scheduler bug)
#   • Run media mount script on k3s-worker-1
#   • Report IPs
#
# Run: ansible-playbook -i inventory/hosts.yml playbooks/04-one-vms.yml

- name: Provision K3s VMs on OpenNebula
  hosts: hypervisor
  become: true
  gather_facts: true

  vars:
    one_auth:
      ONE_AUTH: /var/lib/one/.one/one_auth
    # Executed by one-context on first boot of k3s-worker-1. Finds the
    # BecklabMedia disk by size (>=1TB, unmounted), formats it xfs with
    # LABEL=media if blank, mounts at /mnt/media (by label so the device name
    # can vary between boots — virt may assign vda/vdb/sdb depending on bus),
    # and creates the subdirectories that back the K8s media PVs.
    media_bootstrap_script: |
      #!/bin/bash
      set -e
      MOUNT=/mnt/media
      DISK=""
      for i in $(seq 1 60); do
        DISK=$(lsblk -bndo NAME,SIZE,TYPE,MOUNTPOINT | \
          awk '$3=="disk" && $4=="" && $2>=1099511627776 {print "/dev/"$1; exit}')
        [ -n "$DISK" ] && break
        sleep 2
      done
      [ -n "$DISK" ] || { echo "no >=1TB unmounted disk found" >&2; exit 1; }
      if ! blkid "$DISK" >/dev/null 2>&1; then
        mkfs.xfs -L media "$DISK"
      fi
      mkdir -p "$MOUNT"
      grep -q " $MOUNT " /etc/fstab || \
        echo "LABEL=media $MOUNT xfs defaults,nofail 0 0" >> /etc/fstab
      mount -a
      mkdir -p "$MOUNT/movies" "$MOUNT/shows" "$MOUNT/downloads"
      chown -R 1000:1000 "$MOUNT"

  tasks:
    # ── Sanity check ───────────────────────────────────────────────────────
    - name: Verify OpenNebula API is reachable
      ansible.builtin.command: onehost list
      environment: "{{ one_auth }}"
      register: onehost_check
      changed_when: false

    - name: Print host list
      ansible.builtin.debug:
        var: onehost_check.stdout_lines

    # ── SSH public key on oneadmin ─────────────────────────────────────────
    - name: Set SSH_PUBLIC_KEY on oneadmin user (uid 0)
      ansible.builtin.shell: |
        oneuser update 0 <<< 'SSH_PUBLIC_KEY = "{{ lookup("file", one_k3s_keypair_pub | expanduser) }}"'
      environment: "{{ one_auth }}"
      changed_when: true

    # ── Ubuntu cloud image ─────────────────────────────────────────────────
    - name: Check if Ubuntu image already exists in OpenNebula
      ansible.builtin.command: oneimage show {{ one_k3s_image }}
      environment: "{{ one_auth }}"
      register: image_check
      failed_when: false
      changed_when: false

    - name: Download Ubuntu cloud image
      ansible.builtin.get_url:
        url: "{{ one_k3s_image_url }}"
        dest: "/var/tmp/{{ one_k3s_image }}.img"
        timeout: 600
        mode: '0644'
      when: image_check.rc != 0

    - name: Write OpenNebula image template
      ansible.builtin.copy:
        content: |
          NAME   = "{{ one_k3s_image }}"
          PATH   = "/var/tmp/{{ one_k3s_image }}.img"
          TYPE   = "OS"
          FORMAT = "qcow2"
        dest: /var/tmp/one-image.tmpl
        mode: '0644'
      when: image_check.rc != 0

    - name: Create image in OpenNebula datastore
      ansible.builtin.command: oneimage create /var/tmp/one-image.tmpl --datastore default
      environment: "{{ one_auth }}"
      when: image_check.rc != 0

    - name: Wait for image to reach READY or USED state (up to 10 min)
      ansible.builtin.shell: |
        for i in $(seq 1 60); do
          state=$(oneimage show "{{ one_k3s_image }}" --json \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['IMAGE']['STATE'])" 2>/dev/null)
          # State 1 = READY, 2 = USED, 3 = USED_ALT (all acceptable)
          [ "$state" = "1" ] || [ "$state" = "2" ] || [ "$state" = "3" ] && exit 0
          sleep 10
        done
        exit 1
      environment: "{{ one_auth }}"
      changed_when: false
      when: image_check.rc == 0

    # ── VM templates ───────────────────────────────────────────────────────
    - name: Check if VM template exists
      ansible.builtin.command: onetemplate show {{ item.name }}-tpl
      environment: "{{ one_auth }}"
      register: template_check
      failed_when: false
      changed_when: false
      loop: "{{ one_k3s_vms }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Write VM template file
      ansible.builtin.copy:
        content: |
          NAME   = "{{ item.item.name }}-tpl"
          MEMORY = "{{ item.item.ram }}"
          CPU    = "{{ (item.item.vcpus / 4) | float }}"
          VCPU   = "{{ item.item.vcpus }}"
          OS     = [ ARCH = "x86_64", BOOT = "disk0" ]
          # host-passthrough exposes the host CPU directly so guests get
          # x86-64-v2/v3 features. Required by RHEL/UBI 9-based images
          # (Keycloak 25+, recent Bitnami builds, etc.) which use glibc 2.34+
          # and trap on x86-64-v2 SSE4.2/POPCNT/CX16 when missing.
          CPU_MODEL = [ MODEL = "host-passthrough" ]
          DISK   = [
            IMAGE       = "{{ one_k3s_image }}",
            IMAGE_UNAME = "oneadmin",
            SIZE        = "{{ item.item.disk * 1024 }}"
          ]
          # Media disk NOT in template — attached post-boot via onevm attach to
          # avoid ONe 7.2 multi-datastore scheduler bug (quoted AUTOMATIC_DS_REQUIREMENTS).
          {% if item.item.role == 'server' %}
          NIC    = [ NETWORK = "k3s-ext", NETWORK_UNAME = "oneadmin" ]
          {% endif %}
          NIC    = [ NETWORK = "k3s-int", NETWORK_UNAME = "oneadmin" ]
          CONTEXT = [
            NETWORK        = "YES",
            SSH_PUBLIC_KEY  = "$USER[SSH_PUBLIC_KEY]",
            GROW_ROOTFS    = "YES"
          ]
          GRAPHICS = [
            LISTEN = "0.0.0.0",
            TYPE   = "VNC"
          ]
        dest: "/tmp/{{ item.item.name }}-tpl.tmpl"
        mode: '0644'
      loop: "{{ template_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Create VM template in OpenNebula
      ansible.builtin.command: onetemplate create /tmp/{{ item.item.name }}-tpl.tmpl
      environment: "{{ one_auth }}"
      when: item.rc != 0
      loop: "{{ template_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Update VM template in OpenNebula (if already exists)
      ansible.builtin.command: onetemplate update {{ item.item.name }}-tpl /tmp/{{ item.item.name }}-tpl.tmpl
      environment: "{{ one_auth }}"
      when: item.rc == 0
      loop: "{{ template_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    # ── Instantiate VMs ────────────────────────────────────────────────────
    - name: Check if VM already exists
      ansible.builtin.command: onevm show {{ item.name }}
      environment: "{{ one_auth }}"
      register: vm_check
      failed_when: false
      changed_when: false
      loop: "{{ one_k3s_vms }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Instantiate VM from template
      ansible.builtin.command: onetemplate instantiate {{ item.item.name }}-tpl --name {{ item.item.name }}
      environment: "{{ one_auth }}"
      when: item.rc != 0
      loop: "{{ vm_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    # ── Fix scheduler issue with multi-datastore VMs ──────────────────────
    # OpenNebula 7.2 auto-generates AUTOMATIC_DS_REQUIREMENTS with quoted
    # attribute names ("CLUSTERS/ID" @> 0) that the scheduler can't evaluate
    # when a VM needs multiple datastores (e.g. default + Tank). This causes
    # the VM to stay in PENDING state forever. Workaround: manually deploy
    # any VM stuck in PENDING after a brief grace period.
    - name: Wait briefly for scheduler to place VMs
      ansible.builtin.pause:
        seconds: 30
      changed_when: false

    - name: Manually deploy VMs stuck in PENDING (multi-datastore scheduler bug)
      ansible.builtin.shell: |
        state=$(onevm show "{{ item.name }}" --json \
          | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['VM']['STATE'])" 2>/dev/null)
        if [ "$state" = "1" ]; then
          # State 1 = PENDING — try manual deploy to first available host
          host_id=$(onehost list --numeric \
            | awk '$5=="on" && $3=="1" {print $1; exit}')
          if [ -n "$host_id" ]; then
            onevm deploy "{{ item.name }}" "$host_id"
            echo "deployed to host $host_id"
          else
            echo "no suitable host found"
            exit 1
          fi
        else
          echo "VM state is $state, no deploy needed"
        fi
      environment: "{{ one_auth }}"
      changed_when: true
      loop: "{{ one_k3s_vms }}"
      loop_control:
        label: "{{ item.name }}"

    # ── Wait for VMs to be RUNNING ─────────────────────────────────────────
    - name: Wait for VM to reach RUNNING state
      ansible.builtin.shell: |
        for i in $(seq 1 30); do
          state=$(onevm show "{{ item.name }}" --json \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['VM']['STATE'])" 2>/dev/null)
          # State 3 = ACTIVE (running)
          [ "$state" = "3" ] && exit 0
          sleep 15
        done
        exit 1
      environment: "{{ one_auth }}"
      changed_when: false
      loop: "{{ one_k3s_vms }}"
      loop_control:
        label: "{{ item.name }}"

    # ── Attach media disk to k3s-worker-1 post-boot ──────────────────────
    # ONe 7.2 scheduler cannot place VMs needing multiple datastores
    # (default + Tank). Workaround: deploy with OS disk only, then attach
    # the media disk once the VM is running on the host.
    - name: Wait for k3s-worker-1 SSH to become available
      ansible.builtin.wait_for_connection:
        delay: 30
        sleep: 10
        timeout: 300
      delegate_to: k3s-worker-1

    - name: Attach BecklabMedia disk to k3s-worker-1
      ansible.builtin.shell: |
        vm_id=$(onevm show k3s-worker-1 --json \
          | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['VM']['ID'])" 2>/dev/null)
        image_id=$(oneimage show BecklabMedia --json \
          | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['IMAGE']['ID'])" 2>/dev/null)
        onevm attach "$vm_id" "$image_id"
      environment: "{{ one_auth }}"
      changed_when: true

    - name: Wait for media disk to appear inside k3s-worker-1
      ansible.builtin.pause:
        seconds: 30
      changed_when: false

    - name: Run media mount script on k3s-worker-1
      ansible.builtin.shell: |
        {{ media_bootstrap_script }}
      delegate_to: k3s-worker-1
      become: true
      changed_when: true

    # ── Gather IPs ─────────────────────────────────────────────────────────
    - name: Get VM IP address
      ansible.builtin.shell: |
        onevm show {{ item.name }} --json \
          | python3 -c "import sys,json; d=json.load(sys.stdin); n=d['VM']['TEMPLATE']['NIC']; print(n['IP'] if isinstance(n,dict) else n[0]['IP'])"
      environment: "{{ one_auth }}"
      register: vm_ips
      changed_when: false
      loop: "{{ one_k3s_vms }}"
      loop_control:
        label: "{{ item.name }}"

  post_tasks:
    - name: List all VMs
      ansible.builtin.command: onevm list
      environment: "{{ one_auth }}"
      register: vm_list
      changed_when: false

    - name: Print VM list
      ansible.builtin.debug:
        var: vm_list.stdout_lines

    - name: Print VM IPs
      ansible.builtin.debug:
        msg: "{{ item.item.name }}: {{ item.stdout }}"
      loop: "{{ vm_ips.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Remind to update inventory
      ansible.builtin.debug:
        msg: "Update inventory/hosts.yml k3s_nodes with the IPs above"
