---
# 00-sunbeam.yml — Install and bootstrap Sunbeam OpenStack (single-node)
# Run FIRST, before any other playbook.
# Run: ansible-playbook -i inventory/hosts.yml playbooks/00-sunbeam.yml
#
# Prerequisites:
#   - Ubuntu 24.04 LTS (noble) installed
#   - VT-x/AMD-V enabled in BIOS
#   - ops_user has passwordless sudo
#   - Physical NIC is up with a routable IPv4 address
#
# What this does:
#   1. Installs the openstack snap (Sunbeam)
#   2. Runs `sunbeam prepare-node-script` — Sunbeam's own prep (groups, sysctls,
#      kernel modules, microk8s/juju snaps). DO NOT pre-install juju/lxd ourselves.
#   3. Bootstraps a single-node cluster (control + compute, no MicroCeph OSDs)
#   4. Configures external networking for floating IPs
#   5. Creates Nova flavors and uploads the SSH keypair
#
# Re-entrant: if bootstrap fails mid-way, re-running the playbook resumes
# from the failure point. Use `sunbeam cluster status` to inspect state.

- name: Install and bootstrap Sunbeam OpenStack
  hosts: hypervisor
  become: false
  gather_facts: true

  vars:
    openrc_path: "/home/{{ ops_user }}/openrc"
    manifest_path: "/home/{{ ops_user }}/sunbeam-manifest.yaml"

  tasks:
    - name: Check if openstack snap already installed
      ansible.builtin.command: snap list openstack
      register: snap_check
      failed_when: false
      changed_when: false

    - name: Install openstack snap
      become: true
      ansible.builtin.command: snap install openstack --channel="{{ sunbeam_channel }}"
      when: snap_check.rc != 0
      changed_when: true

    - name: Run sunbeam prepare-node-script (handles groups, sysctls, juju, microk8s)
      become: true
      ansible.builtin.shell: |
        set -o pipefail
        sunbeam prepare-node-script --bootstrap | bash -x
      args:
        executable: /bin/bash
      changed_when: true

    - name: Ensure SSH keypair exists for ops_user
      ansible.builtin.user:
        name: "{{ ops_user }}"
        generate_ssh_key: true
        ssh_key_type: ed25519
        ssh_key_file: .ssh/id_ed25519

    - name: Reset SSH connection to pick up group memberships added by prepare-node-script
      ansible.builtin.meta: reset_connection

    - name: Render Sunbeam deployment manifest
      ansible.builtin.template:
        src: templates/sunbeam-manifest.yaml.j2
        dest: "{{ manifest_path }}"
        mode: '0600'

    - name: Check if Sunbeam cluster is fully deployed
      ansible.builtin.shell: >
        sunbeam cluster status 2>/dev/null | grep -qi "active\|deployed\|ready"
      register: sunbeam_deployed
      failed_when: false
      changed_when: false

    - name: Bootstrap Sunbeam cluster (control + compute, no MicroCeph storage)
      ansible.builtin.command: >
        sunbeam cluster bootstrap
        --role control,compute
        --manifest {{ manifest_path }}
        --accept-defaults
      when: sunbeam_deployed.rc != 0
      changed_when: true
      async: 3600
      poll: 30

    - name: Check if openrc already valid
      ansible.builtin.shell: grep -q OS_AUTH_URL {{ openrc_path }} 2>/dev/null
      register: openrc_valid
      failed_when: false
      changed_when: false

    - name: Run sunbeam configure (only if openrc missing/invalid)
      ansible.builtin.command: >
        sunbeam configure
        --openrc {{ openrc_path }}
        --manifest {{ manifest_path }}
        --accept-defaults
      when: openrc_valid.rc != 0
      changed_when: true

    - name: Generate openrc from sunbeam (authoritative source)
      ansible.builtin.shell: sunbeam openrc > {{ openrc_path }}
      changed_when: true

    - name: Verify openrc has required auth-url
      ansible.builtin.shell: grep -q OS_AUTH_URL {{ openrc_path }}
      changed_when: false

    - name: Secure openrc file
      ansible.builtin.file:
        path: "{{ openrc_path }}"
        mode: '0600'

    - name: Install OpenStack CLI client
      become: true
      ansible.builtin.apt:
        name:
          - python3-openstackclient
          - python3-keystoneauth1
        state: present
        update_cache: true

    - name: Wait for OpenStack API to respond
      ansible.builtin.shell: |
        set -e
        . {{ openrc_path }}
        openstack catalog list -f value -c Name
      register: catalog_check
      retries: 12
      delay: 30
      until: catalog_check.rc == 0
      changed_when: false

    - name: Create Nova flavors
      ansible.builtin.shell: |
        set -e
        . {{ openrc_path }}
        openstack flavor show {{ item.name }} > /dev/null 2>&1 || \
        openstack flavor create \
          --ram {{ item.ram }} \
          --disk {{ item.disk }} \
          --vcpus {{ item.vcpus }} \
          --public \
          {{ item.name }}
      loop: "{{ nova_flavors }}"
      changed_when: true

    - name: Upload SSH keypair to Nova
      ansible.builtin.shell: |
        set -e
        . {{ openrc_path }}
        openstack keypair show {{ nova_k3s_keypair }} > /dev/null 2>&1 || \
        openstack keypair create \
          --public-key {{ nova_k3s_keypair_pub }} \
          {{ nova_k3s_keypair }}
      changed_when: true

  post_tasks:
    - name: Display Sunbeam status
      ansible.builtin.command: sunbeam cluster status
      changed_when: false
      register: sunbeam_status

    - name: Print status
      ansible.builtin.debug:
        msg: |
          {{ sunbeam_status.stdout }}

          Next steps:
            1. Verify Horizon at http://{{ homelab_ip }} or via: sunbeam dashboard-url
            2. Run: ansible-playbook playbooks/01-os-prep.yml
            3. Run: ansible-playbook playbooks/02-zfs.yml  (set wipe_disks=true on first run)
