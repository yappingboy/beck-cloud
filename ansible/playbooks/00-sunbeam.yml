---
# 00-sunbeam.yml — Install and bootstrap Sunbeam OpenStack (single-node)
# Run FIRST, before any other playbook.
# Run: ansible-playbook -i inventory/hosts.yml playbooks/00-sunbeam.yml
#
# Prerequisites:
#   - Ubuntu 26.04 LTS installed, snap available
#   - VT-x/AMD-V enabled in BIOS
#   - ops_user has passwordless sudo
#   - Physical NIC is up on 172.16.0.0/24
#
# What this does:
#   1. Installs the openstack snap (Sunbeam)
#   2. Prepares the node (groups, kernel params, OVN)
#   3. Bootstraps a single-node OpenStack cluster (control + compute only)
#   4. Configures external networking for floating IPs
#   5. Creates Nova flavors and uploads the SSH keypair
#
# NOTE: sunbeam cluster bootstrap takes 15-30 minutes on first run.
# If it fails mid-way, run: sunbeam cluster bootstrap --role control,compute
# again — it is designed to be re-entrant.

- name: Install and bootstrap Sunbeam OpenStack
  hosts: hypervisor
  become: false
  gather_facts: true

  vars:
    openrc_path: "/home/{{ ops_user }}/openrc"
    manifest_path: "/home/{{ ops_user }}/sunbeam-manifest.yaml"

  tasks:
    - name: Check if openstack snap already installed
      ansible.builtin.command: snap list openstack
      register: snap_check
      failed_when: false
      changed_when: false

    - name: Install openstack snap
      become: true
      ansible.builtin.command: snap install openstack --channel="{{ sunbeam_channel }}"
      when: snap_check.rc != 0
      changed_when: true

    - name: Check if juju snap already installed
      ansible.builtin.command: snap list juju
      register: juju_check
      failed_when: false
      changed_when: false

    - name: Install juju snap (required by Sunbeam bootstrap)
      become: true
      ansible.builtin.command: snap install juju --channel="3/stable"
      when: juju_check.rc != 0
      changed_when: true

    - name: Ensure SSH keypair exists for ops_user
      ansible.builtin.user:
        name: "{{ ops_user }}"
        generate_ssh_key: true
        ssh_key_type: ed25519
        ssh_key_file: .ssh/id_ed25519

    - name: Allow ops_user to SSH into localhost without password
      ansible.posix.authorized_key:
        user: "{{ ops_user }}"
        state: present
        key: "{{ lookup('file', '/home/{{ ops_user }}/.ssh/id_ed25519.pub') }}"

    - name: Add ops_user to required groups (snap_daemon, libvirt, kvm)
      become: true
      ansible.builtin.user:
        name: "{{ ops_user }}"
        groups: "{{ item }}"
        append: true
      loop:
        - snap_daemon
        - libvirt
        - kvm
      ignore_errors: true  # Groups may not exist until snap is fully initialized

    - name: Reset SSH connection to pick up new group membership
      ansible.builtin.meta: reset_connection

    - name: Copy Sunbeam manifest
      ansible.builtin.template:
        src: templates/sunbeam-manifest.yaml.j2
        dest: "{{ manifest_path }}"
        mode: '0600'

    - name: Connect required snap interfaces for openstack
      become: true
      ansible.builtin.command: snap connect openstack:{{ item }}
      loop:
        - ssh-keys
        - dot-local-share-juju
      failed_when: false
      changed_when: true

    - name: Check if lxd snap already installed
      ansible.builtin.command: snap list lxd
      register: lxd_check
      failed_when: false
      changed_when: false

    - name: Install lxd snap
      become: true
      ansible.builtin.command: snap install lxd --channel="latest/stable"
      when: lxd_check.rc != 0
      changed_when: true

    - name: Add ops_user to lxd group
      become: true
      ansible.builtin.user:
        name: "{{ ops_user }}"
        groups: lxd
        append: true

    - name: Reset SSH connection to pick up lxd group
      ansible.builtin.meta: reset_connection

    - name: Check if LXD is already initialized
      ansible.builtin.command: lxc storage list
      register: lxd_init_check
      failed_when: false
      changed_when: false

    - name: Initialize LXD with auto config
      ansible.builtin.command: lxd init --auto
      when: lxd_init_check.rc != 0
      changed_when: true

    - name: Ensure lxdbr0 bridge exists
      become: true
      ansible.builtin.command: lxc network create lxdbr0
      register: bridge_create
      failed_when: false
      changed_when: bridge_create.rc == 0

    - name: Check if Juju controller already exists
      ansible.builtin.command: juju controllers
      register: juju_ctrl_check
      failed_when: false
      changed_when: false

    - name: Check for stale Juju machine agent services (persists across snap purge)
      ansible.builtin.shell: >
        systemctl list-units --all 'jujud-machine-*' --no-legend | grep -q jujud-machine
      register: juju_machine_agent_check
      failed_when: false
      changed_when: false

    - name: Remove stale Juju machine agent (causes 'machine is already provisioned')
      become: true
      when: >
        'localhost' not in juju_ctrl_check.stdout and
        juju_machine_agent_check.rc == 0
      block:
        - name: Stop juju machine agent services
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: stopped
          with_fileglob: /etc/systemd/system/jujud-machine-*.service
          ignore_errors: true

        - name: Remove juju machine agent service files
          ansible.builtin.shell: rm -f /etc/systemd/system/jujud-machine-*.service
          changed_when: true

        - name: Remove juju machine agent data directory
          ansible.builtin.file:
            path: /var/lib/juju
            state: absent

        - name: Reload systemd after removing machine agent
          ansible.builtin.systemd:
            daemon_reload: true

    - name: Remove stale Juju LXD trust entries if controller is absent
      ansible.builtin.shell: |
        lxc config trust list -f csv 2>/dev/null \
          | grep -i juju \
          | cut -d',' -f4 \
          | xargs -r -I{} lxc config trust remove {} 2>/dev/null
        exit 0
      when: "'localhost' not in juju_ctrl_check.stdout"
      failed_when: false
      changed_when: false

    - name: Bootstrap Juju controller on LXD
      ansible.builtin.command: juju bootstrap localhost
      when: "'localhost' not in juju_ctrl_check.stdout"
      changed_when: true
      async: 1800
      poll: 15

    - name: Wait for Juju controller API to be reachable
      ansible.builtin.command: juju controllers
      register: juju_ready
      until: juju_ready.rc == 0
      retries: 20
      delay: 15
      changed_when: false

    - name: Reload Juju spaces so subnets are discoverable by Sunbeam
      ansible.builtin.command: juju reload-spaces --model controller
      register: reload_spaces
      failed_when: false
      changed_when: false

    - name: Check if Sunbeam cluster is fully deployed
      ansible.builtin.shell: >
        sunbeam cluster status 2>/dev/null | grep -qi "active\|deployed\|ready"
      register: sunbeam_deployed_check
      failed_when: false
      changed_when: false

    - name: Bootstrap Sunbeam cluster (control + compute, no MicroCeph storage)
      ansible.builtin.command: >
        sunbeam cluster bootstrap
        --role control,compute
        --manifest {{ manifest_path }}
        --accept-defaults
      when: sunbeam_deployed_check.rc != 0
      changed_when: true
      async: 2400
      poll: 30
      # prepare-node was removed in 2024.1 — bootstrap handles node setup internally.

    - name: Check if sunbeam already configured (openrc exists and has auth-url)
      ansible.builtin.shell: >
        grep -q OS_AUTH_URL {{ openrc_path }} 2>/dev/null
      register: openrc_valid
      failed_when: false
      changed_when: false

    - name: Run sunbeam configure
      ansible.builtin.command: >
        sunbeam configure
        --openrc {{ openrc_path }}
        --accept-defaults
      when: openrc_valid.rc != 0
      changed_when: true
      failed_when: false
      register: configure_result

    - name: Generate openrc from sunbeam (authoritative source, always overwrites stale file)
      ansible.builtin.shell: sunbeam openrc > {{ openrc_path }}
      changed_when: true

    - name: Verify openrc has required auth-url
      ansible.builtin.shell: grep -q OS_AUTH_URL {{ openrc_path }}
      changed_when: false

    - name: Secure openrc file
      ansible.builtin.file:
        path: "{{ openrc_path }}"
        mode: '0600'

    - name: Install OpenStack CLI client
      become: true
      ansible.builtin.apt:
        name:
          - python3-openstackclient
          - python3-keystoneauth1
        state: present
        update_cache: true

    - name: Wait for OpenStack API to respond
      ansible.builtin.shell: |
        set -e
        . {{ openrc_path }}
        openstack catalog list -f value -c Name
      register: catalog_check
      retries: 12
      delay: 30
      until: catalog_check.rc == 0
      changed_when: false

    - name: Create Nova flavors
      ansible.builtin.shell: |
        set -e
        . {{ openrc_path }}
        openstack flavor show {{ item.name }} > /dev/null 2>&1 || \
        openstack flavor create \
          --ram {{ item.ram }} \
          --disk {{ item.disk }} \
          --vcpus {{ item.vcpus }} \
          --public \
          {{ item.name }}
      loop: "{{ nova_flavors }}"
      changed_when: true

    - name: Upload SSH keypair to Nova
      ansible.builtin.shell: |
        set -e
        . {{ openrc_path }}
        openstack keypair show {{ nova_k3s_keypair }} > /dev/null 2>&1 || \
        openstack keypair create \
          --public-key {{ nova_k3s_keypair_pub }} \
          {{ nova_k3s_keypair }}
      changed_when: true

  post_tasks:
    - name: Display Sunbeam status
      ansible.builtin.command: sunbeam cluster status
      changed_when: false
      register: sunbeam_status

    - name: Print status
      ansible.builtin.debug:
        msg: |
          {{ sunbeam_status.stdout }}

          Next steps:
            1. Verify Horizon at http://{{ homelab_ip }} or via: sunbeam dashboard-url
            2. Run: ansible-playbook playbooks/01-os-prep.yml
            3. Run: ansible-playbook playbooks/02-zfs.yml  (set wipe_disks=true on first run)
