---
# 03-harden.yml — Post-OpenNebula hardening for AlmaLinux 9
#
# This runs after 02-opennebula.yml. OpenNebula's networking (one0 bridge,
# NAT masquerade) is already established by then — we lock things down
# without killing existing flows.
#
# What lives here:
#   • Sysctl tuning (networking, memory, inotify, hugepages)
#   • bridge-nf-call-iptables = 0 on the host (K3s VMs inside ONE override to 1)
#   • Optional NVIDIA driver install (install_nvidia=true)
#   • SSH hardening
#   • firewalld: open required ports, allow VM subnet in trusted zone, masquerade
#
# Run: ansible-playbook -i inventory/hosts.yml playbooks/03-harden.yml

- name: Host hardening (post-OpenNebula)
  hosts: hypervisor
  become: true
  gather_facts: true

  tasks:
    - name: Set sysctl parameters
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - { key: 'net.ipv4.ip_forward',                  value: '1' }
        # OpenNebula manages bridging; keep bridge-nf-call at 0 on the host.
        # K3s nodes (inside ONE VMs) set this to 1 in 05-k3s.yml,
        # which is the correct scope.
        - { key: 'net.bridge.bridge-nf-call-iptables',   value: '0' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables',  value: '0' }
        - { key: 'net.netfilter.nf_conntrack_max',        value: '1048576' }
        - { key: 'vm.swappiness',                         value: '10' }
        - { key: 'vm.dirty_ratio',                        value: '10' }
        - { key: 'vm.dirty_background_ratio',             value: '5' }
        - { key: 'vm.max_map_count',                      value: '262144' }
        - { key: 'fs.inotify.max_user_watches',           value: '524288' }
        - { key: 'fs.inotify.max_user_instances',         value: '8192' }
        # Hugepages for KVM/QEMU performance
        - { key: 'vm.nr_hugepages',                       value: '4096' }
      failed_when: false

    # ── NVIDIA drivers ───────────────────────────────────────────────
    # Only runs when install_nvidia: true (group_vars/all.yml).
    # Titan RTX (TU102) has 24GB GDDR6 — stays on host for llama-server (08-ai-sysadmin.yml).
    - name: Install NVIDIA CUDA toolkit
      ansible.builtin.dnf:
        name:
          - nvidia-cuda-toolkit
        state: present
      when: install_nvidia | bool

    - name: Check if NVIDIA driver already loaded
      ansible.builtin.command: nvidia-smi
      register: nvidia_check
      failed_when: false
      changed_when: false
      when: install_nvidia | bool

    - name: Install recommended NVIDIA driver
      ansible.builtin.shell: nvidia-driver install --accept-license
      args:
        executable: /bin/bash
      when: install_nvidia | bool and nvidia_check.rc != 0
      register: nvidia_install

    - name: Reboot to activate NVIDIA kernel module
      ansible.builtin.reboot:
        msg: "Rebooting to activate NVIDIA drivers"
        reboot_timeout: 300
      when: install_nvidia | bool and nvidia_install is changed

    - name: Verify NVIDIA driver is active post-reboot
      ansible.builtin.command: nvidia-smi
      register: nvidia_verify
      changed_when: false
      failed_when: nvidia_verify.rc != 0
      when: install_nvidia | bool

    # ── SSH hardening ───────────────────────────────────────────────────────
    - name: Harden SSH configuration
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      loop:
        - { regexp: '^#?PermitRootLogin',       line: 'PermitRootLogin prohibit-password' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?X11Forwarding',          line: 'X11Forwarding no' }
        - { regexp: '^#?MaxAuthTries',           line: 'MaxAuthTries 3' }
        - { regexp: '^#?LoginGraceTime',         line: 'LoginGraceTime 60' }
      notify: restart sshd

    # ── firewalld ───────────────────────────────────────────────────────────
    - name: Ensure firewalld is enabled and running
      ansible.builtin.systemd:
        name: firewalld
        enabled: true
        state: started

    - name: Open required ports in firewalld
      ansible.posix.firewalld:
        port: "{{ item.port }}/{{ item.proto | default('tcp') }}"
        permanent: true
        state: enabled
        immediate: true
      loop: "{{ firewall_allowed_ports }}"

    - name: Allow VM subnet (192.168.100.0/24) in trusted zone
      ansible.posix.firewalld:
        source: "{{ one_vm_cidr }}"
        zone: trusted
        permanent: true
        state: enabled
        immediate: true

    - name: Enable masquerade for VM outbound traffic
      ansible.posix.firewalld:
        masquerade: true
        zone: public
        permanent: true
        state: enabled
        immediate: true

    # ── Port-forward hypervisor public IP → K3s VMs ────────────────────────
    # Lets kubectl and web browsers reach the cluster without a VPN.
    # 6443  → k3s-server  (Kubernetes API)
    # 80    → k3s-server  (HTTP ingress / Cilium Gateway)
    # 443   → k3s-server  (HTTPS ingress / Cilium Gateway)
    - name: Forward K3s API (6443) from hypervisor to k3s-server
      ansible.builtin.command: >
        firewall-cmd --permanent --zone=public
        --add-forward-port=port=6443:proto=tcp:toport=6443:toaddr={{ one_k3s_server_ip }}
      changed_when: true
      failed_when: false

    - name: Forward HTTP (80) from hypervisor to k3s-server
      ansible.builtin.command: >
        firewall-cmd --permanent --zone=public
        --add-forward-port=port=80:proto=tcp:toport=80:toaddr={{ one_k3s_server_ip }}
      changed_when: true
      failed_when: false

    - name: Forward HTTPS (443) from hypervisor to k3s-server
      ansible.builtin.command: >
        firewall-cmd --permanent --zone=public
        --add-forward-port=port=443:proto=tcp:toport=443:toaddr={{ one_k3s_server_ip }}
      changed_when: true
      failed_when: false

    - name: Reload firewalld to apply port forwards
      ansible.builtin.command: firewall-cmd --reload
      changed_when: true

  handlers:
    - name: restart sshd
      ansible.builtin.systemd:
        name: sshd
        state: restarted
