---
# 03-harden.yml — Apply host hardening AFTER Sunbeam is bootstrapped.
#
# This runs after 02-sunbeam.yml deliberately: enabling UFW or turning on
# bridge-nf-call during Sunbeam bootstrap breaks LXD's dnsmasq and hangs
# juju with "Waiting for address". By the time we get here, juju has its
# controller container running and Sunbeam's networking is established —
# we just need to lock things down without killing the existing flows.
#
# What lives here:
#   • Sysctl tuning (networking, memory, inotify, hugepages)
#   • bridge-nf-call-iptables = 0 on the LXD host (K3s VMs override to 1)
#   • Optional NVIDIA driver install (install_nvidia=true)
#   • SSH hardening
#   • UFW with LXD-friendly forward policy + explicit lxdbr0 allow rules
#
# Run: ansible-playbook -i inventory/hosts.yml playbooks/03-harden.yml

- name: Host hardening (post-Sunbeam)
  hosts: hypervisor
  become: true
  gather_facts: true

  tasks:
    - name: Set sysctl parameters
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - { key: 'net.ipv4.ip_forward',                  value: '1' }
        # bridge-nf-call-iptables must be 0 on the LXD host: when 1, UFW's
        # default DROP filters DHCP packets between juju controller
        # containers and dnsmasq on lxdbr0, causing "Waiting for address"
        # bootstrap hangs. K3s nodes (Nova VMs) set this to 1 in 05-k3s.yml,
        # which is the correct scope.
        - { key: 'net.bridge.bridge-nf-call-iptables',   value: '0' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables',  value: '0' }
        - { key: 'net.netfilter.nf_conntrack_max',        value: '1048576' }
        - { key: 'vm.swappiness',                         value: '10' }
        - { key: 'vm.dirty_ratio',                        value: '10' }
        - { key: 'vm.dirty_background_ratio',             value: '5' }
        - { key: 'vm.max_map_count',                      value: '262144' }
        - { key: 'fs.inotify.max_user_watches',           value: '524288' }
        - { key: 'fs.inotify.max_user_instances',         value: '8192' }
        # Hugepages for KVM/QEMU performance
        - { key: 'vm.nr_hugepages',                       value: '4096' }
      failed_when: false

    # ── NVIDIA drivers ───────────────────────────────────────────────────
    # Only runs when install_nvidia: true (group_vars/all.yml).
    # Titan RTX (TU102) has 24GB GDDR6 — stays on host for llama-server (08-ai-sysadmin.yml).
    - name: Install ubuntu-drivers utility and CUDA toolkit
      ansible.builtin.apt:
        name:
          - ubuntu-drivers-common
          - nvidia-cuda-toolkit
        state: present
      when: install_nvidia | bool

    - name: Check if NVIDIA driver already loaded
      ansible.builtin.command: nvidia-smi
      register: nvidia_check
      failed_when: false
      changed_when: false
      when: install_nvidia | bool

    - name: Install recommended NVIDIA driver
      ansible.builtin.shell: ubuntu-drivers autoinstall
      args:
        executable: /bin/bash
      when: install_nvidia | bool and nvidia_check.rc != 0
      register: nvidia_install

    - name: Reboot to activate NVIDIA kernel module
      ansible.builtin.reboot:
        msg: "Rebooting to activate NVIDIA drivers"
        reboot_timeout: 300
      when: install_nvidia | bool and nvidia_install is changed

    - name: Verify NVIDIA driver is active post-reboot
      ansible.builtin.command: nvidia-smi
      register: nvidia_verify
      changed_when: false
      failed_when: nvidia_verify.rc != 0
      when: install_nvidia | bool

    - name: Harden SSH configuration
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      loop:
        - { regexp: '^#?PermitRootLogin',       line: 'PermitRootLogin prohibit-password' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?X11Forwarding',          line: 'X11Forwarding no' }
        - { regexp: '^#?MaxAuthTries',           line: 'MaxAuthTries 3' }
        - { regexp: '^#?LoginGraceTime',         line: 'LoginGraceTime 60' }
      notify: restart sshd

    # LXD containers need forward traffic allowed through the bridge. UFW's
    # default DROP forward policy silently kills inter-container and
    # container-to-host DHCP. The explicit "allow on lxdbr0" rules below
    # aren't enough on their own — the underlying iptables FORWARD chain
    # default must be ACCEPT.
    - name: Set UFW DEFAULT_FORWARD_POLICY to ACCEPT (required for LXD)
      ansible.builtin.lineinfile:
        path: /etc/default/ufw
        regexp: '^DEFAULT_FORWARD_POLICY='
        line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'

    - name: Allow LXD bridge traffic through UFW (required for Juju/Sunbeam)
      community.general.ufw:
        rule: allow
        interface: lxdbr0
        direction: "{{ item }}"
      loop:
        - in
        - out

    - name: Allow LXD bridge routing through UFW
      ansible.builtin.command: "ufw route allow {{ item }} on lxdbr0"
      loop:
        - in
        - out
      changed_when: true
      failed_when: false

    - name: Configure UFW rules
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto | default('tcp') }}"
        comment: "{{ item.comment }}"
      loop: "{{ firewall_allowed_ports }}"

    # Enable UFW last, after every allow rule is in place.
    - name: Enable UFW with deny default
      community.general.ufw:
        state: enabled
        policy: deny

  handlers:
    - name: restart sshd
      ansible.builtin.systemd:
        name: ssh
        state: restarted
