---
# 00-prereqs.yml — Minimal prerequisites that must exist before any of the
# rest of the stack runs.
#
# Intentionally minimal: NO firewall, NO sysctl tuning, NO SSH hardening.
# Those land in 03-harden.yml after Sunbeam is up, because UFW + bridge-nf
# settings break LXD's dnsmasq during juju bootstrap.
#
# What lives here:
#   • apt update + dist-upgrade
#   • Packages needed by every later playbook (KVM, libvirt, ZFS, NFS, tools)
#   • Remove docker.io (conflicts with Sunbeam's containerd)
#   • KVM hardware check
#   • Kernel modules required by the *host* (NVMe, vhost_net, NFS server)
#   • Disable swap (required by Kubernetes/MicroK8s inside Sunbeam)
#   • Chrony NTP (snap store requires accurate time)
#   • Enable libvirtd
#
# Run: ansible-playbook -i inventory/hosts.yml playbooks/00-prereqs.yml

- name: Host prerequisites (minimal — pre-Sunbeam)
  hosts: hypervisor
  become: true
  gather_facts: true

  tasks:
    - name: Update apt cache and upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true
        autoclean: true
        cache_valid_time: 3600

    - name: Install system packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - gnupg
          - ca-certificates
          - jq
          - htop
          - nvme-cli
          - smartmontools
          - net-tools
          - iproute2
          - chrony
          # KVM/QEMU (Sunbeam/Nova hypervisor)
          # qemu-kvm is a virtual package on Ubuntu 24.04; use the concrete provider
          - qemu-system-x86
          - libvirt-daemon-system
          - virtinst
          - cpu-checker
          # Misc tools
          - open-iscsi
          - cryptsetup
        state: present
        update_cache: true

    - name: Remove packages that conflict with Sunbeam/containerd
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose
        state: absent
        purge: true

    - name: Verify KVM hardware support
      ansible.builtin.command: kvm-ok
      register: kvm_ok
      changed_when: false
      failed_when: "'KVM acceleration can be used' not in kvm_ok.stdout"

    # Only host-side modules: NVMe (storage), vhost_net (KVM), nfs/nfsd (server).
    # overlay + br_netfilter are K8s requirements and belong on the K3s Nova VMs
    # (loaded in 05-k3s.yml). Loading br_netfilter on the LXD host enables
    # bridge-nf-call which interferes with juju bootstrap unless explicitly
    # turned off — easier to just not load it here.
    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - nvme
        - vhost_net

    - name: Persist kernel modules
      ansible.builtin.copy:
        content: |
          nvme
          vhost_net
        dest: /etc/modules-load.d/beck-cloud.conf
        mode: '0644'

    - name: Disable swap
      ansible.builtin.command: swapoff -a
      changed_when: true

    - name: Remove swap from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^.*swap.*$'
        state: absent

    - name: Configure Chrony NTP
      ansible.builtin.copy:
        content: |
          {% for server in ntp_servers %}
          server {{ server }} iburst
          {% endfor %}
          driftfile /var/lib/chrony/drift
          makestep 1.0 3
          rtcsync
        dest: /etc/chrony/chrony.conf
        mode: '0644'
      notify: restart chrony

    - name: Enable and start libvirtd
      ansible.builtin.systemd:
        name: libvirtd
        enabled: true
        state: started

  handlers:
    - name: restart chrony
      ansible.builtin.systemd:
        name: chrony
        state: restarted
