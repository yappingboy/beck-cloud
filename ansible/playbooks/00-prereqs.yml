---
# 00-prereqs.yml — Minimal prerequisites that must exist before any of the
# rest of the stack runs.
#
# AlmaLinux 9 / OpenNebula CE 7.2 — packages already installed by CE ISO.
# Intentionally minimal: NO firewall, NO sysctl tuning, NO SSH hardening.
# Those land in 03-harden.yml after OpenNebula is up.
#
# What lives here:
#   • dnf update
#   • Extra tooling packages (KVM/libvirt/qemu already provided by CE ISO)
#   • KVM hardware check (virt-host-validate)
#   • Kernel modules required by the *host* (NVMe, vhost_net)
#   • Disable swap (required by Kubernetes)
#   • Chrony NTP
#   • Enable libvirtd
#
# Run: ansible-playbook -i inventory/hosts.yml playbooks/00-prereqs.yml

- name: Host prerequisites (minimal — pre-OpenNebula)
  hosts: hypervisor
  become: true
  gather_facts: true

  tasks:
    - name: Update all packages via dnf
      ansible.builtin.dnf:
        name: '*'
        state: latest
        update_cache: true

    - name: Install supplementary system packages
      ansible.builtin.dnf:
        name:
          - jq
          - htop
          - nvme-cli
          - smartmontools
          - net-tools
          - iproute
          - chrony
          - curl
          - wget
          - bridge-utils
          - iptables-services
        state: present

    - name: Verify KVM hardware support
      ansible.builtin.command: virt-host-validate qemu
      register: kvm_ok
      changed_when: false
      failed_when: "'FAIL' in kvm_ok.stdout and 'WARN' not in kvm_ok.stdout"

    # Only host-side modules: NVMe (storage), vhost_net (KVM).
    # overlay + br_netfilter are K8s requirements and belong on the K3s VMs
    # (loaded in 05-k3s.yml).
    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - nvme
        - vhost_net

    - name: Persist kernel modules
      ansible.builtin.copy:
        content: |
          nvme
          vhost_net
        dest: /etc/modules-load.d/beck-cloud.conf
        mode: '0644'

    - name: Disable swap
      ansible.builtin.command: swapoff -a
      changed_when: true

    - name: Remove swap from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^.*swap.*$'
        state: absent

    - name: Configure Chrony NTP
      ansible.builtin.copy:
        content: |
          {% for server in ntp_servers %}
          server {{ server }} iburst
          {% endfor %}
          driftfile /var/lib/chrony/drift
          makestep 1.0 3
          rtcsync
        dest: /etc/chrony.conf
        mode: '0644'
      notify: restart chronyd

    - name: Enable and start chronyd
      ansible.builtin.systemd:
        name: chronyd
        enabled: true
        state: started

    - name: Enable and start libvirtd
      ansible.builtin.systemd:
        name: libvirtd
        enabled: true
        state: started

  handlers:
    - name: restart chronyd
      ansible.builtin.systemd:
        name: chronyd
        state: restarted
