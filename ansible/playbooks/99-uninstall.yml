---
# 99-uninstall.yml — Tear down the entire Beck Cloud deployment
#
# AlmaLinux 9 — reverses 00-prereqs.yml through 08-ai-sysadmin.yml.
# Designed to be safe by default: only removes services/configuration.
# Destructive steps (zero-filling disks, removing dnf packages, reverting
# SSH hardening) are opt-in via flags below.
#
# Tiers (least → most destructive):
#   Default              Stop services, destroy OpenNebula VMs/hosts/networks,
#                        uninstall OpenNebula packages, tear down LVM volumes,
#                        loop devices, and overlay mounts. Resets firewalld and
#                        sysctls. Leaves SSH hardening and fstab swap alone.
#   -e wipe_disks=true   After cleanup, runs `wipefs -a` + 100MB zero-fill on
#                        every non-OS block device. Required if you want to
#                        repurpose drives for a fresh install.
#   -e remove_packages=true
#                        dnf-remove the packages installed by 00-prereqs.yml
#                        (KVM, libvirt, etc.). Leaves the base OS intact.
#   -e revert_hardening=true
#                        Also revert SSH config and re-add /swapfile to fstab.
#                        Run from console — SSH will restart.
#
# Run (safe default):
#   ansible-playbook -i inventory/hosts.yml playbooks/99-uninstall.yml \
#     -e confirm_uninstall=true
# Run (nuke everything):
#   ansible-playbook -i inventory/hosts.yml playbooks/99-uninstall.yml \
#     -e confirm_uninstall=true -e wipe_disks=true -e remove_packages=true

- name: Beck Cloud — full uninstall
  hosts: hypervisor
  become: true
  gather_facts: true

  vars:
    wipe_disks: false
    remove_packages: false
    revert_hardening: false
    confirm_uninstall: false

  pre_tasks:
    - name: Refuse to run without explicit confirmation
      ansible.builtin.assert:
        that:
          - confirm_uninstall | bool
        fail_msg: >-
          This playbook will destroy the Beck Cloud deployment.
          Re-run with -e confirm_uninstall=true to proceed.
          Add -e wipe_disks=true to zero-fill non-OS disks.
          Add -e remove_packages=true to dnf-remove KVM packages.

    - name: Show what will be destroyed
      ansible.builtin.debug:
        msg:
          - "=== Beck Cloud uninstall ==="
          - "Terminate OpenNebula VMs:                        YES"
          - "Remove OpenNebula hosts and virtual networks:    YES"
          - "Stop + uninstall OpenNebula packages:            YES"
          - "Remove OpenNebula state dirs:                    YES"
          - "Remove nmcli bridge (one0):                      YES"
          - "Tear down LVM volumes, loop devices, overlays:   YES"
          - "Revert sysctls, reset firewalld:                 YES"
          - "Zero-fill non-OS disks:                          {{ wipe_disks | bool }}"
          - "dnf-remove host packages:                        {{ remove_packages | bool }}"
          - "Revert SSH hardening + restore swap:             {{ revert_hardening | bool }}"

  tasks:
    # ── 1. Tear down OpenNebula VMs (K3s nodes) ────────────────────────────
    - name: Check if onevm CLI is available
      ansible.builtin.command: which onevm
      register: onevm_cli
      failed_when: false
      changed_when: false

    - name: Terminate all OpenNebula VMs
      ansible.builtin.shell: |
        onevm terminate --all --hard 2>/dev/null || true
      environment:
        ONE_AUTH: /var/lib/one/.one/one_auth
      when: onevm_cli.rc == 0
      changed_when: true
      failed_when: false

    - name: Wait 30s for VMs to terminate
      ansible.builtin.pause:
        seconds: 30
      when: onevm_cli.rc == 0

    # ── 2. Remove OpenNebula hosts ──────────────────────────────────────────
    - name: Remove all OpenNebula KVM hosts
      ansible.builtin.shell: |
        onehost list --no-header | awk '{print $2}' | while read h; do
          onehost delete "$h" 2>/dev/null || true
        done
      environment:
        ONE_AUTH: /var/lib/one/.one/one_auth
      when: onevm_cli.rc == 0
      changed_when: true
      failed_when: false

    # ── 3. Network cleanup — remove k3s-net vnet ───────────────────────────
    - name: Remove k3s-net virtual network
      ansible.builtin.shell: |
        onevnet delete k3s-net 2>/dev/null || true
      environment:
        ONE_AUTH: /var/lib/one/.one/one_auth
      when: onevm_cli.rc == 0
      changed_when: true
      failed_when: false

    # ── 4. Stop and remove OpenNebula services + packages ──────────────────
    - name: Stop OpenNebula services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - opennebula-fireedge
        - opennebula
      failed_when: false

    - name: Disable OpenNebula services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: false
      loop:
        - opennebula-fireedge
        - opennebula
      failed_when: false

    - name: Remove OpenNebula packages
      ansible.builtin.dnf:
        name:
          - opennebula
          - opennebula-fireedge
          - opennebula-gate
          - opennebula-flow
          - opennebula-node-kvm
        state: absent
        autoremove: true
      failed_when: false

    # ── 5. Remove OpenNebula state directories ─────────────────────────────
    - name: Remove OpenNebula state and config directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/lib/one
        - /etc/one
        - /var/log/one

    - name: Remove oneadmin system user
      ansible.builtin.user:
        name: oneadmin
        state: absent
        remove: true
      failed_when: false

    # ── 6. Remove one0 NetworkManager bridge ──────────────────────────────
    - name: Delete one0 NetworkManager connection (nmcli)
      ansible.builtin.shell: nmcli con delete one0 2>/dev/null || true
      changed_when: true
      failed_when: false

    # ── 7. LVM volumes ──────────────────────────────────────────────────────
    - name: Remove all LVM logical volumes
      ansible.builtin.shell: |
        set +e
        for lv in $(lvs --noheadings -o lv_path 2>/dev/null | awk '{print $1}'); do
          lvremove -f "$lv" 2>/dev/null || true
        done
        exit 0
      changed_when: true
      failed_when: false

    - name: Remove all LVM volume groups
      ansible.builtin.shell: |
        set +e
        for vg in $(vgs --noheadings -o vg_name 2>/dev/null | awk '{print $1}'); do
          vgremove -f "$vg" 2>/dev/null || true
        done
        exit 0
      changed_when: true
      failed_when: false

    - name: Remove all LVM physical volumes
      ansible.builtin.shell: |
        set +e
        for pv in $(pvs --noheadings -o pv_name 2>/dev/null | awk '{print $1}'); do
          pvremove -f "$pv" 2>/dev/null || true
        done
        exit 0
      changed_when: true
      failed_when: false

    - name: Remove device-mapper devices
      ansible.builtin.command: dmsetup remove_all
      changed_when: true
      failed_when: false

    # ── 8. Loop devices and overlay mounts ──────────────────────────────────
    - name: Unmount all overlay filesystems
      ansible.builtin.shell: |
        set +e
        # Iterate in reverse order to handle nested overlays
        grep -E '^overlay ' /proc/mounts | awk '{print $2}' | sort -r | while read mnt; do
          umount -l "$mnt" 2>/dev/null || true
        done
        exit 0
      changed_when: true
      failed_when: false

    - name: Detach all loop devices
      ansible.builtin.command: losetup -D
      changed_when: true
      failed_when: false

    # ── 9. Zero-fill disks — VERY DESTRUCTIVE (gated) ───────────────────────
    - name: Wipe disks (DESTRUCTIVE — requires wipe_disks=true)
      when: wipe_disks | bool
      block:
        - name: Discover all non-OS block devices
          ansible.builtin.shell: |
            set +e
            # Identify the OS disk(s) by tracing /, /boot, /boot/efi to parent device
            os_devs=""
            for mnt in / /boot /boot/efi; do
              dev=$(findmnt -n -o SOURCE "$mnt" 2>/dev/null)
              [ -z "$dev" ] && continue
              base=$(lsblk -n -o PKNAME "$dev" 2>/dev/null | head -1)
              [ -n "$base" ] && os_devs="$os_devs /dev/$base"
            done
            # Enumerate all disks, print those that are NOT the OS disk
            lsblk -d -n -o NAME,TYPE | awk '$2=="disk" {print "/dev/"$1}' > /tmp/_all_disks
            while IFS= read -r dev; do
              skip=0
              for od in $os_devs; do
                [ "$dev" = "$od" ] && skip=1 && break
              done
              [ "$skip" -eq 0 ] && echo "$dev"
            done < /tmp/_all_disks
            rm -f /tmp/_all_disks
            exit 0
          args:
            executable: /bin/bash
          register: wipe_candidates
          changed_when: false

        - name: Aggregate disks to wipe
          ansible.builtin.set_fact:
            disks_to_wipe: "{{ wipe_candidates.stdout_lines }}"

        - name: Show disks that will be zero-filled
          ansible.builtin.debug:
            msg: "About to wipe: {{ disks_to_wipe }}"

        - name: wipefs each disk
          ansible.builtin.command: wipefs -a {{ item }}
          loop: "{{ disks_to_wipe }}"
          changed_when: true
          failed_when: false

        - name: Zero first 100MB of each disk
          ansible.builtin.command: dd if=/dev/zero of={{ item }} bs=1M count=100 conv=fdatasync
          loop: "{{ disks_to_wipe }}"
          changed_when: true
          failed_when: false

        - name: Settle udev
          ansible.builtin.command: udevadm settle
          changed_when: false
          failed_when: false

    # ── 10. ZFS pool and packages ───────────────────────────────────────────
    - name: Export (unmount) ZFS pool
      ansible.builtin.command: zpool export -f {{ zfs_pool_name }}
      failed_when: false
      changed_when: true

    - name: Uninstall ZFS built from source
      ansible.builtin.shell: |
        if [ -f /usr/local/src/zfs/Makefile ]; then
          cd /usr/local/src/zfs && make uninstall 2>/dev/null || true
        fi
        rmmod zfs 2>/dev/null || true
        rm -rf /usr/local/src/zfs
      changed_when: true
      failed_when: false

    # ── 11. libvirt ─────────────────────────────────────────────────────────
    - name: Stop and disable libvirtd
      ansible.builtin.systemd:
        name: libvirtd
        state: stopped
        enabled: false
      failed_when: false

    # ── 12. firewalld reset ─────────────────────────────────────────────────
    - name: Reset firewalld to defaults
      ansible.builtin.shell: |
        firewall-cmd --reload
        systemctl stop firewalld
        systemctl disable firewalld
      failed_when: false
      changed_when: true

    # ── 13. Sysctls and kernel modules (revert 03-harden.yml + 00-prereqs.yml) ─
    - name: Remove kernel modules persistence file
      ansible.builtin.file:
        path: /etc/modules-load.d/beck-cloud.conf
        state: absent

    - name: Reset Beck Cloud sysctls to kernel defaults
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - { key: 'net.ipv4.ip_forward',                  value: '0' }
        - { key: 'net.bridge.bridge-nf-call-iptables',   value: '0' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables',  value: '0' }
        - { key: 'vm.swappiness',                         value: '60' }
        - { key: 'vm.dirty_ratio',                        value: '20' }
        - { key: 'vm.dirty_background_ratio',             value: '10' }
        - { key: 'vm.max_map_count',                      value: '65530' }
        - { key: 'fs.inotify.max_user_watches',           value: '8192' }
        - { key: 'fs.inotify.max_user_instances',         value: '128' }
        - { key: 'vm.nr_hugepages',                       value: '0' }
      failed_when: false


    # ── 13b. SSH hardening + swap revert (opt-in via revert_hardening=true) ──
    # SSH config and swap removal are kept by default because reverting them
    # mid-session can either lock you out (SSH) or leave the host in a
    # K8s-incompatible state if you redeploy. Flip the flag when you really
    # want the OS back to a pre-Beck-Cloud state.
    - name: Revert SSH hardening and restore swap (revert_hardening=true)
      when: revert_hardening | bool
      block:
        - name: Restore default SSH config lines
          ansible.builtin.lineinfile:
            path: /etc/ssh/sshd_config
            regexp: "{{ item.regexp }}"
            line: "{{ item.line }}"
            state: present
          loop:
            - { regexp: '^#?PermitRootLogin',        line: '#PermitRootLogin prohibit-password' }
            - { regexp: '^#?PasswordAuthentication', line: '#PasswordAuthentication yes' }
            - { regexp: '^#?X11Forwarding',          line: '#X11Forwarding yes' }
            - { regexp: '^#?MaxAuthTries',           line: '#MaxAuthTries 6' }
            - { regexp: '^#?LoginGraceTime',         line: '#LoginGraceTime 120' }

        - name: Restart sshd
          ansible.builtin.systemd:
            name: sshd
            state: restarted

        - name: Check if a /swapfile exists on disk
          ansible.builtin.stat:
            path: /swapfile
          register: swapfile_stat

        - name: Re-add /swapfile to fstab (only if file exists)
          ansible.builtin.lineinfile:
            path: /etc/fstab
            line: "/swapfile none swap sw 0 0"
            state: present
          when: swapfile_stat.stat.exists

        - name: Re-enable swap from existing /swapfile
          ansible.builtin.command: swapon -a
          changed_when: true
          failed_when: false
          when: swapfile_stat.stat.exists

    # ── 14. dnf packages (optional) ─────────────────────────────────────────
    - name: Remove host packages installed by 00-prereqs.yml
      when: remove_packages | bool
      ansible.builtin.dnf:
        name:
          - qemu-kvm
          - libvirt
          - virtinst
          - iscsi-initiator-utils
          - cryptsetup
          - bridge-utils
          - iptables-services
        state: absent
        autoremove: true

  post_tasks:
    - name: Print post-uninstall checklist
      ansible.builtin.debug:
        msg:
          - "=== Uninstall complete ==="
          - "Verify with:"
          - "  onevm list               # should fail (onevm removed)"
          - "  onehost list             # should fail (oneadmin removed)"
          - "  lvs; vgs; pvs            # should be empty"
          - "  losetup -l               # should be empty"
          - "  grep overlay /proc/mounts # should be empty"
          - "  systemctl status libvirtd # stopped"
          - "  firewall-cmd --state       # not running"
          - "  ip a show one0            # should not exist"
          - "If you plan to redeploy: reboot before re-running 00-prereqs.yml."
