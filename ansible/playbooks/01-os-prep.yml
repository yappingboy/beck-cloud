---
# 01-os-prep.yml — OS hardening, KVM/ZFS prerequisites, firewall
# Run: ansible-playbook -i inventory/hosts.yml playbooks/01-os-prep.yml

- name: OS Preparation and Hardening
  hosts: hypervisor
  become: true
  gather_facts: true

  tasks:
    - name: Update apt cache and upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true
        autoclean: true
        cache_valid_time: 3600

    - name: Install system packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - gnupg
          - ca-certificates
          - jq
          - htop
          - nvme-cli
          - smartmontools
          - net-tools
          - iproute2
          - chrony
          - fail2ban
          - ufw
          # ZFS
          - zfsutils-linux
          - zfs-dkms
          # NFS server (ZFS → Nova VMs)
          - nfs-kernel-server
          - nfs-common
          # KVM/QEMU (Sunbeam/Nova hypervisor)
          - qemu-kvm
          - libvirt-daemon-system
          - virtinst
          - cpu-checker
          # Misc tools
          - open-iscsi
          - cryptsetup
        state: present
        update_cache: true

    - name: Remove packages that conflict with Sunbeam/containerd
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose
        state: absent
        purge: true

    - name: Verify KVM hardware support
      ansible.builtin.command: kvm-ok
      register: kvm_ok
      changed_when: false
      failed_when: "'KVM acceleration can be used' not in kvm_ok.stdout"

    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter
        - nvme
        - vhost_net
        - nfs
        - nfsd

    - name: Persist kernel modules
      ansible.builtin.copy:
        content: |
          overlay
          br_netfilter
          nvme
          vhost_net
          nfs
          nfsd
        dest: /etc/modules-load.d/beck-cloud.conf
        mode: '0644'

    - name: Set sysctl parameters
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - { key: 'net.ipv4.ip_forward',                  value: '1' }
        - { key: 'net.bridge.bridge-nf-call-iptables',   value: '1' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables',  value: '1' }
        - { key: 'net.netfilter.nf_conntrack_max',        value: '1048576' }
        - { key: 'vm.swappiness',                         value: '10' }
        - { key: 'vm.dirty_ratio',                        value: '10' }
        - { key: 'vm.dirty_background_ratio',             value: '5' }
        - { key: 'vm.max_map_count',                      value: '262144' }
        - { key: 'fs.inotify.max_user_watches',           value: '524288' }
        - { key: 'fs.inotify.max_user_instances',         value: '8192' }
        # Hugepages for KVM/QEMU performance
        - { key: 'vm.nr_hugepages',                       value: '4096' }

    - name: Disable swap
      ansible.builtin.command: swapoff -a
      changed_when: true

    - name: Remove swap from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^.*swap.*$'
        state: absent

    - name: Configure Chrony NTP
      ansible.builtin.copy:
        content: |
          {% for server in ntp_servers %}
          server {{ server }} iburst
          {% endfor %}
          driftfile /var/lib/chrony/drift
          makestep 1.0 3
          rtcsync
        dest: /etc/chrony/chrony.conf
        mode: '0644'
      notify: restart chrony

    - name: Harden SSH configuration
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      loop:
        - { regexp: '^#?PermitRootLogin',       line: 'PermitRootLogin prohibit-password' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?X11Forwarding',          line: 'X11Forwarding no' }
        - { regexp: '^#?MaxAuthTries',           line: 'MaxAuthTries 3' }
        - { regexp: '^#?LoginGraceTime',         line: 'LoginGraceTime 60' }
      notify: restart sshd

    - name: Enable UFW with deny default
      community.general.ufw:
        state: enabled
        policy: deny

    - name: Configure UFW rules
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto | default('tcp') }}"
        comment: "{{ item.comment }}"
      loop: "{{ firewall_allowed_ports }}"

    - name: Enable and start libvirtd
      ansible.builtin.systemd:
        name: libvirtd
        enabled: true
        state: started

  handlers:
    - name: restart chrony
      ansible.builtin.systemd:
        name: chrony
        state: restarted

    - name: restart sshd
      ansible.builtin.systemd:
        name: ssh
        state: restarted
