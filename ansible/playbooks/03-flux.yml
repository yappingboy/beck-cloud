---
# 03-flux.yml — Install Flux CLI, Bootstrap GitOps, SOPS age key
# Run: ansible-playbook -i inventory/hosts.yml playbooks/03-flux.yml

- name: Install Flux CD and Bootstrap
  hosts: homelab
  become: true
  gather_facts: true

  vars:
    flux_version: "2.3.0"
    flux_repo_url: "https://github.com/yappingboy/beck-cloud"
    flux_repo_branch: "main"
    age_key_path: "{{ ansible_env.HOME }}/.config/sops/age/homelab.agekey"

  tasks:
    # Install Flux CLI
    - name: Check Flux installation
      ansible.builtin.command: flux --version
      register: flux_version_check
      failed_when: false
      changed_when: false

    - name: Install Flux CLI
      when: flux_version_check.rc != 0
      block:
        - name: Download Flux CLI
          ansible.builtin.get_url:
            url: "https://github.com/fluxcd/flux2/releases/download/v{{ flux_version }}/flux_{{ flux_version }}_linux_amd64.tar.gz"
            dest: /tmp/flux.tar.gz

        - name: Install Flux binary
          ansible.builtin.unarchive:
            src: /tmp/flux.tar.gz
            dest: /usr/local/bin
            remote_src: true
            mode: '0755'
            includes: flux

    # Generate SOPS age key
    - name: Ensure SOPS age directory exists
      ansible.builtin.file:
        path: "{{ age_key_path | dirname }}"
        state: directory
        mode: '0700'

    - name: Generate SOPS age key
      ansible.builtin.command: "age-keygen -o {{ age_key_path }}"
      args:
        creates: "{{ age_key_path }}"
      register: age_keygen

    - name: Store age public key
      ansible.builtin.shell: |
        age-keygen -y {{ age_key_path }}
      register: age_public_key
      changed_when: false

    - name: Store age public key as K8s secret
      ansible.builtin.shell: |
        kubectl create secret generic sops-age \
          --namespace=flux-system \
          --from-file=age.agekey={{ age_key_path }} \
          --dry-run=client -o yaml | kubectl apply -f -
      args:
        creates: /tmp/.flux-sops-secret

    # Bootstrap Flux to GitHub
    - name: Bootstrap Flux to GitHub
      ansible.builtin.shell: |
        flux bootstrap github \
          --owner=yappingboy \
          --repository=beck-cloud \
          --branch=main \
          --path=clusters/homelab \
          --personal
      args:
        creates: /tmp/.flux-bootstrap-done
      environment:
        GITHUB_TOKEN: "{{ github_token | default(lookup('env', 'GITHUB_TOKEN')) }}"

  post_tasks:
    - name: Verify Flux installation
      ansible.builtin.command: flux --version
      register: flux_final
      changed_when: false

    - name: Display Flux status
      ansible.builtin.debug:
        msg: |
          Flux version: {{ flux_final.stdout }}
          SOPS age key: {{ age_key_path }}
          Age public key: {{ age_public_key.stdout_lines | first }}
