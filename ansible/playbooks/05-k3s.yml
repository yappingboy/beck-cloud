---
# 05-k3s.yml — Install K3s + Cilium on OpenNebula VM instances
# Run: ansible-playbook -i inventory/hosts.yml playbooks/05-k3s.yml
#
# Prerequisites:
#   - OpenNebula VMs are running and reachable (04-one-vms.yml done)
#   - inventory/hosts.yml k3s_nodes IPs updated with VM IPs
#
# Storage: local-path StorageClass (K3s built-in, enabled by default when
#   local-storage is not in the --disable list)

- name: Install K3s server
  hosts: k3s_nodes
  become: true
  gather_facts: false   # done after wait_for_connection
  serial: 1  # server must be fully up before workers attempt to join

  pre_tasks:
    - name: Wait for SSH to become available (VM may still be booting)
      ansible.builtin.wait_for_connection:
        delay: 5
        sleep: 10
        timeout: 300

    - name: Gather facts
      ansible.builtin.setup:

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install prerequisites on VMs
      ansible.builtin.apt:
        name:
          - curl
          - open-iscsi
          - jq
        state: present

    - name: Disable swap
      ansible.builtin.command: swapoff -a
      changed_when: true

    - name: Remove swap from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^.*swap.*$'
        state: absent

    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Set sysctl for K3s/Cilium
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - { key: 'net.ipv4.ip_forward',                 value: '1' }
        - { key: 'net.bridge.bridge-nf-call-iptables',  value: '1' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { key: 'fs.inotify.max_user_watches',         value: '524288' }
        - { key: 'fs.inotify.max_user_instances',       value: '8192' }
        - { key: 'vm.max_map_count',                    value: '262144' }

    # ── K3s server ──────────────────────────────────────────────────────
    # Detect stale state: binary exists but no node registered within 30s
    # (previous install used different --node-ip, certs/db are inconsistent).
    - name: Check if K3s server node is registered
      when: k3s_role == 'server'
      ansible.builtin.shell: |
        [ -f /usr/local/bin/k3s ] || exit 1
        for i in $(seq 1 3); do
          count=$(kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get nodes \
            --no-headers 2>/dev/null | wc -l)
          [ "$count" -gt 0 ] && exit 0
          sleep 10
        done
        exit 1
      register: k3s_node_check
      changed_when: false
      failed_when: false

    - name: Wipe stale K3s state (binary exists but node never registered)
      when: k3s_role == 'server' and k3s_node_check.rc != 0
      ansible.builtin.shell: |
        /usr/local/bin/k3s-uninstall.sh 2>/dev/null || true
        rm -rf /etc/rancher/k3s /var/lib/rancher/k3s
      changed_when: true
      failed_when: false

    - name: Install K3s server
      when: k3s_role == 'server'
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION={{ k3s_version }} \
          {% if k3s_token != '' %}K3S_TOKEN={{ k3s_token }} {% endif %}\
          sh -s - server \
          --write-kubeconfig-mode 644 \
          --node-ip {{ one_k3s_server_int_ip }} \
          --tls-san {{ one_k3s_server_ext_ip }} \
          --tls-san {{ one_k3s_server_int_ip }} \
          {% for item in k3s_disable %}--disable {{ item }} {% endfor %}\
          --disable-network-policy \
          --flannel-backend none \
          {% for arg in k3s_kubelet_args %}\
          --kubelet-arg {{ arg }} {% if not loop.last %}\
          {% endif %}
          {% endfor %}
      args:
        creates: /usr/local/bin/k3s

    - name: Configure K3s OIDC for Keycloak
      when: k3s_role == 'server'
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/config.yaml
        content: |
          kube-apiserver-arg:
            - "oidc-issuer-url=https://keycloak.becklab.cloud/realms/homelab"
            - "oidc-client-id=oauth2-proxy"
            - "oidc-username-claim=preferred_username"
            - "oidc-groups-claim=groups"
            - "oidc-groups-prefix=keycloak:"
        mode: '0644'
      notify: restart k3s

    - name: Ensure k3s service is started and enabled
      when: k3s_role == 'server'
      ansible.builtin.systemd:
        name: k3s
        state: started
        enabled: true

    - name: Wait for K3s API to be ready (poll kubectl, up to 3 min)
      when: k3s_role == 'server'
      ansible.builtin.shell: |
        KCF=/etc/rancher/k3s/k3s.yaml
        for i in $(seq 1 18); do
          [ -f "$KCF" ] && kubectl --kubeconfig "$KCF" get nodes 2>/dev/null && exit 0
          sleep 10
        done
        exit 1
      changed_when: false

    - name: Read K3s node-token from server
      when: k3s_role == 'server'
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_server_token_raw

    - name: Cache server token as host fact for workers to consume
      when: k3s_role == 'server'
      ansible.builtin.set_fact:
        k3s_join_token: "{{ k3s_server_token_raw.content | b64decode | trim }}"
        cacheable: true

    # ── K3s worker ─────────────────────────────────────────────────────
    - name: Resolve server host facts for worker join
      when: k3s_role == 'worker'
      ansible.builtin.set_fact:
        k3s_server_host: "{{ one_k3s_server_int_ip }}"
        k3s_join_token: >-
          {{ hostvars[
               groups['k3s_nodes']
               | map('extract', hostvars)
               | selectattr('k3s_role', 'equalto', 'server')
               | map(attribute='inventory_hostname')
               | first
             ]['k3s_join_token'] }}

    - name: Install K3s worker
      when: k3s_role == 'worker'
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION={{ k3s_version }} \
          K3S_TOKEN={{ k3s_join_token }} \
          K3S_URL=https://{{ k3s_server_host }}:6443 \
          sh -s - agent \
          {% for arg in k3s_kubelet_args %}\
          --kubelet-arg {{ arg }} {% if not loop.last %}\
          {% endif %}
          {% endfor %}
      args:
        creates: /usr/local/bin/k3s

    # ── Helm + Cilium (server only) ────────────────────────────────────────
    - name: Install Helm
      when: k3s_role == 'server'
      ansible.builtin.shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Install Cilium CNI
      when: k3s_role == 'server'
      ansible.builtin.shell: |
        set -e
        export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

        helm repo add cilium https://helm.cilium.io
        helm repo update

        # Retry up to 10x (5 min) — K3s with no CNI may briefly restart
        # its API server while waiting for the network to be ready.
        for attempt in $(seq 1 10); do
          echo "=== Cilium install attempt ${attempt}/10 ==="
          kubectl --kubeconfig "$KUBECONFIG" get nodes 2>&1 || { sleep 30; continue; }

          helm upgrade --install cilium cilium/cilium \
            --kubeconfig "$KUBECONFIG" \
            --namespace kube-system \
            --version {{ cilium_version }} \
            --set kubeProxyReplacement=true \
            --set k8sServiceHost={{ one_k3s_server_int_ip }} \
            --set k8sServicePort=6443 \
            --set ipam.mode=kubernetes \
            --set hubble.relay.enabled=true \
            --set hubble.ui.enabled=true \
            --set operator.replicas=1 \
            --set l2announcements.enabled=true \
            && exit 0

          echo "Helm failed, waiting 30s before retry..."
          sleep 30
        done

        echo "Cilium install failed after 10 attempts"
        kubectl --kubeconfig "$KUBECONFIG" get nodes 2>&1 || true
        exit 1
      changed_when: true

    - name: Ensure .kube directory exists for ubuntu user
      when: k3s_role == 'server'
      ansible.builtin.file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        mode: '0700'

    - name: Copy kubeconfig to ubuntu home
      when: k3s_role == 'server'
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/ubuntu/.kube/config
        remote_src: true
        owner: ubuntu
        mode: '0600'

  post_tasks:
    - name: Wait for K3s API to stabilise after Cilium install (up to 3 min)
      when: k3s_role == 'server'
      ansible.builtin.shell: |
        for i in $(seq 1 18); do
          kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get nodes 2>/dev/null && exit 0
          sleep 10
        done
        exit 1
      changed_when: false

    - name: Verify cluster nodes (server only)
      when: k3s_role == 'server'
      ansible.builtin.command: kubectl get nodes -o wide
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: nodes
      changed_when: false

    - name: Print cluster state
      when: k3s_role == 'server'
      ansible.builtin.debug:
        var: nodes.stdout_lines


  handlers:
    - name: restart k3s
      ansible.builtin.systemd:
        name: k3s
        state: restarted
