---
# 05-k3s.yml — Install K3s + Cilium on Nova VM instances
# Run: ansible-playbook -i inventory/hosts.yml playbooks/05-k3s.yml
#
# Prerequisites:
#   - Nova VMs are running and reachable (04-nova-vms.yml done)
#   - inventory/hosts.yml k3s_nodes IPs updated with floating IPs

- name: Install K3s server
  hosts: k3s_nodes
  become: true
  gather_facts: true
  serial: 1  # server must be fully up before workers attempt to join

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install prerequisites on VMs
      ansible.builtin.apt:
        name:
          - curl
          - ceph-common   # required for ceph-csi-rbd to mount RBD volumes on nodes
          - open-iscsi
          - jq
        state: present

    - name: Disable swap
      ansible.builtin.command: swapoff -a
      changed_when: true

    - name: Remove swap from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^.*swap.*$'
        state: absent

    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Set sysctl for K3s/Cilium
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - { key: 'net.ipv4.ip_forward',                 value: '1' }
        - { key: 'net.bridge.bridge-nf-call-iptables',  value: '1' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { key: 'fs.inotify.max_user_watches',         value: '524288' }
        - { key: 'fs.inotify.max_user_instances',       value: '8192' }
        - { key: 'vm.max_map_count',                    value: '262144' }

    # ── K3s server ──────────────────────────────────────────────────────
    - name: Install K3s server
      when: k3s_role == 'server'
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION={{ k3s_version }} \
          {% if k3s_token != '' %}K3S_TOKEN={{ k3s_token }} {% endif %}\
          sh -s - server \
          --write-kubeconfig-mode 644 \
          {% for item in k3s_disable %}--disable {{ item }} {% endfor %}\
          --disable-network-policy \
          --flannel-backend none \
          {% for arg in k3s_kubelet_args %}\
          --kubelet-arg {{ arg }} {% if not loop.last %}\
          {% endif %}
          {% endfor %}
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for K3s API to be ready
      when: k3s_role == 'server'
      ansible.builtin.wait_for:
        port: 6443
        delay: 10
        timeout: 120

    - name: Read K3s node-token from server
      when: k3s_role == 'server'
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_server_token_raw

    - name: Cache server token as host fact for workers to consume
      when: k3s_role == 'server'
      ansible.builtin.set_fact:
        k3s_join_token: "{{ k3s_server_token_raw.content | b64decode | trim }}"
        cacheable: true

    # ── K3s worker ─────────────────────────────────────────────────────
    - name: Resolve server host facts for worker join
      when: k3s_role == 'worker'
      ansible.builtin.set_fact:
        k3s_server_host: >-
          {{ groups['k3s_nodes']
             | map('extract', hostvars)
             | selectattr('k3s_role', 'equalto', 'server')
             | map(attribute='ansible_host')
             | first }}
        k3s_join_token: >-
          {{ hostvars[
               groups['k3s_nodes']
               | map('extract', hostvars)
               | selectattr('k3s_role', 'equalto', 'server')
               | map(attribute='inventory_hostname')
               | first
             ]['k3s_join_token'] }}

    - name: Install K3s worker
      when: k3s_role == 'worker'
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION={{ k3s_version }} \
          K3S_TOKEN={{ k3s_join_token }} \
          K3S_URL=https://{{ k3s_server_host }}:6443 \
          sh -s - agent \
          {% for arg in k3s_kubelet_args %}\
          --kubelet-arg {{ arg }} {% if not loop.last %}\
          {% endif %}
          {% endfor %}
      args:
        creates: /usr/local/bin/k3s

    # ── Helm + Cilium (server only) ────────────────────────────────────────
    - name: Install Helm
      when: k3s_role == 'server'
      ansible.builtin.shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Install Cilium CNI
      when: k3s_role == 'server'
      ansible.builtin.shell: |
        helm repo add cilium https://helm.cilium.io
        helm repo update
        helm upgrade --install cilium cilium/cilium \
          --namespace kube-system \
          --version {{ cilium_version }} \
          --set kubeProxyReplacement=true \
          --set k8sServiceHost=127.0.0.1 \
          --set k8sServicePort=6443 \
          --set ipam.mode=kubernetes \
          --set loadBalancer.algorithm=maglev \
          --set hubble.relay.enabled=true \
          --set hubble.ui.enabled=true \
          --set operator.replicas=1 \
          --set routingMode=native \
          --set autoDirectNodeRoutes=true \
          --set l2announcements.enabled=true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: true

    - name: Ensure .kube directory exists for ubuntu user
      when: k3s_role == 'server'
      ansible.builtin.file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        mode: '0700'

    - name: Copy kubeconfig to ubuntu home
      when: k3s_role == 'server'
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/ubuntu/.kube/config
        remote_src: true
        owner: ubuntu
        mode: '0600'

  post_tasks:
    - name: Verify cluster nodes (server only)
      when: k3s_role == 'server'
      ansible.builtin.command: kubectl get nodes -o wide
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: nodes
      changed_when: false

    - name: Print cluster state
      when: k3s_role == 'server'
      ansible.builtin.debug:
        var: nodes.stdout_lines

# ── Ceph CSI ─────────────────────────────────────────────────────────────────
# Play 1: extract FSID + create K3s RBD pool + client key from MicroCeph on host
- name: Prepare MicroCeph for K3s CSI
  hosts: hypervisor
  become: true
  gather_facts: false

  tasks:
    - name: Get MicroCeph cluster FSID
      ansible.builtin.command: microceph.ceph fsid
      register: ceph_fsid
      changed_when: false

    - name: Create K3s RBD pool
      ansible.builtin.shell: |
        microceph.ceph osd pool create k3s-rbd 32 32 replicated 2>/dev/null || true
        microceph.ceph osd pool application enable k3s-rbd rbd 2>/dev/null || true
        microceph.rbd pool init k3s-rbd 2>/dev/null || true
      changed_when: true

    - name: Create Ceph client key for K3s CSI
      ansible.builtin.shell: |
        microceph.ceph auth get-or-create client.k3s-rbd \
          mon 'profile rbd' \
          osd 'profile rbd pool=k3s-rbd' \
          mgr 'profile rbd pool=k3s-rbd' \
          --format json \
          | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['key'])"
      register: ceph_k3s_key
      changed_when: false
      no_log: true

# Play 2: install ceph-csi-rbd driver + StorageClass on the K3s server
- name: Install Ceph CSI RBD driver in K3s
  hosts: k3s_nodes
  become: true
  gather_facts: false

  vars:
    ceph_fsid: "{{ hostvars[groups['hypervisor'][0]]['ceph_fsid'].stdout | trim }}"
    ceph_mon_addr: "{{ homelab_ip }}:6789"
    ceph_k3s_key: "{{ hostvars[groups['hypervisor'][0]]['ceph_k3s_key'].stdout | trim }}"
    kubeconfig: /etc/rancher/k3s/k3s.yaml

  tasks:
    - name: Check if ceph-csi-rbd is already installed
      ansible.builtin.command: helm status ceph-csi-rbd -n ceph-csi
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: ceph_csi_installed
      failed_when: false
      changed_when: false
      when: k3s_role == 'server'

    - name: Add ceph-csi Helm repo
      ansible.builtin.shell: |
        helm repo add ceph-csi https://ceph.github.io/csi-charts
        helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false
      when: k3s_role == 'server'

    - name: Create ceph-csi namespace
      ansible.builtin.shell: |
        kubectl create namespace ceph-csi --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false
      when: k3s_role == 'server'

    - name: Apply Ceph CSI config ConfigMap
      ansible.builtin.shell: |
        cat <<'MANIFEST' | kubectl apply -f -
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ceph-csi-config
          namespace: ceph-csi
        data:
          config.json: '[{"clusterID":"{{ ceph_fsid }}","monitors":["{{ ceph_mon_addr }}"]}]'
        MANIFEST
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: true
      when: k3s_role == 'server'

    - name: Apply Ceph RBD credential secret
      ansible.builtin.shell: |
        cat <<'MANIFEST' | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: csi-rbd-secret
          namespace: ceph-csi
        type: Opaque
        stringData:
          userID: "k3s-rbd"
          userKey: "{{ ceph_k3s_key }}"
        MANIFEST
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: true
      no_log: true
      when: k3s_role == 'server'

    - name: Install ceph-csi-rbd via Helm
      ansible.builtin.shell: |
        helm upgrade --install ceph-csi-rbd ceph-csi/ceph-csi-rbd \
          --namespace ceph-csi \
          --set csiConfig[0].clusterID={{ ceph_fsid }} \
          --set 'csiConfig[0].monitors[0]={{ ceph_mon_addr }}' \
          --set provisioner.replicaCount=1 \
          --wait --timeout 5m
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      when: k3s_role == 'server' and ceph_csi_installed.rc != 0
      changed_when: true

    - name: Apply ceph-rbd StorageClass (default)
      ansible.builtin.shell: |
        cat <<'MANIFEST' | kubectl apply -f -
        apiVersion: storage.k8s.io/v1
        kind: StorageClass
        metadata:
          name: ceph-rbd
          annotations:
            storageclass.kubernetes.io/is-default-class: "true"
        provisioner: rbd.csi.ceph.com
        parameters:
          clusterID: "{{ ceph_fsid }}"
          pool: k3s-rbd
          imageFormat: "2"
          imageFeatures: layering
          csi.storage.k8s.io/provisioner-secret-name: csi-rbd-secret
          csi.storage.k8s.io/provisioner-secret-namespace: ceph-csi
          csi.storage.k8s.io/controller-expand-secret-name: csi-rbd-secret
          csi.storage.k8s.io/controller-expand-secret-namespace: ceph-csi
          csi.storage.k8s.io/node-stage-secret-name: csi-rbd-secret
          csi.storage.k8s.io/node-stage-secret-namespace: ceph-csi
        reclaimPolicy: Retain
        allowVolumeExpansion: true
        volumeBindingMode: Immediate
        MANIFEST
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: true
      when: k3s_role == 'server'
