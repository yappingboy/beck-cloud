---
# 01-zfs.yml — Install OpenZFS and build the 'tank' RAIDZ1 pool
#
# AlmaLinux 9 — Built from OpenZFS source via DKMS.
# Pre-built packages only support up to kernel ~6.17; elrepo mainline (6.19+)
# requires a source build. We clone the latest release tag and let DKMS
# compile it against the running kernel.
# Run this BEFORE 02-opennebula.yml so the datastores dataset is mounted
# before OpenNebula starts.
#
# Discovery: all /dev/nvme*n1 devices except the one hosting root (/).
# Topology:  RAIDZ1 — requires >= 3 data drives.
#
# Datasets created:
#   tank/datastores  →  /var/lib/one/datastores   (OpenNebula VM images)
#   tank/media       →  /mnt/tank/media            (bulk media library)
#   tank/downloads   →  /mnt/tank/downloads        (torrent staging area)
#
# Run: ansible-playbook -i inventory/hosts.yml playbooks/01-zfs.yml

- name: Install ZFS and build tank pool
  hosts: hypervisor
  become: true
  gather_facts: true

  vars:
    zfs_pool_name: tank
    zfs_datasets:
      - name: datastores
        mountpoint: /var/lib/one/datastores
        recordsize: "64K"     # optimal for VM disk images
        owner: oneadmin
        group: oneadmin
      - name: media
        mountpoint: /mnt/tank/media
        recordsize: "1M"      # optimal for large media files
        owner: root
        group: root
      - name: downloads
        mountpoint: /mnt/tank/downloads
        recordsize: "1M"
        owner: root
        group: root

  tasks:
    # ── Build dependencies ────────────────────────────────────────────────────
    - name: Install EPEL release
      ansible.builtin.dnf:
        name: epel-release
        state: present

    - name: Install OpenZFS build dependencies
      ansible.builtin.dnf:
        name:
          - dkms
          - git
          - autoconf
          - automake
          - libtool
          - rpm-build
          - libuuid-devel
          - libblkid-devel
          - libudev-devel
          - openssl-devel
          - zlib-devel
          - libtirpc-devel
          - python3
          - python3-devel
          - python3-setuptools
          - ncompress
        state: present

    - name: Install kernel-devel matching running kernel
      ansible.builtin.shell: |
        KVER="$(uname -r)"
        # elrepo mainline kernels ship kernel-ml-devel in elrepo-kernel repo
        dnf install -y --enablerepo=elrepo-kernel \
          "kernel-ml-devel-${KVER}" 2>/dev/null \
        || dnf install -y --enablerepo=elrepo-kernel \
          "kernel-devel-${KVER}" 2>/dev/null \
        || dnf install -y kernel-devel
      changed_when: true

    # ── Clone and build OpenZFS from source ───────────────────────────────────
    - name: Get latest OpenZFS release tag
      ansible.builtin.shell: |
        git ls-remote --tags --sort='-v:refname' \
          https://github.com/openzfs/zfs.git 'zfs-2.*' \
          | grep -v '\^{}' | head -1 | awk '{print $2}' | sed 's|refs/tags/||'
      register: zfs_latest_tag
      changed_when: false

    - name: Show ZFS version being built
      ansible.builtin.debug:
        msg: "Building OpenZFS {{ zfs_latest_tag.stdout }}"

    - name: Check if ZFS is already installed at this version
      ansible.builtin.shell: |
        zfs --version 2>/dev/null | grep -q "{{ zfs_latest_tag.stdout | replace('zfs-', '') }}" && echo yes || echo no
      register: zfs_installed_check
      changed_when: false
      failed_when: false

    - name: Clone OpenZFS source
      ansible.builtin.git:
        repo: https://github.com/openzfs/zfs.git
        dest: /usr/local/src/zfs
        version: "{{ zfs_latest_tag.stdout }}"
        depth: 1
        force: true
      when: zfs_installed_check.stdout == 'no'

    - name: Build and install OpenZFS (takes 5–15 min)
      ansible.builtin.shell: |
        set -e
        cd /usr/local/src/zfs
        ./autogen.sh
        ./configure --prefix=/usr --sysconfdir=/etc --localstatedir=/var \
          --with-linux=/usr/src/kernels/$(uname -r) \
          --with-linux-obj=/usr/src/kernels/$(uname -r)
        make -j$(nproc)
        make install
        ldconfig
        depmod -a
      changed_when: true
      when: zfs_installed_check.stdout == 'no'
      async: 1200
      poll: 30

    - name: Load ZFS kernel module
      community.general.modprobe:
        name: zfs
        state: present

    - name: Persist ZFS module across reboots
      ansible.builtin.lineinfile:
        path: /etc/modules-load.d/beck-cloud.conf
        line: zfs
        create: false

    - name: Install ZFS systemd unit files
      ansible.builtin.command: zfs-mount-generator
      failed_when: false
      changed_when: false

    - name: Enable ZFS systemd services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
        daemon_reload: true
      loop:
        - zfs-import-cache.service
        - zfs-mount.service
      failed_when: false

    # ── Discover data drives ──────────────────────────────────────────────────
    - name: Determine OS root block device
      ansible.builtin.shell: |
        lsblk -no pkname "$(findmnt -n -o SOURCE /)" | head -1
      register: os_disk_raw
      changed_when: false

    - name: List all NVMe namespace devices
      ansible.builtin.shell: |
        ls /dev/nvme*n1 2>/dev/null | sort
      register: all_nvme_raw
      changed_when: false
      failed_when: false

    - name: Build data drive list (all NVMe except OS drive)
      ansible.builtin.set_fact:
        zfs_data_drives: >-
          {{ all_nvme_raw.stdout_lines
             | reject('search', os_disk_raw.stdout | trim)
             | list }}

    - name: Show selected data drives
      ansible.builtin.debug:
        msg: >-
          OS drive: /dev/{{ os_disk_raw.stdout | trim }} (excluded).
          Data drives for {{ zfs_pool_name }}: {{ zfs_data_drives }}

    - name: Assert RAIDZ1 requires at least 3 data drives
      ansible.builtin.assert:
        that: zfs_data_drives | length >= 3
        fail_msg: >-
          RAIDZ1 needs >= 3 data drives; found {{ zfs_data_drives | length }}
          ({{ zfs_data_drives }}). Check that non-OS NVMe drives are present
          and visible to the OS.

    # ── Create pool ───────────────────────────────────────────────────────────
    - name: Check if pool already exists
      ansible.builtin.command: zpool status {{ zfs_pool_name }}
      register: pool_check
      failed_when: false
      changed_when: false

    - name: Create RAIDZ1 pool
      ansible.builtin.command: >
        zpool create -f
        -o ashift=12
        -O compression=lz4
        -O atime=off
        -O xattr=sa
        -O dnodesize=auto
        -O mountpoint=/{{ zfs_pool_name }}
        {{ zfs_pool_name }} raidz {{ zfs_data_drives | join(' ') }}
      when: pool_check.rc != 0

    # ── Create datasets ───────────────────────────────────────────────────────
    - name: Check dataset existence
      ansible.builtin.command: zfs list {{ zfs_pool_name }}/{{ item.name }}
      register: dataset_check
      failed_when: false
      changed_when: false
      loop: "{{ zfs_datasets }}"
      loop_control:
        label: "{{ zfs_pool_name }}/{{ item.name }}"

    # Stop ONE before mounting over /var/lib/one/datastores so open file
    # handles don't block the mount.
    - name: Stop OpenNebula services before mounting datastores dataset
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - opennebula
        - opennebula-fireedge
      failed_when: false

    - name: Create ZFS dataset
      ansible.builtin.command: >
        zfs create
        -o mountpoint={{ item.item.mountpoint }}
        -o recordsize={{ item.item.recordsize }}
        {{ zfs_pool_name }}/{{ item.item.name }}
      when: item.rc != 0
      loop: "{{ dataset_check.results }}"
      loop_control:
        label: "{{ zfs_pool_name }}/{{ item.item.name }}"

    - name: Set dataset mountpoint ownership
      ansible.builtin.file:
        path: "{{ item.mountpoint }}"
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        state: directory
        mode: '0755'
      loop: "{{ zfs_datasets }}"
      loop_control:
        label: "{{ item.mountpoint }}"

    - name: Restart OpenNebula services after mount
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - opennebula
        - opennebula-fireedge
      failed_when: false

  post_tasks:
    - name: Print pool status
      ansible.builtin.command: zpool status
      register: pool_status
      changed_when: false

    - name: Print pool status output
      ansible.builtin.debug:
        var: pool_status.stdout_lines

    - name: Print dataset list
      ansible.builtin.command: zfs list
      register: zfs_list
      changed_when: false

    - name: Print dataset list output
      ansible.builtin.debug:
        var: zfs_list.stdout_lines

    - name: Print mount summary
      ansible.builtin.debug:
        msg:
          - "tank/datastores → /var/lib/one/datastores (OpenNebula VM images, 64K records)"
          - "tank/media      → /mnt/tank/media (bulk media, 1M records)"
          - "tank/downloads  → /mnt/tank/downloads (torrent staging, 1M records)"
