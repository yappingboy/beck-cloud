---
# 04-snapshotter.yml — Install CSI Snapshot CRDs on remote node
# Run: ansible-playbook -i inventory/hosts.yml playbooks/04-snapshotter.yml

- name: Install CSI Snapshot CRDs
  hosts: homelab
  become: true
  gather_facts: true

  vars:
    snapshot_api_version: "v1"

  tasks:
    # Verify kubectl is available
    - name: Check kubectl availability
      ansible.builtin.command: kubectl version --client --short
      register: kubectl_check
      failed_when: false
      changed_when: false

    - name: Apply CSI snapshot CRDs
      ansible.builtin.shell: |
        kubectl apply -f "https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/release-8.0.0/client/config/crd/snapshot.storage.k8s.io_volumesnapshotclasses.yaml"
        kubectl apply -f "https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/release-8.0.0/client/config/crd/snapshot.storage.k8s.io_volumesnapshotcontents.yaml"
        kubectl apply -f "https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/release-8.0.0/client/config/crd/snapshot.storage.k8s.io_volumesnapshots.yaml"

    - name: Verify CRDs are applied
      ansible.builtin.shell: |
        kubectl get crd volumesnapshotclasses.snapshot.storage.k8s.io
        kubectl get crd volumesnapshotcontents.snapshot.storage.k8s.io
        kubectl get crd volumesnapshots.snapshot.storage.k8s.io
      register: crd_check
      changed_when: false

    - name: Display CRD status
      ansible.builtin.debug:
        var: crd_check.stdout_lines
