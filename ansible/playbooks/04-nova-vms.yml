---
# 04-nova-vms.yml — Provision Nova VM instances for the K3s cluster
# Run: ansible-playbook -i inventory/hosts.yml playbooks/04-nova-vms.yml
#
# After this playbook:
#   - Update inventory/hosts.yml k3s_nodes IPs to match assigned floating IPs
#   - Then run 05-k3s.yml to install K3s on the VMs

- name: Provision Nova VM instances for K3s
  hosts: hypervisor
  become: false
  gather_facts: false

  vars:
    openrc_path: "/home/{{ ops_user }}/admin-openrc"

  tasks:
    - name: Verify OpenStack API is reachable
      ansible.builtin.shell: |
        . {{ openrc_path }} && openstack catalog list -f value -c Name
      changed_when: false
      register: catalog
      failed_when: catalog.rc != 0

    # ── Discover external network name ─────────────────────────────────
    # Sunbeam names the external network differently depending on channel/config.
    # Discover it rather than hardcoding "public".
    - name: Discover external network name
      ansible.builtin.shell: |
        . {{ openrc_path }} && openstack network list --external -f value -c Name | head -1
      register: ext_network_name
      changed_when: false
      failed_when: ext_network_name.stdout == ''

    - name: Show external network name
      ansible.builtin.debug:
        msg: "External network: {{ ext_network_name.stdout }}"

    # ── Keypair ────────────────────────────────────────────────────────
    - name: Check if keypair exists
      ansible.builtin.shell: |
        . {{ openrc_path }} && openstack keypair show {{ nova_k3s_keypair }} -f value -c name
      register: keypair_check
      failed_when: false
      changed_when: false

    - name: Import keypair from ops user's public key
      ansible.builtin.shell: |
        . {{ openrc_path }} && openstack keypair create \
          --public-key {{ nova_k3s_keypair_pub }} \
          {{ nova_k3s_keypair }}
      when: keypair_check.rc != 0
      changed_when: true

    # ── Flavors ────────────────────────────────────────────────────────
    - name: Create Nova flavors
      ansible.builtin.shell: |
        . {{ openrc_path }}
        if ! openstack flavor show {{ item.name }} > /dev/null 2>&1; then
          openstack flavor create \
            --vcpus {{ item.vcpus }} \
            --ram {{ item.ram }} \
            --disk {{ item.disk }} \
            --public \
            {{ item.name }}
        fi
      loop: "{{ nova_flavors }}"
      changed_when: true
      failed_when: false

    # ── Image ──────────────────────────────────────────────────────────
    - name: Check if Ubuntu 24.04 cloud image exists in Glance
      ansible.builtin.shell: |
        . {{ openrc_path }} && openstack image show {{ nova_k3s_image }} -f value -c id
      register: image_check
      failed_when: false
      changed_when: false

    - name: Download Ubuntu 24.04 cloud image
      ansible.builtin.get_url:
        url: "{{ nova_k3s_image_url }}"
        dest: "/tmp/{{ nova_k3s_image }}.img"
        mode: '0644'
        timeout: 600
      when: image_check.rc != 0

    - name: Upload Ubuntu 24.04 image to Glance
      ansible.builtin.shell: |
        . {{ openrc_path }} && openstack image create \
          --container-format bare \
          --disk-format qcow2 \
          --file /tmp/{{ nova_k3s_image }}.img \
          --public \
          {{ nova_k3s_image }}
      when: image_check.rc != 0
      changed_when: true

    # ── Tenant network ─────────────────────────────────────────────────
    - name: Create tenant network for K3s VMs
      ansible.builtin.shell: |
        . {{ openrc_path }} && \
        openstack network show k3s-net > /dev/null 2>&1 || \
        openstack network create k3s-net
      changed_when: true

    - name: Create subnet on tenant network
      ansible.builtin.shell: |
        . {{ openrc_path }} && \
        openstack subnet show k3s-subnet > /dev/null 2>&1 || \
        openstack subnet create k3s-subnet \
          --network k3s-net \
          --subnet-range {{ nova_network_cidr }} \
          --gateway {{ nova_network_gateway }} \
          --dns-nameserver {{ nova_dns_servers | join(' --dns-nameserver ') }}
      changed_when: true

    - name: Create router to connect tenant net to provider net
      ansible.builtin.shell: |
        . {{ openrc_path }} && \
        openstack router show k3s-router > /dev/null 2>&1 || \
        openstack router create k3s-router
      changed_when: true

    - name: Set router external gateway
      ansible.builtin.shell: |
        . {{ openrc_path }} && \
        openstack router set --external-gateway {{ ext_network_name.stdout }} k3s-router
      changed_when: true
      ignore_errors: true

    - name: Add tenant subnet to router
      ansible.builtin.shell: |
        . {{ openrc_path }} && \
        openstack router add subnet k3s-router k3s-subnet
      changed_when: true
      ignore_errors: true

    # ── Security group ─────────────────────────────────────────────────
    - name: Create k3s security group
      ansible.builtin.shell: |
        . {{ openrc_path }} && \
        openstack security group show k3s-sg > /dev/null 2>&1 || \
        openstack security group create k3s-sg --description "K3s cluster nodes"
      changed_when: true

    - name: Add SSH and K3s API security group rules
      ansible.builtin.shell: |
        . {{ openrc_path }} && openstack security group rule create \
          --proto {{ item.proto }} \
          --dst-port {{ item.port }} \
          --remote-ip {{ item.remote }} \
          k3s-sg 2>/dev/null || true
      loop:
        - { proto: tcp, port: 22,   remote: "0.0.0.0/0" }
        - { proto: tcp, port: 6443, remote: "0.0.0.0/0" }
      changed_when: true

    - name: Allow all TCP/UDP within tenant network
      ansible.builtin.shell: |
        . {{ openrc_path }} && openstack security group rule create \
          --proto {{ item }} \
          --remote-ip {{ nova_network_cidr }} \
          k3s-sg 2>/dev/null || true
      loop:
        - tcp
        - udp
      changed_when: true

    - name: Add ICMP security group rule
      ansible.builtin.shell: |
        . {{ openrc_path }} && openstack security group rule create \
          --proto icmp \
          --remote-ip 0.0.0.0/0 \
          k3s-sg 2>/dev/null || true
      changed_when: true

    # ── Launch instances ───────────────────────────────────────────────
    - name: Launch Nova VM instances
      ansible.builtin.shell: |
        . {{ openrc_path }} && \
        openstack server show {{ item.name }} > /dev/null 2>&1 || \
        openstack server create \
          --image {{ nova_k3s_image }} \
          --flavor {{ item.flavor }} \
          --network k3s-net \
          --security-group k3s-sg \
          --key-name {{ nova_k3s_keypair }} \
          --wait \
          {{ item.name }}
      loop: "{{ nova_k3s_vms }}"
      changed_when: true

    - name: Wait for instances to reach ACTIVE status
      ansible.builtin.shell: |
        . {{ openrc_path }} && openstack server show {{ item.name }} -f value -c status
      register: server_status
      retries: 20
      delay: 15
      until: server_status.stdout == 'ACTIVE'
      loop: "{{ nova_k3s_vms }}"
      changed_when: false

    # ── Floating IPs ───────────────────────────────────────────────────
    - name: Allocate and assign floating IPs
      ansible.builtin.shell: |
        . {{ openrc_path }}
        EXISTING=$(openstack floating ip list \
          --port $(openstack server show {{ item.name }} -f value -c addresses \
                   | grep -oP '[0-9.]+' | tail -1) \
          -f value -c "Floating IP Address" 2>/dev/null)
        if [ -z "$EXISTING" ]; then
          FIP=$(openstack floating ip create {{ ext_network_name.stdout }} -f value -c floating_ip_address)
          openstack server add floating ip {{ item.name }} $FIP
          echo $FIP
        else
          echo $EXISTING
        fi
      register: floating_ips
      loop: "{{ nova_k3s_vms }}"
      changed_when: true

  post_tasks:
    - name: Display VM summary
      ansible.builtin.shell: |
        . {{ openrc_path }} && openstack server list --long
      register: server_list
      changed_when: false

    - name: Print VM details and floating IPs
      ansible.builtin.debug:
        msg: |
          {{ server_list.stdout }}

          Floating IPs:
          {% for result in floating_ips.results %}
          {{ nova_k3s_vms[loop.index0].name }}: {{ result.stdout }}
          {% endfor %}

          NEXT STEPS:
          1. Update ansible/inventory/hosts.yml k3s_nodes IPs to the
             floating IPs shown above.
          2. Verify SSH:  ssh ubuntu@<floating-ip>
          3. Run: ansible-playbook playbooks/05-k3s.yml
