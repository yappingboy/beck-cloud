---
# 02-sunbeam.yml — Install and bootstrap Sunbeam OpenStack (single-node)
# Run AFTER 00-prereqs.yml, BEFORE 03-harden.yml.
# Run: ansible-playbook -i inventory/hosts.yml playbooks/02-sunbeam.yml
#
# Follows the official Ubuntu OpenStack install guide exactly:
#   https://ubuntu.com/openstack/install
#
# Steps:
#   1. snap install openstack
#   2. sunbeam prepare-node-script --bootstrap | bash -x && newgrp snap_daemon
#   3. sunbeam cluster bootstrap --accept-defaults --role control,compute,storage
#   4. sunbeam configure --accept-defaults --openrc demo-openrc
#   5. sunbeam openrc > ~/admin-openrc  (admin credentials for 04-nova-vms.yml)

- name: Install and bootstrap Sunbeam OpenStack
  hosts: hypervisor
  become: false
  gather_facts: true

  tasks:
    # ── 1. Install snap ──────────────────────────────────────────────────────
    - name: Check if openstack snap already installed
      ansible.builtin.command: snap list openstack
      register: snap_check
      failed_when: false
      changed_when: false

    - name: Install openstack snap
      become: true
      ansible.builtin.command: snap install openstack --channel="{{ sunbeam_channel }}"
      when: snap_check.rc != 0
      changed_when: true

    # ── 2. Prepare node ──────────────────────────────────────────────────────
    # --bootstrap adds juju bootstrap to the prepare script.
    # newgrp snap_daemon refreshes group membership; in Ansible this is
    # handled by resetting the SSH connection after the script runs.
    - name: Check if prepare-node-script has already run (microk8s installed by it)
      ansible.builtin.command: snap list microk8s
      register: microk8s_check
      failed_when: false
      changed_when: false

    - name: Run sunbeam prepare-node-script --bootstrap
      ansible.builtin.shell: |
        set -o pipefail
        sunbeam prepare-node-script --bootstrap | bash -x
      args:
        executable: /bin/bash
      when: microk8s_check.rc != 0
      changed_when: true

    - name: Reset SSH connection to pick up new group memberships (snap_daemon, lxd, etc.)
      ansible.builtin.meta: reset_connection

    # ── 3. Bootstrap the cluster ─────────────────────────────────────────────
    - name: Check if Sunbeam cluster is already bootstrapped
      ansible.builtin.shell: |
        sunbeam cluster status 2>/dev/null | grep -qi "active\|deployed\|ready"
      register: sunbeam_status_check
      failed_when: false
      changed_when: false

    # MicroCeph refuses non-pristine disks. Wipe all non-OS block devices so
    # a fresh bootstrap works even if a previous ZFS/Ceph deployment left data.
    # Skipped when cluster is already bootstrapped.
    - name: Wipe non-OS disks before bootstrap (MicroCeph requires pristine disks)
      become: true
      ansible.builtin.shell: |
        set +e
        # Identify OS disk(s) via mount points
        os_devs=""
        for mnt in / /boot /boot/efi; do
          dev=$(findmnt -n -o SOURCE "$mnt" 2>/dev/null)
          [ -z "$dev" ] && continue
          base=$(lsblk -n -o PKNAME "$dev" 2>/dev/null | head -1)
          [ -n "$base" ] && os_devs="$os_devs /dev/$base"
        done
        # Wipe every non-OS disk
        lsblk -d -n -o NAME,TYPE | awk '$2=="disk" {print "/dev/"$1}' > /tmp/_all_disks
        while IFS= read -r dev; do
          skip=0
          for od in $os_devs; do
            [ "$dev" = "$od" ] && skip=1 && break
          done
          if [ "$skip" -eq 0 ]; then
            echo "Wiping $dev"
            wipefs -a "$dev" 2>/dev/null || true
            dd if=/dev/zero of="$dev" bs=1M count=10 conv=fdatasync 2>/dev/null || true
          fi
        done < /tmp/_all_disks
        rm -f /tmp/_all_disks
        exit 0
      args:
        executable: /bin/bash
      when: sunbeam_status_check.rc != 0
      changed_when: true

    - name: Bootstrap Sunbeam cluster (control + compute + storage)
      ansible.builtin.shell: |
        sunbeam cluster bootstrap --accept-defaults --role control,compute,storage
      args:
        executable: /bin/bash
      when: sunbeam_status_check.rc != 0
      changed_when: true
      async: 7200
      poll: 30

    # ── 4. Configure the cloud ───────────────────────────────────────────────
    - name: Check if demo-openrc already exists
      ansible.builtin.stat:
        path: "/home/{{ ops_user }}/demo-openrc"
      register: demo_openrc_stat

    - name: Configure cloud (demo project, default networks, images)
      ansible.builtin.shell: |
        sunbeam configure --accept-defaults --openrc demo-openrc
      args:
        executable: /bin/bash
      when: not demo_openrc_stat.stat.exists
      changed_when: true
      async: 1800
      poll: 15

    # ── 5. Generate admin openrc ─────────────────────────────────────────────
    - name: Check if admin-openrc already exists
      ansible.builtin.stat:
        path: "/home/{{ ops_user }}/admin-openrc"
      register: admin_openrc_stat

    - name: Generate admin openrc (used by 04-nova-vms.yml)
      ansible.builtin.shell: |
        sunbeam openrc > ~/admin-openrc
      args:
        executable: /bin/bash
      when: not admin_openrc_stat.stat.exists
      changed_when: true

  post_tasks:
    - name: Show Sunbeam cluster status
      ansible.builtin.command: sunbeam cluster status
      register: cluster_status
      changed_when: false
      failed_when: false

    - name: Show dashboard URL
      ansible.builtin.command: sunbeam dashboard-url
      register: dashboard_url
      changed_when: false
      failed_when: false

    - name: Print summary
      ansible.builtin.debug:
        msg:
          - "{{ cluster_status.stdout }}"
          - "Dashboard: {{ dashboard_url.stdout }}"
          - "Admin creds: ~/admin-openrc"
          - "Demo creds:  ~/demo-openrc"
          - "Next: ansible-playbook playbooks/03-harden.yml"
