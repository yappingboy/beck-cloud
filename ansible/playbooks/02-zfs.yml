---
# 02-zfs.yml — Create ZFS pools, datasets, and NFS exports
# Run: ansible-playbook -i inventory/hosts.yml playbooks/02-zfs.yml
#
# Disks are auto-discovered by size from lsblk (no hardcoded /dev/sdX):
#   tank    — all 5.5T disks, split evenly across `tank_vdev_count` RAIDZ1 vdevs
#             + NVMe SLOG (first unmounted NVMe not in any pool)
#   archive — all 9.1T disks, used as a mirror
#
# Disks are filtered to exclude any that are mounted or already in a zpool,
# so re-running this playbook is safe after pools exist.
#
# DESTRUCTIVE: set wipe_disks=true to wipe all spinning disk signatures.
# Required on first run if disks were previously used for Ceph.
# Example: ansible-playbook ... -e wipe_disks=true

- name: Create ZFS pools, datasets, and NFS exports
  hosts: hypervisor
  become: true
  gather_facts: true

  vars:
    wipe_disks: false
    tank_disk_size: "5.5T"
    archive_disk_size: "9.1T"
    # All discovered 5.5T disks are split into this many RAIDZ1 vdevs.
    # The discovered count must be divisible by this number.
    tank_vdev_count: 3

  tasks:
    # ── Pool existence checks (must run before disk discovery) ──────────
    - name: Check if tank pool already exists
      ansible.builtin.command: zpool list tank
      register: tank_exists
      failed_when: false
      changed_when: false

    - name: Check if archive pool already exists
      ansible.builtin.command: zpool list archive
      register: archive_exists
      failed_when: false
      changed_when: false

    # ── Disk discovery by size ──────────────────────────────────────────
    # Picks every disk whose lsblk SIZE column matches the target size,
    # then filters out anything that's mounted or already claimed by a zpool.
    - name: Discover free disks by size
      ansible.builtin.shell: |
        set -euo pipefail
        IN_POOL=$(zpool status 2>/dev/null \
                  | awk 'NF>=2 && /ONLINE|DEGRADED|OFFLINE|UNAVAIL|FAULTED|REMOVED/ {print $1}' \
                  | sed 's|.*/||' | sort -u || true)
        lsblk -d -n -o NAME,SIZE,TYPE | awk -v sz="{{ item }}" '$3=="disk" && $2==sz {print $1}' | while read dev; do
          # Skip if device (or any partition) is mounted anywhere
          if lsblk -n -o MOUNTPOINT "/dev/$dev" 2>/dev/null | grep -q .; then continue; fi
          # Skip if device (or any partition) is in a zpool
          if echo "$IN_POOL" | grep -qE "^${dev}([0-9p]+)?$"; then continue; fi
          echo "/dev/$dev"
        done | sort
      args:
        executable: /bin/bash
      register: disks_by_size
      changed_when: false
      loop:
        - "{{ tank_disk_size }}"
        - "{{ archive_disk_size }}"

    - name: Collect discovered disk lists
      ansible.builtin.set_fact:
        tank_disks: "{{ disks_by_size.results[0].stdout_lines }}"
        archive_disks: "{{ disks_by_size.results[1].stdout_lines }}"

    - name: Assert tank has enough disks for tank_vdev_count RAIDZ1 vdevs (≥2 per vdev)
      when: tank_exists.rc != 0
      ansible.builtin.assert:
        that:
          - tank_disks | length >= (tank_vdev_count | int) * 2
        fail_msg: >-
          Found {{ tank_disks | length }} free {{ tank_disk_size }} disks; need at
          least {{ (tank_vdev_count | int) * 2 }} (2 per vdev × {{ tank_vdev_count }} vdevs):
          {{ tank_disks }}

    - name: Assert archive has at least 2 free disks
      when: archive_exists.rc != 0
      ansible.builtin.assert:
        that:
          - archive_disks | length >= 2
        fail_msg: >-
          archive pool needs at least 2 free {{ archive_disk_size }} disks but found
          {{ archive_disks | length }}: {{ archive_disks }}

    # If the disk count isn't evenly divisible by tank_vdev_count, the remainder
    # become hot-spares — kept attached to the pool but not in any vdev until ZFS
    # auto-promotes them after a drive failure.
    - name: Compute tank disks-per-vdev (floor division) and spares (remainder)
      ansible.builtin.set_fact:
        tank_disks_per_vdev: "{{ ((tank_disks | length) // (tank_vdev_count | int)) | int }}"
        tank_disks_used: "{{ (((tank_disks | length) // (tank_vdev_count | int)) | int) * (tank_vdev_count | int) }}"

    - name: Build tank vdev list (one sublist per RAIDZ1 group) and spares list
      ansible.builtin.set_fact:
        tank_vdevs: >-
          {{ tank_vdevs | default([]) +
             [ tank_disks[(item | int) * (tank_disks_per_vdev | int) :
                          ((item | int) + 1) * (tank_disks_per_vdev | int)] ] }}
      loop: "{{ range(tank_vdev_count | int) | list }}"

    - name: Collect leftover tank disks as hot-spares
      ansible.builtin.set_fact:
        tank_spares: "{{ tank_disks[tank_disks_used | int :] }}"

    - name: Use first 2 archive disks as mirror
      ansible.builtin.set_fact:
        archive_mirror: "{{ archive_disks[:2] }}"

    - name: Show discovered disk layout
      ansible.builtin.debug:
        msg:
          - "tank vdevs ({{ tank_vdev_count }}× RAIDZ1, {{ tank_disks_per_vdev | default(0) }} disks each):"
          - "{{ tank_vdevs | default([]) }}"
          - "tank hot-spares ({{ tank_spares | length }}): {{ tank_spares }}"
          - "archive mirror ({{ archive_disk_size }}): {{ archive_mirror }}"

    # ── Detect free NVMe for SLOG ────────────────────────────────────────
    - name: Find unused NVMe device for SLOG
      ansible.builtin.shell: |
        set -e
        ZPOOL_DEVS=$(zpool status 2>/dev/null | awk '/nvme/{print $1}' | sed 's|/dev/||' || true)
        for dev in $(lsblk -d -n -o NAME | grep '^nvme'); do
          # Skip if already in a zpool
          echo "$ZPOOL_DEVS" | grep -qw "$dev" && continue
          # Skip if it has any mounted partitions or filesystem
          lsblk -n -o MOUNTPOINT "/dev/$dev" 2>/dev/null | grep -q . && continue
          echo "/dev/$dev"
          exit 0
        done
        echo "ERROR: no free NVMe found" >&2
        exit 1
      register: nvme_detect
      changed_when: false
      failed_when: nvme_detect.rc != 0
      when: tank_exists.rc != 0

    - name: Show detected SLOG device
      when: tank_exists.rc != 0
      ansible.builtin.debug:
        msg: "Using NVMe SLOG device: {{ nvme_detect.stdout | trim }}"

    # ── Wipe partition signatures (always runs before pool create) ───────
    # wipefs only removes signatures — it does not destroy data.
    # The dd zero-fill below is the destructive step; that stays guarded.
    - name: Wipe partition signatures on pool disks
      when: tank_exists.rc != 0 or archive_exists.rc != 0
      block:
        - name: Wipe signatures on tank disks
          ansible.builtin.command: wipefs -a {{ item }}
          loop: "{{ tank_disks }}"
          changed_when: true
          when: tank_exists.rc != 0

        - name: Wipe signatures on archive disks
          ansible.builtin.command: wipefs -a {{ item }}
          loop: "{{ archive_mirror }}"
          changed_when: true
          when: archive_exists.rc != 0

        - name: Wipe signatures on NVMe SLOG
          ansible.builtin.command: wipefs -a {{ nvme_detect.stdout | trim }}
          changed_when: true
          when: tank_exists.rc != 0

        - name: Settle udev after signature wipe
          ansible.builtin.command: udevadm settle --timeout=300
          changed_when: false
          failed_when: false

    # ── Optional zero-fill (DESTRUCTIVE — requires wipe_disks=true) ──────
    - name: Zero first 100MB of each disk (DESTRUCTIVE — requires wipe_disks=true)
      when: wipe_disks | bool
      block:
        - name: Zero-fill tank disks
          ansible.builtin.command: dd if=/dev/zero of={{ item }} bs=1M count=100 conv=fdatasync
          loop: "{{ tank_disks }}"
          changed_when: true

        - name: Zero-fill archive disks
          ansible.builtin.command: dd if=/dev/zero of={{ item }} bs=1M count=100 conv=fdatasync
          loop: "{{ archive_mirror }}"
          changed_when: true

        - name: Zero-fill NVMe SLOG
          ansible.builtin.command: dd if=/dev/zero of={{ nvme_detect.stdout | trim }} bs=1M count=100 conv=fdatasync
          changed_when: true
          when: tank_exists.rc != 0

        - name: Settle udev after zero-fill
          ansible.builtin.command: udevadm settle
          changed_when: false

    # ── Pool creation ───────────────────────────────────────────────────
    - name: Create tank pool (N× RAIDZ1 + optional spares + NVMe SLOG)
      when: tank_exists.rc != 0
      ansible.builtin.shell: |
        zpool create -f tank \
          {% for vdev in tank_vdevs %}raidz1 {{ vdev | join(' ') }} {% endfor %}\
          {% if tank_spares | length > 0 %}spare {{ tank_spares | join(' ') }} {% endif %}\
          log {{ nvme_detect.stdout | trim }}
      changed_when: true

    - name: Create archive pool (mirror)
      when: archive_exists.rc != 0
      ansible.builtin.command: >
        zpool create -f archive
        mirror {{ archive_mirror | join(' ') }}
      changed_when: true

    # ── Pool-level properties ───────────────────────────────────────────
    - name: Set tank pool properties
      ansible.builtin.command: zfs set {{ item.prop }}={{ item.value }} tank
      loop:
        - { prop: atime,   value: "off" }
        - { prop: xattr,   value: "sa" }
        - { prop: acltype, value: "posixacl" }
      changed_when: true

    - name: Set archive pool properties
      ansible.builtin.command: zfs set {{ item.prop }}={{ item.value }} archive
      loop:
        - { prop: atime,   value: "off" }
        - { prop: xattr,   value: "sa" }
        - { prop: acltype, value: "posixacl" }
      changed_when: true

    # ── Datasets ─────────────────────────────────────────────────────────
    - name: Create ZFS datasets
      community.general.zfs:
        name: "{{ item.name }}"
        state: present
        extra_zfs_properties:
          recordsize: "{{ item.recordsize }}"
          compression: "{{ item.compression }}"
      loop: "{{ zfs_datasets }}"

    # ── NFS exports ──────────────────────────────────────────────────────
    - name: Ensure NFS export directories exist
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        mode: '0755'
      loop: "{{ nfs_exports }}"

    - name: Write /etc/exports
      ansible.builtin.template:
        src: templates/exports.j2
        dest: /etc/exports
        mode: '0644'
      notify: reload nfs

    - name: Enable and start nfs-kernel-server
      ansible.builtin.systemd:
        name: nfs-kernel-server
        enabled: true
        state: started

    # ── Scrub schedule (systemd timer) ───────────────────────────────────
    - name: Create ZFS scrub systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/zfs-scrub.service
        mode: '0644'
        content: |
          [Unit]
          Description=ZFS scrub all pools

          [Service]
          Type=oneshot
          ExecStart=/usr/sbin/zpool scrub tank
          ExecStart=/usr/sbin/zpool scrub archive

    - name: Create ZFS scrub systemd timer (weekly on Sunday 03:00)
      ansible.builtin.copy:
        dest: /etc/systemd/system/zfs-scrub.timer
        mode: '0644'
        content: |
          [Unit]
          Description=Weekly ZFS scrub

          [Timer]
          OnCalendar=Sun 03:00
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: Enable ZFS scrub timer
      ansible.builtin.systemd:
        name: zfs-scrub.timer
        enabled: true
        state: started
        daemon_reload: true

  post_tasks:
    - name: Display pool status
      ansible.builtin.command: zpool status
      register: pool_status
      changed_when: false

    - name: Display pool list
      ansible.builtin.command: zpool list
      register: pool_list
      changed_when: false

    - name: Print summary
      ansible.builtin.debug:
        msg: |
          {{ pool_list.stdout }}
          {{ pool_status.stdout }}

          NFS exports:
          {{ nfs_exports | map(attribute='path') | list | join(', ') }}
          Serving to: {{ nfs_client_network }}

  handlers:
    - name: reload nfs
      ansible.builtin.command: exportfs -ra
      changed_when: true
