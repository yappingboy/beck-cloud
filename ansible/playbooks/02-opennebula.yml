---
# 02-opennebula.yml — Configure OpenNebula 7.2 AIO (frontend + KVM node)
#
# AlmaLinux 9 — OpenNebula CE 7.2 packages are PRE-INSTALLED by the CE ISO.
# oned, Sunstone, and FireEdge are already running.
#
# What lives here:
#   • Set oneadmin API credentials (/var/lib/one/.one/one_auth)
#   • Set up oneadmin SSH keypair (AIO passwordless SSH to itself)
#   • Add oneadmin to kvm and qemu groups
#   • Create NetworkManager bridge one0 (192.168.100.1/24) via nmcli
#   • Enable IP forwarding + firewalld masquerade for VM subnet
#   • Ensure OpenNebula services are started
#   • Add localhost as KVM host; create k3s-net virtual network
#
# Run: ansible-playbook -i inventory/hosts.yml playbooks/02-opennebula.yml

- name: Configure OpenNebula 7.2 AIO
  hosts: hypervisor
  become: true
  gather_facts: true

  tasks:
    # ── oneadmin credentials ───────────────────────────────────────────────
    - name: Ensure oneadmin .one directory exists
      ansible.builtin.file:
        path: /var/lib/one/.one
        state: directory
        owner: oneadmin
        group: oneadmin
        mode: '0700'

    - name: Check if oneadmin API auth file already exists
      ansible.builtin.stat:
        path: /var/lib/one/.one/one_auth
      register: one_auth_stat

    # The CE ISO sets its own oneadmin password during install.
    # Only write this file if it doesn't exist yet — never overwrite
    # a CE-provisioned password (it won't match the DB and breaks CLI auth).
    # To change the password post-install, use: oneuser passwd 0 <newpass>
    - name: Write oneadmin API auth file (only if not set by CE ISO)
      ansible.builtin.copy:
        content: "oneadmin:{{ one_admin_password }}"
        dest: /var/lib/one/.one/one_auth
        owner: oneadmin
        group: oneadmin
        mode: '0600'
      when: not one_auth_stat.stat.exists

    # ── oneadmin SSH keypair (AIO: frontend SSHes to itself) ───────────────
    - name: Check if oneadmin SSH keypair exists
      ansible.builtin.stat:
        path: /var/lib/one/.ssh/id_rsa
      register: oneadmin_ssh_key

    - name: Generate oneadmin SSH keypair
      ansible.builtin.shell: |
        su oneadmin -s /bin/bash -c "ssh-keygen -t rsa -N '' -f /var/lib/one/.ssh/id_rsa"
      when: not oneadmin_ssh_key.stat.exists
      args:
        creates: /var/lib/one/.ssh/id_rsa

    - name: Append oneadmin public key to authorized_keys
      ansible.builtin.shell: |
        cat /var/lib/one/.ssh/id_rsa.pub >> /var/lib/one/.ssh/authorized_keys
        chmod 600 /var/lib/one/.ssh/authorized_keys
        chown oneadmin:oneadmin /var/lib/one/.ssh/authorized_keys
      when: not oneadmin_ssh_key.stat.exists
      changed_when: true

    - name: Populate oneadmin known_hosts (localhost, IP, and AIO hostname)
      ansible.builtin.shell: |
        set -e
        KNOWN=/var/lib/one/.ssh/known_hosts
        for target in localhost 127.0.0.1 "{{ homelab_hostname }}" "{{ homelab_ip }}"; do
          ssh-keyscan -H "$target" >> "$KNOWN" 2>/dev/null || true
        done
        sort -u "$KNOWN" -o "$KNOWN"
        chown oneadmin:oneadmin "$KNOWN"
        chmod 600 "$KNOWN"
      changed_when: true

    # ── oneadmin group membership ──────────────────────────────────────────
    - name: Add oneadmin to kvm and qemu groups
      ansible.builtin.user:
        name: oneadmin
        groups: kvm,qemu
        append: true

    # ── External bridge (br0) over physical NIC ───────────────────────────
    # VMs land directly on the 172.16.0.0/16 LAN — no NAT required.
    # We detect the NIC carrying the default route, then bridge it so KVM
    # guests share the same L2 segment as the hypervisor.
    #
    # WARNING: this reconfigures the active NIC. The script is written to
    # complete atomically (nmcli applies both sides before activating) but
    # there will be a 1-3s network blip as the bridge comes up.
    - name: Detect physical NIC used for default route
      ansible.builtin.shell: |
        ip route show default | awk '/default/ {print $5; exit}'
      register: physical_nic_detected
      changed_when: false

    - name: Set physical NIC fact
      ansible.builtin.set_fact:
        one_physical_nic: "{{ one_physical_nic_override | default(physical_nic_detected.stdout | trim) }}"

    - name: Show bridge plan
      ansible.builtin.debug:
        msg: "Bridging {{ one_physical_nic }} → {{ one_bridge }} for VM external access"

    - name: Check if external bridge already exists
      ansible.builtin.command: nmcli con show {{ one_bridge }}
      register: bridge_check
      failed_when: false
      changed_when: false

    - name: Create external bridge over physical NIC
      ansible.builtin.shell: |
        set -e
        NIC="{{ one_physical_nic }}"
        BR="{{ one_bridge }}"

        # Find the active connection on the NIC
        NIC_CONN=$(nmcli -t -f NAME,DEVICE con show --active | awk -F: -v dev="$NIC" '$2==dev {print $1; exit}')

        # Read current IP/gateway from that connection
        NIC_ADDR=$(nmcli -t -f IP4.ADDRESS  con show "$NIC_CONN" | cut -d: -f2 | head -1)
        NIC_GW=$(nmcli   -t -f IP4.GATEWAY  con show "$NIC_CONN" | cut -d: -f2 | head -1)
        NIC_DNS=$(nmcli  -t -f IP4.DNS      con show "$NIC_CONN" | cut -d: -f2 | tr '\n' ' ')

        # Create bridge and slave — both inactive until we switch over
        nmcli con add type bridge       con-name "$BR"          ifname "$BR" \
          bridge.stp no autoconnect yes \
          ipv4.method manual \
          ipv4.addresses "$NIC_ADDR" \
          ipv4.gateway   "$NIC_GW" \
          ipv4.dns       "${NIC_DNS:-8.8.8.8}"

        nmcli con add type bridge-slave con-name "${BR}-slave"  ifname "$NIC" \
          master "$BR" autoconnect yes

        # Atomically switch: down NIC connection, up slave + bridge
        nmcli con down "$NIC_CONN"   || true
        nmcli con up   "${BR}-slave"
        nmcli con up   "$BR"
      when: bridge_check.rc != 0

    # ── IP forwarding ──────────────────────────────────────────────────────
    - name: Enable and start firewalld
      ansible.builtin.systemd:
        name: firewalld
        enabled: true
        state: started

    - name: Enable IP forwarding via sysctl
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        sysctl_set: true
        state: present
        reload: true

    # ── OpenNebula services ────────────────────────────────────────────────
    - name: Ensure OpenNebula services are started
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - opennebula
        - opennebula-fireedge

    - name: Wait for OpenNebula API (port 2633) to be open
      ansible.builtin.wait_for:
        host: localhost
        port: 2633
        delay: 5
        timeout: 60

    # ── Add KVM host (AIO: localhost) ──────────────────────────────────────
    - name: Check if KVM host already registered
      ansible.builtin.command: onehost show {{ homelab_hostname }}
      environment:
        ONE_AUTH: /var/lib/one/.one/one_auth
      register: onehost_check
      failed_when: false
      changed_when: false

    - name: Add localhost as KVM node
      ansible.builtin.command: onehost create {{ homelab_hostname }} -i kvm -v kvm
      environment:
        ONE_AUTH: /var/lib/one/.one/one_auth
      when: onehost_check.rc != 0

    - name: Wait for KVM host to reach MONITORED state (up to 120s)
      ansible.builtin.shell: |
        onehost list --no-header | grep {{ homelab_hostname }} | grep -w MONITORED
      environment:
        ONE_AUTH: /var/lib/one/.one/one_auth
      register: onehost_monitored
      retries: 12
      delay: 10
      until: onehost_monitored.rc == 0
      changed_when: false
      failed_when: false
      when: onehost_check.rc != 0

    # ── Virtual network k3s-net ────────────────────────────────────────────
    - name: Check if k3s-net vnet already exists
      ansible.builtin.command: onevnet show k3s-net
      environment:
        ONE_AUTH: /var/lib/one/.one/one_auth
      register: onevnet_check
      failed_when: false
      changed_when: false

    - name: Write k3s-net vnet template
      ansible.builtin.copy:
        content: |
          NAME          = "k3s-net"
          VN_MAD        = "bridge"
          BRIDGE        = "{{ one_bridge }}"
          DNS           = "{{ one_dns_servers | join(' ') }}"
          GATEWAY       = "{{ one_vm_gateway }}"
          NETWORK_MASK  = "255.255.0.0"
          AR = [
            TYPE = "IP4",
            IP   = "{{ one_vm_ar_start }}",
            SIZE = "20"
          ]
        dest: /tmp/k3s-net.one
        mode: '0644'
      when: onevnet_check.rc != 0

    - name: Create k3s-net virtual network
      ansible.builtin.command: onevnet create /tmp/k3s-net.one
      environment:
        ONE_AUTH: /var/lib/one/.one/one_auth
      when: onevnet_check.rc != 0

  post_tasks:
    - name: List OpenNebula hosts
      ansible.builtin.command: onehost list
      environment:
        ONE_AUTH: /var/lib/one/.one/one_auth
      register: onehost_list
      changed_when: false

    - name: Print onehost list
      ansible.builtin.debug:
        var: onehost_list.stdout_lines

    - name: List OpenNebula virtual networks
      ansible.builtin.command: onevnet list
      environment:
        ONE_AUTH: /var/lib/one/.one/one_auth
      register: onevnet_list
      changed_when: false

    - name: Print onevnet list
      ansible.builtin.debug:
        var: onevnet_list.stdout_lines

    - name: Print FireEdge URL
      ansible.builtin.debug:
        msg: "OpenNebula FireEdge UI: http://{{ homelab_ip }}:2616"
