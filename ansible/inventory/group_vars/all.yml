---
# Beck Cloud — Ansible Variables

homelab_hostname: becklab
homelab_ip: 172.16.0.7
ops_user: root

# ── OpenNebula 7.2 ────────────────────────────────────────────────────────────
one_admin_password: "changeme"   # override with -e one_admin_password=<secret> or vault

# External bridge — br0 is created over the physical NIC so VMs land directly
# on the LAN (172.16.0.0/16) without NAT.
# one_physical_nic: auto-detected from default route; override if needed.
one_bridge: br0
one_vm_cidr: "172.16.0.0/16"
one_vm_gateway: "172.16.0.1"    # LAN router — override if yours differs
one_vm_ar_start: "172.16.0.20"  # first IP assigned to VMs (sequential from here)
one_dns_servers:
  - "8.8.8.8"
  - "8.8.4.4"

# Ubuntu cloud image
one_k3s_image: "ubuntu-24.04-server"
one_k3s_image_url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
one_k3s_keypair_pub: "~/.ssh/id_ed25519.pub"

# OpenNebula VM definitions for K3s
one_k3s_server_ip: "172.16.0.20"   # first VM IP (k3s-server)

one_k3s_vms:
  - name: k3s-server
    vcpus: 8
    ram: 32768
    disk: 100
    role: server
  - name: k3s-worker-1
    vcpus: 12
    ram: 32768
    disk: 50
    role: worker

# ── ZFS ───────────────────────────────────────────────────────────────────────
zfs_pool_name: tank

# ── K3s ───────────────────────────────────────────────────────────────────────
k3s_version: v1.32.0+k3s1
k3s_token: ""
k3s_disable:
  - traefik
  - servicelb
  - metrics-server
k3s_kubelet_args:
  - max-pods=250
  - kube-reserved=cpu=500m,memory=2Gi
  - system-reserved=cpu=500m,memory=2Gi

# Cilium
cilium_version: 1.17.0

# ── NVIDIA ────────────────────────────────────────────────────────────────────
install_nvidia: false

# AI Sysadmin — Rho + Llamactl + Llama-server
llm_model_hf_repo: Qwen/Qwen2.5-32B-Instruct-GGUF
llm_model_hf_file: qwen2.5-32b-instruct-q4_k_m.gguf
llm_model_name: qwen-sysadmin
llm_llamactl_port: 8088
llm_context_size: 32768
llm_threads: 16

# ── Network / NTP ─────────────────────────────────────────────────────────────
ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org
  - 2.pool.ntp.org

# UFW rules for the bare metal host
firewall_allowed_ports:
  - { port: "22",   proto: tcp, comment: SSH }
  - { port: "9869", proto: tcp, comment: "OpenNebula Sunstone" }
  - { port: "2616", proto: tcp, comment: "OpenNebula FireEdge" }
  - { port: "2633", proto: tcp, comment: "OpenNebula API (oned)" }
  - { port: "29876", proto: tcp, comment: "OpenNebula Gate" }
  - { port: "80",   proto: tcp, comment: HTTP }
  - { port: "443",  proto: tcp, comment: HTTPS }

# ── Domain / TLS ──────────────────────────────────────────────────────────────
domain: becklab.cloud
ssl_email: yappingboy@gmail.com

# ── Secrets (override via env or vault) ───────────────────────────────────────
github_token: "{{ lookup('env', 'GITHUB_TOKEN') }}"
