---
# Beck Cloud — Ansible Variables

homelab_hostname: becklab
homelab_ip: 172.16.0.7
ops_user: root

# ── OpenNebula 7.2 ────────────────────────────────────────────────────────────
one_admin_password: "changeme"   # override with -e one_admin_password=<secret> or vault

# Internal VM network — isolated bridge (one0), NAT masqueraded to internet.
# Used for kubelet / control-plane traffic between server and workers.
one_int_bridge: one0
one_int_cidr: "192.168.100.0/24"
one_int_gateway: "192.168.100.1"    # hypervisor's one0 IP (acts as NAT gateway)
one_int_ar_start: "192.168.100.10"

# External VM network — br0 bridged over physical NIC, direct LAN access.
# Only the k3s-server gets this NIC (ingress + kubectl access).
one_ext_bridge: br0
one_ext_cidr: "172.16.0.0/16"
one_ext_gateway: "172.16.0.1"       # LAN router — override if yours differs
one_ext_ar_start: "172.16.0.20"

one_dns_servers:
  - "8.8.8.8"
  - "8.8.4.4"

# Ubuntu cloud image
one_k3s_image: "ubuntu-24.04-server"
one_k3s_image_url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
one_k3s_keypair_pub: "~/.ssh/id_ed25519.pub"

# OpenNebula VM definitions for K3s
one_k3s_server_ext_ip: "172.16.0.20"   # k3s-server external (LAN) IP
one_k3s_server_int_ip: "192.168.100.10" # k3s-server internal IP (workers join here)

one_k3s_vms:
  - name: k3s-server
    vcpus: 8
    ram: 32768
    disk: 100
    role: server
  - name: k3s-worker-1
    vcpus: 12
    ram: 32768
    disk: 50
    role: worker

# ── RAID + LVM storage backing the OpenNebula Tank datastore ─────────────────
# 14x 6TB HGST SAS → /dev/md0 (RAID6, ~78TB usable) → vg_tank → lv_tank
# → /var/lib/one/datastores/101 (DS ID 101 = Tank).
# Holds the BecklabMedia DATABLOCK image attached to k3s-worker-1. Inside the
# VM, /dev/vdb is formatted xfs and mounted at /mnt/media.
# System DS 0 / default DS 1 are unmanaged here — they live on the root FS.
#
# Excluded drives:
#   sdf (10TB Seagate) — dead, I/O errors, removed from service
#   sdh (10TB Seagate) — no matching partner, reserved for future use
raid_data_disks: []  # auto-discovered; override with -e raid_data_disks=[...]
raid_level: raid6
raid_chunk: 512K
raid_layout: left-symmetric

lvm_vg_name: vg_tank
lvm_lvs:
  - name: lv_tank
    size: 100%FREE
    mountpoint: /var/lib/one/datastores/101
    fstype: xfs
    owner: oneadmin
    group: oneadmin

# ── OpenNebula media datastore / image ───────────────────────────────────────
one_media_datastore_name: Tank
one_media_image_name: BecklabMedia
one_media_image_size_mb: 41943040    # 40 TiB (40 * 1024 * 1024 MB)

# ── K3s ───────────────────────────────────────────────────────────────────────
k3s_version: v1.32.0+k3s1
k3s_token: ""
k3s_disable:
  - traefik
  - servicelb
  - metrics-server
k3s_kubelet_args:
  - max-pods=250
  - kube-reserved=cpu=500m,memory=2Gi
  - system-reserved=cpu=500m,memory=2Gi

# Cilium
cilium_version: 1.17.0

# ── NVIDIA ────────────────────────────────────────────────────────────────────
install_nvidia: false

# AI Sysadmin — Rho + Llamactl + Llama-server
llm_model_hf_repo: Qwen/Qwen2.5-32B-Instruct-GGUF
llm_model_hf_file: qwen2.5-32b-instruct-q4_k_m.gguf
llm_model_name: qwen-sysadmin
llm_llamactl_port: 8088
llm_context_size: 32768
llm_threads: 16

# ── Network / NTP ─────────────────────────────────────────────────────────────
ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org
  - 2.pool.ntp.org

# UFW rules for the bare metal host
firewall_allowed_ports:
  - { port: "22",   proto: tcp, comment: SSH }
  - { port: "9869", proto: tcp, comment: "OpenNebula Sunstone" }
  - { port: "2616", proto: tcp, comment: "OpenNebula FireEdge" }
  - { port: "2633", proto: tcp, comment: "OpenNebula API (oned)" }
  - { port: "29876", proto: tcp, comment: "OpenNebula Gate" }
  - { port: "80",   proto: tcp, comment: HTTP }
  - { port: "443",  proto: tcp, comment: HTTPS }

# ── Domain / TLS ──────────────────────────────────────────────────────────────
domain: becklab.cloud
ssl_email: yappingboy@gmail.com

# ── Secrets (override via env or vault) ───────────────────────────────────────
github_token: "{{ lookup('env', 'GITHUB_TOKEN') }}"
