---
all:
  children:
    # Bare metal host — AlmaLinux 9, OpenNebula CE 7.2 (AIO frontend + KVM node)
    hypervisor:
      hosts:
        homelab:
          ansible_host: becklab
          ansible_user: root
          ansible_python_interpreter: /usr/bin/python3

    # OpenNebula VM instances — K3s application cluster
    # IPs are from the VM bridge network; update after 04-one-vms.yml assigns them.
    k3s_nodes:
      hosts:
        k3s-server:
          ansible_host: 192.168.100.10
          ansible_user: ubuntu
          ansible_python_interpreter: /usr/bin/python3
          k3s_role: server
        k3s-worker-1:
          ansible_host: 192.168.100.11
          ansible_user: ubuntu
          ansible_python_interpreter: /usr/bin/python3
          k3s_role: worker
