---
all:
  children:
    # Bare metal host — runs Sunbeam OpenStack + ZFS + NFS
    hypervisor:
      hosts:
        homelab:
          ansible_host: 172.16.0.7
          ansible_user: stephen
          ansible_python_interpreter: /usr/bin/python3

    # Nova VM instances — K3s application cluster
    # IPs are from the tenant network; update after 03-nova-vms.yml assigns them.
    # Use floating IPs from the provider pool if SSH from outside the host is needed.
    k3s_nodes:
      hosts:
        k3s-server:
          ansible_host: 192.168.100.10
          ansible_user: ubuntu
          ansible_python_interpreter: /usr/bin/python3
          k3s_role: server
        k3s-worker-1:
          ansible_host: 192.168.100.11
          ansible_user: ubuntu
          ansible_python_interpreter: /usr/bin/python3
          k3s_role: worker
