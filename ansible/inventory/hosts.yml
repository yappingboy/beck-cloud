---
all:
  children:
    # Bare metal host — AlmaLinux 9, OpenNebula CE 7.2 (AIO frontend + KVM node)
    hypervisor:
      hosts:
        homelab:
          ansible_host: becklab
          ansible_user: root
          ansible_python_interpreter: /usr/bin/python3

    # OpenNebula VM instances — K3s application cluster
    # VMs are on the external LAN (172.16.0.0/16) via the br0 bridge.
    # IPs are sequentially assigned from the k3s-net AR starting at 172.16.0.20.
    k3s_nodes:
      vars:
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
      hosts:
        k3s-server:
          ansible_host: 172.16.0.20
          ansible_user: ubuntu
          ansible_python_interpreter: /usr/bin/python3
          k3s_role: server
        k3s-worker-1:
          ansible_host: 172.16.0.21
          ansible_user: ubuntu
          ansible_python_interpreter: /usr/bin/python3
          k3s_role: worker
