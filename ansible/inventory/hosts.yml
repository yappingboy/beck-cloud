---
all:
  children:
    # Bare metal host — AlmaLinux 9, OpenNebula CE 7.2 (AIO frontend + KVM node)
    hypervisor:
      hosts:
        homelab:
          ansible_host: becklab
          ansible_user: root
          ansible_python_interpreter: /usr/bin/python3

    # OpenNebula VM instances — K3s application cluster
    # k3s-server:   external NIC 172.16.0.20 (LAN, direct) +
    #               internal NIC 192.168.100.10 (cluster traffic)
    # k3s-worker-1: internal NIC 192.168.100.11 only; reached via server ProxyJump
    k3s_nodes:
      vars:
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
      hosts:
        k3s-server:
          ansible_host: 172.16.0.20
          ansible_user: ubuntu
          ansible_python_interpreter: /usr/bin/python3
          k3s_role: server
        k3s-worker-1:
          ansible_host: 192.168.100.11
          ansible_user: ubuntu
          ansible_python_interpreter: /usr/bin/python3
          ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o ProxyJump=ubuntu@172.16.0.20'
          k3s_role: worker
