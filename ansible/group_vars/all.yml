---
# Beck Cloud — Ansible Variables
# Update these for your environment

homelab_hostname: homelab
homelab_ip: 172.16.0.7
ops_user: stephen

# K3s
k3s_version: v1.31.4+k3s1
k3s_token: ""
k3s_disable:
  - traefik
  - local-storage
  - servicelb
  - metrics-server
k3s_kubelet_args:
  - max-pods=250
  - kube-reserved=cpu=500m,memory=2Gi
  - system-reserved=cpu=500m,memory=2Gi

# Cilium
cilium_version: 1.16.5
cilium_helm_values:
  kubeProxyReplacement: true
  k8sServiceHost: "{{ homelab_ip }}"
  k8sServicePort: 6443

# NVIDIA
install_nvidia: true
nvidia_driver_version: 550
nvidia_runtime: nvidia

# Ceph
ceph_osd_devices:
  - /dev/sda
  - /dev/sdb
  - /dev/sdc
  - /dev/sdd
  - /dev/sde
  - /dev/sdf
  - /dev/sdg
  - /dev/sdh
  - /dev/sdi
  - /dev/sdj
  - /dev/sdk
  - /dev/sdl
  - /dev/sdm
  - /dev/sdn
  - /dev/sdo
  - /dev/sdp
ceph_wal_device: /dev/nvme1n1

# Network
ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org
  - 2.pool.ntp.org

# Firewall
firewall_allowed_ports:
  - port: 22
    comment: SSH
  - port: 6443
    comment: K3s API
  - port: 6789
    comment: Ceph MON
  - port: 3300
    comment: Ceph MGR
  - port: 6800:7300
    comment: Ceph OSD

# Domain
domain: beckcloud.local
ssl_email: yappingboy@gmail.com
